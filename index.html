<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - VERSION FINALE</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        /* --- DESIGN ÉLITE --- */
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; --glass: rgba(255,255,255,0.03); }
        body { background: var(--bg); color: white; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* NAVIGATION ET OPTIONS DANS UNE BANDE ÉTIRABLE */
        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 4%; z-index: 2000; 
            border-bottom: 1px solid rgba(255,255,255,0.1); justify-content: space-between; box-sizing: border-box;
        }

        .nav-links { display: flex; gap: 15px; align-items: center; }
        .nav-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #888; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 600; transition: 0.3s; }
        .nav-btn.active { background: white; color: black; border-color: white; }

        /* BARRE DE RECHERCHE DYNAMIQUE */
        .search-container { position: relative; display: flex; align-items: center; background: #111; border: 1px solid #333; padding: 5px 15px; border-radius: 25px; transition: 0.4s; width: 200px; }
        .search-container:focus-within { width: 300px; border-color: var(--accent); }
        #searchBar { background: none; border: none; color: white; width: 100%; outline: none; margin-left: 8px; }

        /* INFOS COMPTE ET OPTIONS */
        .user-options { display: flex; align-items: center; gap: 15px; }
        .expiry-tag { font-size: 10px; color: var(--gold); border: 1px solid var(--gold); padding: 4px 10px; border-radius: 5px; font-weight: 800; text-transform: uppercase; }
        
        /* CARDS & CAROUSEL (Mise en page Premium) */
        #main-content { padding-top: 100px; }
        .category-title { font-size: 20px; font-weight: 800; margin: 30px 4% 15px; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 4% 20px; scrollbar-width: none; }
        .card { flex: 0 0 160px; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1); position: relative; }
        .card:hover { transform: scale(1.1); z-index: 10; }
        .card img { width: 100%; aspect-ratio: 2/3; border-radius: 10px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card-name { margin-top: 10px; font-size: 12px; text-align: center; color: #aaa; font-weight: 600; }

        /* BARRE DE PROGRESSION SUR LES CARTES */
        .prog-bg { position: absolute; bottom: 35px; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .prog-fill { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* ÉCRANS FIXES (LOGIN, PROFIL, LECTEUR) - On garde ta structure exacte */
        #login-screen, #profile-screen, #player-section, #details-overlay { position: fixed; inset: 0; z-index: 5000; background: #000; }
        .login-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; text-align: center; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 5px; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: 800; border-radius: 5px; cursor: pointer; }

        /* FOCUS TV */
        [tabindex="0"]:focus { outline: 3px solid white; transform: scale(1.05); }

    </style>
</head>
<body>

<header id="main-header" style="display:none;">
    <div class="nav-links">
        <div class="logo" style="color:var(--accent); font-weight:900; margin-right:20px;">SFPP ELITE</div>
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')" tabindex="0">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')" tabindex="0">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')" tabindex="0">Séries</button>
        <button class="nav-btn" id="btn-fav" onclick="changeView('fav')" tabindex="0">Ma Liste ❤️</button>
    </div>

    <div class="user-options">
        <div class="search-container">
            <span>🔍</span>
            <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher..." tabindex="0">
        </div>
        <div id="expiry-display" class="expiry-tag">ABONNÉ</div>
        <button onclick="switchProfile()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" tabindex="0">👤</button>
        <button onclick="logout()" style="color:var(--accent); background:none; border:none; font-size:12px; cursor:pointer;" tabindex="0">Quitter</button>
    </div>
</header>

<div id="main-content" style="display:none;">
    <div id="history-sec" style="display:none">
        <div class="category-title">Continuer la lecture</div>
        <div class="carousel" id="history-container"></div>
    </div>
    <div id="categories-container"></div>
</div>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <h2 style="color:var(--accent)">CONNEXION</h2>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit">ENTRER</button>
    </form>
</div>

<div id="profile-screen" style="display:none; flex-direction:column; align-items:center; justify-content:center;">
    <h1>Qui regarde ?</h1>
    <div id="profile-list" style="display:flex; gap:20px;"></div>
    <button onclick="logout()" style="margin-top:40px; color:#555; background:none; border:none; cursor:pointer;">DÉCONNEXION</button>
</div>

<div id="details-overlay" style="display:none; background:rgba(0,0,0,0.95); align-items:center; justify-content:center;">
    <div style="background:#111; max-width:800px; display:flex; border-radius:15px; overflow:hidden; border:1px solid #333;">
        <img id="details-img" style="width:40%; object-fit:cover;">
        <div style="padding:40px; width:60%;">
            <h2 id="details-title" style="margin-top:0;"></h2>
            <p id="details-desc" style="color:#888;"></p>
            <button id="details-play-btn" style="width:100%; padding:15px; background:white; color:black; font-weight:800; border:none; border-radius:5px; cursor:pointer;">▶ LIRE</button>
            <button onclick="closeDetails()" style="width:100%; margin-top:10px; background:none; border:none; color:#555; cursor:pointer;">RETOUR</button>
        </div>
    </div>
</div>

<section id="player-section" style="display:none;">
    <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
    <div style="padding:20px;">
        <h2 id="display-title"></h2>
        <button onclick="closeP()" style="padding:10px 20px; background:var(--accent); color:white; border:none; border-radius:5px; cursor:pointer;">✕ FERMER</button>
    </div>
</section>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // TA FONCTION LOGIN
    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            location.reload();
        }).catch(() => alert("Erreur identifiants"));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('main-content').style.display = 'block';
            
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            if(snap.val()) document.getElementById('expiry-display').innerText = snap.val();
            
            loadPlaylist();
            initProfiles();
            
            if(localStorage.getItem('sfpp_profile')) {
                document.getElementById('profile-screen').style.display = 'none';
                currentProfile = localStorage.getItem('sfpp_profile');
            } else {
                document.getElementById('profile-screen').style.display = 'flex';
            }
        }
    });

    window.logout = () => signOut(auth).then(() => { localStorage.clear(); location.reload(); });
</script>

<script>
    // TES VARIABLES GLOBALES
    let player, playlistData = [], currentProfile = null, currentView = 'all';

    async function loadPlaylist() {
        const response = await fetch('films.json');
        playlistData = await response.json();
        render();
    }

    function render(search = "") {
        const cont = document.getElementById('categories-container');
        cont.innerHTML = "";
        const s = search.toLowerCase();
        
        const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
        const cats = [...new Set(playlistData.map(m => m.cat))];

        cats.forEach(c => {
            const filtered = playlistData.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
            if (filtered.length === 0) return;
            
            let html = `<div class="category-title">${c}</div><div class="carousel">`;
            filtered.forEach(m => {
                const pct = (prog[m.t]) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                html += `
                <div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0">
                    <img src="${m.img}">${pct}
                    <div class="card-name">${m.t}</div>
                </div>`;
            });
            html += `</div>`;
            cont.innerHTML += html;
        });
    }

    function initProfiles() {
        const list = document.getElementById('profile-list');
        const profs = ["Elite 1", "Elite 2"];
        list.innerHTML = profs.map(p => `<div onclick="selectProfile('${p}')" style="background:#222; padding:20px; border-radius:10px; cursor:pointer;" tabindex="0">👤 ${p}</div>`).join('');
    }

    function selectProfile(name) {
        localStorage.setItem('sfpp_profile', name);
        currentProfile = name;
        document.getElementById('profile-screen').style.display = 'none';
        render();
    }

    function openDetails(idx) {
        const m = playlistData[idx];
        document.getElementById('details-img').src = m.img;
        document.getElementById('details-title').innerText = m.t;
        document.getElementById('details-desc').innerText = m.desc || "";
        document.getElementById('details-play-btn').onclick = () => playMovie(idx);
        document.getElementById('details-overlay').style.display = 'flex';
    }

    function playMovie(idx) {
        const m = playlistData[idx];
        document.getElementById('details-overlay').style.display = 'none';
        document.getElementById('player-section').style.display = 'block';
        document.getElementById('display-title').innerText = m.t;
        player.src({ src: m.url, type: 'video/mp4' });
        player.play();
    }

    function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; }
    function closeP() { player.pause(); document.getElementById('player-section').style.display = 'none'; }
    function filter() { render(document.getElementById('searchBar').value); }
    function changeView(v) { currentView = v; render(); }
    function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }

    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('main-video');
    });
</script>
</body>
</html>
