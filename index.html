<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - STREAMING</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0e13">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { 
            --accent: #a855f7; 
            --accent-glow: rgba(168, 85, 247, 0.4);
            --bg: #0f0e13; 
            --card-bg: #1a1921;
            --text: #efeff1;
            --glass: rgba(15, 14, 19, 0.85);
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding-bottom: 50px; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Scrollbar invisible */
        ::-webkit-scrollbar { width: 0px; height: 0px; }

        /* FOCUS ANDROID TV */
        [tabindex="0"]:focus {
            outline: none !important;
            transform: scale(1.07);
            box-shadow: 0 0 25px var(--accent-glow);
            z-index: 100;
            transition: all 0.2s ease-in-out;
        }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { 
            background: var(--card-bg); padding: 40px; border-radius: 24px; 
            width: 320px; text-align: center; border: 1px solid #2a2931;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-box input { 
            width: 100%; padding: 14px; margin: 10px 0; 
            background: #25242d; border: 1px solid #333; 
            color: white; border-radius: 12px; box-sizing: border-box; outline: none;
        }
        .login-box button { 
            width: 100%; padding: 14px; background: var(--accent); 
            color: white; border: none; font-weight: 800; 
            border-radius: 12px; cursor: pointer; transition: 0.3s;
        }

        /* HEADER GLASSMORPHISM */
        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; padding: 0 5%; z-index: 2000; 
            justify-content: space-between; box-sizing: border-box;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { 
            font-weight: 900; font-size: 22px; letter-spacing: -1px; 
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .nav-links { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-btn { 
            background: none; border: none; color: #9494a5; 
            cursor: pointer; font-size: 14px; font-weight: 600; 
            padding: 10px 12px; transition: 0.3s; border-radius: 10px;
        }
        .nav-btn.active { color: #fff; background: rgba(255,255,255,0.05); }

        /* SEARCH OVERLAY */
        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 70px;
            background: var(--bg); display: none; align-items: center; padding: 0 5%;
            box-sizing: border-box; z-index: 2001;
        }
        #searchBar { flex: 1; background: #25242d; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 15px; outline: none; }

        /* MAIN CONTENT */
        #main-content { padding-top: 90px; }
        .category-title { font-size: 20px; font-weight: 800; margin: 25px 5% 15px; color: #fff; }
        .carousel { display: flex; overflow-x: auto; gap: 18px; padding: 0 5% 20px; scroll-behavior: smooth; }
        
        /* CARDS */
        .card { flex: 0 0 160px; cursor: pointer; position: relative; transition: transform 0.3s; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 16px; background: #25242d; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .card-name { margin-top: 10px; font-size: 13px; font-weight: 600; text-align: center; color: #9494a5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* PROGRESS BAR */
        .prog-bg { position: absolute; bottom: 35px; left: 8px; right: 8px; height: 4px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* PLAYER & OVERLAYS */
        #player-section { display: none; width: 100%; background: #000; padding-top: 70px; }
        .movie-info { padding: 40px 5%; background: linear-gradient(to bottom, #1a1921, #0f0e13); border-radius: 30px 30px 0 0; }
        .movie-title { font-size: 28px; font-weight: 900; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; }
        
        #player-fav-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px; border-radius: 12px; font-weight: 600; cursor: pointer; }
        #player-fav-btn.is-fav { background: var(--accent); }

        /* SERIES OVERLAY */
        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 100px 5% 40px; }
        .episode-item { background: var(--card-bg); padding: 20px; border-radius: 16px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #2a2931; transition: 0.2s; }
        .episode-item:hover { border-color: var(--accent); background: #25242d; }

        /* PROFILES */
        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 24px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; transition: 0.3s; }
        .profile-name { font-weight: 600; color: #9494a5; }

        .btn-close { background: #25242d; color: #fff; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        #next-episode-btn {
            position: absolute; bottom: 100px; right: 30px; z-index: 9999;
            background: var(--accent); color: white; border: none; padding: 18px 30px;
            border-radius: 15px; font-weight: 800; box-shadow: 0 10px 30px var(--accent-glow);
        }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:30px; font-size:30px">SFPP ELITE</div>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit" tabindex="0">SE CONNECTER</button>
        <button type="button" class="btn-request" onclick="requestAccess()" style="background:none; color:#666; font-size:12px; margin-top:20px; cursor:pointer" tabindex="0">Demander un accès</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="font-weight:900; margin-bottom:40px; font-size:35px">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list" style="display:grid; grid-template-columns: repeat(2, 1fr); gap:30px"></div>
    <button class="btn-close" onclick="toggleEditMode()" style="margin-top:50px" tabindex="0">GÉRER LES PROFILS</button>
    <button onclick="logout()" style="margin-top:30px; background:none; border:none; color:#444; font-size:12px" tabindex="0">DÉCONNEXION</button>
</div>

<header>
    <div class="logo" id="header-logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')" tabindex="0">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')" tabindex="0">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')" tabindex="0">Séries</button>
        <button class="nav-btn" id="btn-fav" onclick="changeView('fav')" tabindex="0">Ma Liste</button>
    </div>
    <div style="display:flex; gap:15px; align-items:center">
        <button onclick="openSearch()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer" tabindex="0">🔍</button>
        <button onclick="switchProfile()" style="background:#25242d; border:none; color:white; padding:8px 12px; border-radius:10px; font-size:11px; font-weight:700" tabindex="0">PROFILS</button>
    </div>
    <div id="search-overlay">
        <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher un titre..." tabindex="0">
        <button onclick="closeSearch()" style="background:none; border:none; color:white; margin-left:15px; font-size:20px" tabindex="0">✕</button>
    </div>
</header>

<div id="series-overlay">
    <button class="btn-close" onclick="closeSeries()" style="margin-bottom:30px" tabindex="0">← RETOUR</button>
    <div id="series-detail-content"></div>
</div>

<section id="player-section">
    <div style="position:relative">
        <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
        <button id="next-episode-btn" onclick="playNextEpisode()" tabindex="0">ÉPISODE SUIVANT ⏭️</button>
    </div>
    <div class="movie-info">
        <div class="movie-title">
            <span id="display-title"></span>
            <button id="player-fav-btn" onclick="toggleFavCurrent()" tabindex="0">+ Ma Liste</button>
        </div>
        <p id="display-desc" style="color:#9494a5; line-height:1.6; max-width:800px"></p>
        <div id="display-actors" style="color:var(--accent); font-weight:700; margin:20px 0"></div>
        <button class="btn-close" onclick="closeP()" tabindex="0">Fermer le lecteur</button>
    </div>
</section>

<div id="main-content">
    <div id="expiration-banner" style="display:none; background:var(--accent); color:white; text-align:center; padding:10px; font-weight:800; font-size:13px"></div>
    
    <div id="history-sec" style="display:none">
        <div class="category-title">Reprendre la lecture</div>
        <div class="carousel" id="history-container"></div>
    </div>
    
    <div id="categories-container"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() });
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        render();
    };

    window.logout = function() { signOut(auth).then(() => { localStorage.clear(); location.reload(); }); };
</script>

<script>
let player, playlistData = [], currentProfile = null, isEditMode = false, currentView = 'all', currentPlayingTitle = "";

function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('searchBar').focus(); }
function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; document.getElementById('searchBar').value = ''; render(); }

async function loadPlaylist() { 
    try { 
        const response = await fetch('films.json'); 
        playlistData = await response.json(); 
        render(); 
    } catch (e) { console.error("Erreur playlist", e); } 
}

function initProfiles() {
    let profiles = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
        { id: 1, name: "Principal", icon: "👤", color: "#a855f7" },
        { id: 2, name: "Invité", icon: "✨", color: "#2ecc71" }
    ];
    document.getElementById('profile-list').innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="selectProfile('${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div class="profile-name">${p.name}</div>
        </div>`).join('');
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histSec = document.getElementById('history-sec');
    const histCont = document.getElementById('history-container');
    cont.innerHTML = ""; histCont.innerHTML = "";
    const s = search.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    // Historique
    let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
    if(history.length > 0 && s === "" && currentView === 'all') {
        histSec.style.display = "block";
        history.slice().reverse().forEach(title => {
            const m = playlistData.find(item => item.t === title);
            if(m) {
                const pct = (prog[m.t]) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                histCont.innerHTML += `<div class="card" onclick="playMovie(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
    } else histSec.style.display = "none";

    const cats = [...new Set(data.map(m => m.cat))];
    let addedSeries = [];

    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="carousel">`;
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const heart = favs.includes(m.t) ? `<div style="position:absolute; top:10px; right:10px; text-shadow:0 0 10px rgba(0,0,0,0.8)">❤️</div>` : "";
            const pct = (prog[m.t]) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}">${heart}<div class="card-name">${sName}</div></div>`;
                }
            } else {
                html += `<div class="card" onclick="playMovie(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${heart}${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        html += `</div>`;
        cont.innerHTML += html;
    });
}

function openSeries(name) {
    const overlay = document.getElementById('series-overlay');
    const content = document.getElementById('series-detail-content');
    const eps = playlistData.filter(m => m.t.startsWith(name));
    overlay.style.display = 'block';
    let html = `<h2 style="font-size:30px; font-weight:900; margin-bottom:30px">${name}</h2>`;
    eps.forEach(ep => {
        html += `<div class="episode-item" onclick="playMovie(${playlistData.indexOf(ep)}); closeSeries();" tabindex="0">
                    <div style="flex:1 font-weight:700">${ep.t.split(' - ')[1] || ep.t}</div>
                    <div style="color:var(--accent); font-weight:800">LIRE</div>
                 </div>`;
    });
    content.innerHTML = html;
}

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('display-desc').innerText = m.desc || "Aucune description disponible.";
    document.getElementById('display-actors').innerText = (m.actors) ? "Casting : " + m.actors : "";
    
    // Save history
    let key = 'sfpp_hist_' + currentProfile;
    let hist = JSON.parse(localStorage.getItem(key) || "[]").filter(t => t !== m.t);
    hist.push(m.t); if(hist.length > 20) hist.shift();
    localStorage.setItem(key, JSON.stringify(hist));

    window.scrollTo({top:0, behavior:'smooth'});
    player.src({ src: m.url, type: 'video/mp4' });
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t]) player.currentTime(prog[m.t].t);
    player.play();
    updatePlayerFavUI();
}

function closeP() { saveP(); player.pause(); document.getElementById('player-section').style.display = 'none'; render(); }
function closeSeries() { document.getElementById('series-overlay').style.display = 'none'; }
function changeView(v) { currentView = v; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+v).classList.add('active'); render(); }
function filter() { render(document.getElementById('searchBar').value); }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }

function saveP() {
    if(!currentPlayingTitle) return;
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        prog[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(prog));
    }
}

function toggleFavCurrent() {
    let key = 'sfpp_fav_' + currentProfile;
    let favs = JSON.parse(localStorage.getItem(key) || "[]");
    if(favs.includes(currentPlayingTitle)) favs = favs.filter(t => t !== currentPlayingTitle);
    else favs.push(currentPlayingTitle);
    localStorage.setItem(key, JSON.stringify(favs));
    updatePlayerFavUI();
}

function updatePlayerFavUI() {
    let favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const btn = document.getElementById('player-fav-btn');
    btn.innerText = favs.includes(currentPlayingTitle) ? "❤️ Dans Ma Liste" : "+ Ma Liste";
    btn.classList.toggle('is-fav', favs.includes(currentPlayingTitle));
}

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { techOrder: ['chromecast', 'html5'], plugins: { chromecast: { addButtonToControlBar: true } } });
    setInterval(saveP, 10000);
});
</script>
</body>
</html>
