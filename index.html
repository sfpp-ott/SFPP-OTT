<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - VERSION OFFICIELLE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; --gray-badge: #2a2a2a; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        
        /* AUTH & PROFILES SYSTEM */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 300px; text-align: center; background: #111; padding: 30px; border-radius: 8px; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 15px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #profile-screen { position: fixed; inset: 0; background: #000; z-index: 8000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; position: relative; }
        .profile-avatar { width: 110px; height: 110px; background: #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 45px; border: 3px solid transparent; transition: 0.2s; }
        .profile-item:hover .profile-avatar { border-color: white; transform: scale(1.05); }
        .edit-icon { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border-radius: 50%; padding: 5px; display: none; }
        .is-editing .edit-icon { display: block; }

        /* HEADER DESIGN */
        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); 
            display: flex; align-items: center; padding: 0 15px; z-index: 2000; 
            justify-content: space-between; box-sizing: border-box;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 22px; }
        .nav-links { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-btn { background: none; border: none; color: #bbb; font-size: 13px; cursor: pointer; white-space: nowrap; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        /* CONTENT CAROUSELS */
        #main-content { padding-top: 70px; }
        .category-title { font-size: 18px; font-weight: bold; margin: 20px 4% 10px; text-transform: uppercase; }
        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 0 4% 20px; scrollbar-width: none; }
        .card { flex: 0 0 140px; cursor: pointer; position: relative; }
        .card img { width: 100%; height: 210px; object-fit: cover; border-radius: 4px; background: #111; }
        .card-name { font-size: 11px; color: #888; margin-top: 6px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .prog-bg { position: absolute; bottom: 25px; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .prog-fill { height: 100%; background: var(--accent); }

        /* OVERLAY DETAILS - DESIGN EXACT DE LA PHOTO */
        #details-overlay { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; overflow-y: auto; scrollbar-width: none; }
        .hero-banner { position: relative; width: 100%; height: 55vh; background-size: cover; background-position: center 20%; }
        .hero-gradient { position: absolute; inset: 0; background: linear-gradient(to top, #000 5%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.4) 100%); }
        .btn-close-round { position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; background: rgba(0,0,0,0.6); color: white; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%; font-size: 20px; cursor: pointer; z-index: 100; display: flex; align-items: center; justify-content: center; }

        .details-content { position: relative; margin-top: -100px; padding: 0 25px 60px; box-sizing: border-box; }
        .title-big { font-size: 34px; font-weight: 800; margin: 0 0 10px; line-height: 1.1; }
        .meta-row { display: flex; align-items: center; gap: 12px; margin-bottom: 25px; }
        .badge-gray { background: var(--gray-badge); color: #efefef; padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; }
        .stars { color: var(--gold); letter-spacing: 2px; font-size: 14px; }

        /* BOUTON LECTURE BLANC (PHOTO) */
        .btn-play-white { background: #ffffff; color: #000000; border: none; width: 100%; padding: 16px; border-radius: 4px; font-weight: 900; font-size: 17px; display: flex; align-items: center; justify-content: center; gap: 12px; cursor: pointer; margin-bottom: 30px; }
        .label-sec { font-size: 19px; font-weight: 700; margin: 30px 0 15px; display: block; }
        .synopsis { font-size: 15px; line-height: 1.6; color: #d2d2d2; margin-bottom: 30px; }

        /* CASTING EN CERCLES (PHOTO) */
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .actor-card { flex: 0 0 75px; text-align: center; }
        .actor-card img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .actor-name { font-size: 10px; color: #888; margin-top: 5px; }

        /* PLAYER */
        #player-section { display: none; position: fixed; inset: 0; z-index: 6000; background: #000; }
        #next-episode-btn { position: absolute; bottom: 85px; right: 25px; z-index: 6500; background: var(--accent); color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; display: none; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h1 style="color:var(--accent); font-weight:900;">SFPP ELITE</h1>
        <input type="email" id="user" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="checkLogin()">SE CONNECTER</button>
    </div>
</div>

<div id="profile-screen">
    <h1>Qui regarde ?</h1>
    <div id="profile-list" class="profile-grid"></div>
    <button onclick="toggleEditMode()" style="margin-top:40px; background:none; border:1px solid #444; color:#888; padding:10px 20px; cursor:pointer;">GÉRER LES PROFILS</button>
</div>

<header id="main-header" style="display:none;">
    <div class="logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" onclick="changeView('movies')">Films</button>
        <button class="nav-btn" onclick="changeView('series')">Séries</button>
        <button class="nav-btn" onclick="changeView('fav')">Ma Liste</button>
    </div>
    <div id="p-icon" onclick="switchProfile()" style="cursor:pointer; font-size:22px;">👤</div>
</header>

<div id="main-content" style="display:none;">
    <div id="categories-container"></div>
</div>

<div id="details-overlay">
    <div id="det-hero" class="hero-banner">
        <div class="hero-gradient"></div>
        <button class="btn-close-round" onclick="closeDetails()">✕</button>
    </div>
    <div class="details-content">
        <h2 id="det-title" class="title-big"></h2>
        <div class="meta-row">
            <span id="det-year" class="badge-gray"></span>
            <span style="color:#aaa">Film</span>
            <div class="stars">★★★★★</div>
        </div>
        <button id="det-play-btn" class="btn-play-white"><span>▶</span> LECTURE</button>
        <span class="label-sec">Résumé</span>
        <p id="det-desc" class="synopsis"></p>
        <span class="label-sec">Bande-annonce</span>
        <div id="det-trailer" style="width:100%; aspect-ratio:16/9; border-radius:10px; overflow:hidden; background:#111; margin-bottom:20px;"></div>
        <span class="label-sec">Casting</span>
        <div id="det-cast" class="cast-row"></div>
    </div>
</div>

<section id="player-section">
    <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
    <button id="next-episode-btn" onclick="playNextEpisode()">ÉPISODE SUIVANT ⏭️</button>
    <button onclick="closeP()" style="position:absolute; top:20px; left:20px; background:rgba(0,0,0,0.6); color:white; border:none; padding:10px 20px; border-radius:20px; z-index:7000;">← Retour</button>
</section>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let player, playlistData = [], currentProfile = null, isEditMode = false;
    let deviceId = localStorage.getItem('sfpp_dev_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_dev_id', deviceId);

    // CONNEXION & LOGIQUE DE SESSION (TES 800 LIGNES)
    window.checkLogin = function() {
        const email = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            if (snap.val() && new Date().toISOString().split('T')[0] >= snap.val()) {
                alert("Compte expiré."); signOut(auth); return;
            }
            onValue(ref(db, 'sessions/' + user.uid), s => {
                if (s.val() && s.val().deviceId !== deviceId) {
                    alert("Utilisé ailleurs."); location.reload();
                }
            });
            set(ref(db, 'sessions/' + user.uid), { deviceId: deviceId, lastLogin: Date.now() });
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    async function loadPlaylist() {
        const res = await fetch('films.json');
        playlistData = await res.json();
        if (currentProfile) render();
    }

    window.initProfiles = function() {
        let saved = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
            { id: 1, name: "Papa", icon: "🟦" }, { id: 2, name: "Maman", icon: "🟩" }, { id: 3, name: "Enfants", icon: "🟧" }
        ];
        document.getElementById('profile-list').innerHTML = saved.map(p => `
            <div class="profile-item" onclick="handleProfileClick(${p.id}, '${p.name}', '${p.icon}')">
                <div class="profile-avatar">${p.icon}</div>
                <div class="edit-icon">✏️</div>
                <div style="margin-top:10px;">${p.name}</div>
            </div>`).join('');
        document.getElementById('profile-screen').style.display = 'flex';
    };

    window.handleProfileClick = function(id, name, icon) {
        if(isEditMode) {
            let n = prompt("Nouveau nom :", name);
            if(n) {
                let saved = JSON.parse(localStorage.getItem('sfpp_profiles_data'));
                const idx = saved.findIndex(p => p.id === id);
                saved[idx].name = n;
                localStorage.setItem('sfpp_profiles_data', JSON.stringify(saved));
                initProfiles();
            }
        } else selectProfile(name, icon);
    };

    window.selectProfile = function(n, i) {
        currentProfile = n;
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('main-content').style.display = 'block';
        document.getElementById('p-icon').innerText = i;
        render();
    };

    // RENDU & DESIGN PREMIUM
    window.render = function(filter = "") {
        const cont = document.getElementById('categories-container');
        cont.innerHTML = "";
        const cats = [...new Set(playlistData.map(m => m.cat))];
        cats.forEach(c => {
            const items = playlistData.filter(m => m.cat === c);
            let html = `<div class="category-title">${c}</div><div class="carousel">`;
            items.forEach(m => {
                const prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
                const pct = (prog[m.t]) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
            });
            html += `</div>`;
            cont.innerHTML += html;
        });
    };

    window.openDetails = function(idx) {
        const m = playlistData[idx];
        document.getElementById('det-hero').style.backgroundImage = `url('${m.img}')`;
        document.getElementById('det-title').innerText = m.t;
        document.getElementById('det-year').innerText = m.year || "2025";
        document.getElementById('det-desc').innerText = m.desc || "Chargement du résumé...";
        
        if (m.trailer) {
            document.getElementById('det-trailer').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}" frameborder="0" allowfullscreen></iframe>`;
        }
        if (m.actors_pics) {
            document.getElementById('det-cast').innerHTML = m.actors_pics.map(a => `
                <div class="actor-card"><img src="${a.img}"><div class="actor-name">${a.name}</div></div>`).join('');
        }

        document.getElementById('det-play-btn').onclick = () => playMovie(idx);
        document.getElementById('details-overlay').style.display = 'flex';
        document.getElementById('details-overlay').scrollTo(0,0);
    };

    window.playMovie = function(idx) {
        const m = playlistData[idx];
        document.getElementById('details-overlay').style.display = 'none';
        document.getElementById('player-section').style.display = 'block';
        player.src({ src: m.url, type: 'video/mp4' });
        
        const prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        if(prog[m.t]) player.currentTime(prog[m.t].t);
        
        player.play();
        window.currentPlaying = m.t;
    };

    window.closeP = function() { 
        saveProgress();
        player.pause(); 
        document.getElementById('player-section').style.display = 'none'; 
        render();
    };

    function saveProgress() {
        if(!window.currentPlaying) return;
        const t = player.currentTime();
        const d = player.duration();
        let prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        prog[window.currentPlaying] = { t: t, p: (t/d)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(prog));
    }

    window.closeDetails = function() { document.getElementById('details-overlay').style.display = 'none'; };
    window.toggleEditMode = function() { isEditMode = !isEditMode; document.getElementById('profile-screen').classList.toggle('is-editing'); };
    window.switchProfile = function() { location.reload(); };

    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('main-video');
        setInterval(saveProgress, 10000); // Sauvegarde auto toutes les 10s
    });
</script>
</body>
</html>
