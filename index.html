<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - NEXT GEN</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #ff0000; 
            --accent-glow: rgba(255, 0, 0, 0.5);
            --bg: #000000; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BACKGROUND ANIMÉ --- */
        body::before {
            content: "";
            position: fixed;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background: radial-gradient(circle at 10% 20%, rgba(229, 9, 20, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(229, 9, 20, 0.05) 0%, transparent 40%);
            z-index: -1;
            filter: blur(100px);
        }

        /* --- FOCUS ANDROID TV --- */
        [tabindex="0"]:focus {
            outline: none !important;
            transform: scale(1.12) !important;
            box-shadow: 0 0 30px var(--accent-glow) !important;
            border-color: var(--accent) !important;
            z-index: 100;
        }

        /* --- HEADER ULTRA MODERN --- */
        header { 
            position: fixed; top: 0; width: 100%; height: 80px; 
            display: flex; align-items: center; padding: 0 5%; z-index: 2000; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        header.scrolled { 
            height: 70px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .logo { 
            font-weight: 800; font-size: 28px; letter-spacing: -1.5px; 
            background: linear-gradient(to right, #fff, #666);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        
        .nav-links { display: flex; gap: 30px; margin-left: 50px; flex: 1; }
        .nav-btn { 
            background: none; border: none; color: #888; font-weight: 600; font-size: 14px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-btn:hover, .nav-btn.active { color: #fff; transform: translateY(-2px); }
        .nav-btn.active { text-shadow: 0 0 15px rgba(255,255,255,0.5); }

        /* --- CARDS "FLOAT" --- */
        #main-content { padding-top: 120px; }
        .category-title { 
            font-size: 1.6rem; font-weight: 800; margin: 0 5% 20px; 
            display: flex; align-items: center; gap: 15px;
        }
        .category-title::before { content: ""; width: 4px; height: 24px; background: var(--accent); border-radius: 10px; }

        .carousel { display: flex; gap: 20px; padding: 0 5% 40px; overflow-x: auto; scrollbar-width: none; }
        .card { 
            flex: 0 0 190px; cursor: pointer; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            position: relative; border-radius: 15px;
        }
        .card img { 
            width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 15px; 
            border: 1px solid var(--glass-border);
        }
        .card:hover { transform: scale(1.1) translateY(-10px); }
        .card-name { 
            margin-top: 15px; font-size: 13px; font-weight: 600; text-align: center; 
            opacity: 0.7; transition: 0.3s; 
        }
        .card:hover .card-name { opacity: 1; color: var(--accent); }

        /* --- PROGRESS BAR NEON --- */
        .prog-bg { 
            position: absolute; bottom: 45px; left: 10%; width: 80%; height: 4px; 
            background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden;
        }
        .prog-fill { background: var(--accent); box-shadow: 0 0 15px var(--accent); }

        /* --- OVERLAY DÉTAILS IMMERSIF --- */
        #details-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(30px); z-index: 3500; display: none; 
            align-items: center; justify-content: center;
        }
        .details-content { 
            background: rgba(15, 15, 15, 0.8); width: 90%; max-width: 1100px;
            border-radius: 30px; display: flex; overflow: hidden;
            border: 1px solid var(--glass-border); box-shadow: 0 50px 100px rgba(0,0,0,0.9);
        }
        .details-poster { width: 40%; object-fit: cover; }
        .details-info { width: 60%; padding: 60px; position: relative; }
        .btn-play-main { 
            background: #fff; color: #000; border: none; padding: 20px 50px; 
            border-radius: 15px; font-weight: 800; font-size: 18px; cursor: pointer;
            transition: 0.3s; width: 100%;
        }
        .btn-play-main:hover { background: var(--accent); color: #fff; transform: scale(1.02); }

        /* --- LOGIN GLASSMORPHISM --- */
        #login-screen { 
            position: fixed; inset: 0; background: #000; z-index: 5000; 
            display: flex; align-items: center; justify-content: center;
            background: url('https://i.ibb.co/mS6p9Xv/icon-sfpp.png') no-repeat center; background-size: 20%;
        }
        .login-box { 
            background: rgba(20, 20, 20, 0.8); padding: 50px; border-radius: 30px; 
            width: 350px; backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            text-align: center;
        }
        .login-box input { 
            width: 100%; padding: 18px; margin: 10px 0; background: var(--glass);
            border: 1px solid var(--glass-border); color: white; border-radius: 12px; font-size: 16px;
        }

        /* --- PLAYER CUSTOM --- */
        #player-section { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; }
        .vjs-blur-bg { 
            position: absolute; inset: 0; filter: blur(100px) brightness(0.4); 
            background-size: cover; opacity: 0.6;
        }

        @media (max-width: 800px) {
            .details-content { flex-direction: column; }
            .details-poster { width: 100%; height: 300px; }
            .details-info { width: 100%; padding: 30px; }
            .card { flex: 0 0 150px; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:30px; font-size: 40px; background:none; -webkit-text-fill-color:#fff;">SFPP <span style="color:var(--accent)">ELITE</span></div>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit" style="width:100%; padding:18px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:800; cursor:pointer; margin-top:10px;">SE CONNECTER</button>
        <button type="button" class="btn-request" onclick="requestAccess()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;">Besoin d'accès ?</button>
    </form>
</div>

<div id="profile-screen" style="position:fixed; inset:0; background:#000; z-index:4000; display:none; flex-direction:column; align-items:center; justify-content:center;">
    <h1 style="font-size: 48px; font-weight: 800; letter-spacing: -2px;">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list" style="display:grid; grid-template-columns: repeat(2,1fr); gap:40px; margin:40px 0;"></div>
    <button class="btn-manage" onclick="toggleEditMode()" style="background:none; border:1px solid #333; color:#666; padding:12px 30px; border-radius:30px; cursor:pointer;">GÉRER LES PROFILS</button>
</div>

<header id="main-header">
    <div class="logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')">Séries</button>
        <button class="nav-btn" id="btn-fav" onclick="changeView('fav')">Ma Liste</button>
    </div>
    <div class="header-actions">
        <button class="btn-icon" onclick="openSearch()">🔍</button>
        <button class="btn-logout" onclick="switchProfile()" style="background:var(--glass); border:1px solid var(--glass-border); color:#fff; padding:8px 15px; border-radius:10px; cursor:pointer; font-weight:600;">PROFILS</button>
    </div>
</header>

<div id="main-content">
    <div id="history-sec" style="display:none">
        <div class="category-title">Continuer la lecture</div>
        <div class="carousel" id="history-container"></div>
    </div>
    <div id="categories-container"></div>
</div>

<div id="details-overlay">
    <div class="details-content">
        <img id="details-img" class="details-poster">
        <div class="details-info">
            <button onclick="closeDetails()" style="position:absolute; top:30px; right:30px; background:none; border:none; color:#fff; font-size:30px; cursor:pointer;">✕</button>
            <h2 id="details-title" style="font-size: 50px; font-weight: 800; margin:0; line-height:1;"></h2>
            <div id="details-meta" style="margin:20px 0; color:var(--accent); font-weight:600;"></div>
            <div id="details-trailer-box"></div>
            <p id="details-desc" style="font-size:18px; color:#aaa; line-height:1.6; margin-bottom:40px;"></p>
            <button id="details-play-btn" class="btn-play-main" tabindex="0">REGARDER MAINTENANT</button>
        </div>
    </div>
</div>

<section id="player-section">
    <div id="player-blur-bg" class="vjs-blur-bg"></div>
    <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
    <div style="padding:50px; position:relative; z-index:10;">
        <h2 id="display-title" style="font-size:40px; margin:0;"></h2>
        <button onclick="closeP()" style="margin-top:30px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:15px 40px; border-radius:12px; cursor:pointer;">RETOUR À L'ACCUEIL</button>
    </div>
</section>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Erreur"));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = function(n, i) {
        currentProfile = n;
        localStorage.setItem('sfpp_profile', n);
        document.getElementById('profile-screen').style.display = 'none';
        render();
    };
    window.switchProfile = () => { localStorage.removeItem('sfpp_profile'); location.reload(); };
</script>

<script>
let player, playlistData = [], currentProfile = null, currentView = 'all', currentPlayingTitle = "";

async function loadPlaylist() { 
    try { 
        const r = await fetch('films.json'); 
        playlistData = await r.json(); 
        render(); 
    } catch(e){} 
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const s = search.toLowerCase();
    cont.innerHTML = "";
    
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = data.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = data.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = data.filter(m => favs.includes(m.t));

    const cats = [...new Set(data.map(m => m.cat))];
    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="carousel">`;
        filtered.forEach(m => {
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
        });
        html += `</div>`;
        cont.innerHTML += html;
    });
}

function openDetails(idx) {
    const m = playlistData[idx];
    document.getElementById('details-img').src = m.img;
    document.getElementById('details-title').innerText = m.t;
    document.getElementById('details-desc').innerText = m.desc || "Pas de description.";
    document.getElementById('details-play-btn').onclick = () => { closeDetails(); playMovie(idx); };
    document.getElementById('details-overlay').style.display = 'flex';
}

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('player-blur-bg').style.backgroundImage = `url('${m.img}')`;
    player.src({ src: m.url, type: 'video/mp4' });
    player.play();
}

function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; }
function closeP() { player.pause(); document.getElementById('player-section').style.display = 'none'; }
function changeView(v) { currentView = v; render(); }

function initProfiles() {
    let p = [{id:1, name:"Elite 1", icon:"🔴", color:"#222"}, {id:2, name:"Elite 2", icon:"⚪", color:"#222"}];
    document.getElementById('profile-list').innerHTML = p.map(x => `<div class="profile-item" onclick="selectProfile('${x.name}','${x.icon}')" tabindex="0"><div style="width:120px; height:120px; background:${x.color}; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:40px; border:2px solid #333;">${x.icon}</div><div style="margin-top:10px;">${x.name}</div></div>`).join('');
}

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video');
    window.addEventListener('scroll', () => {
        if(window.scrollY > 50) document.getElementById('main-header').classList.add('scrolled');
        else document.getElementById('main-header').classList.remove('scrolled');
    });
});
</script>
</body>
</html>
