<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - ULTIMATE</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #ff0000; 
            --bg: #030303; 
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
        }

        /* --- BACKGROUND GRADIENT --- */
        .bg-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(255,0,0,0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(255,0,0,0.05), transparent 40%);
            z-index: -1;
        }

        /* --- HEADER ÉTIRÉ & INTELLIGENT --- */
        header { 
            position: fixed; top: 0; width: 100%; height: 90px; 
            display: flex; align-items: center; padding: 0 4%; z-index: 2000; 
            box-sizing: border-box; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        header.scrolled { 
            height: 70px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-left { display: flex; align-items: center; gap: 30px; flex: 1; }
        .logo { font-weight: 800; font-size: 26px; color: var(--accent); letter-spacing: -1px; }

        .nav-links { display: flex; gap: 20px; }
        .nav-btn { 
            background: var(--glass); border: 1px solid var(--glass-border); color: #aaa; 
            padding: 8px 18px; border-radius: 20px; cursor: pointer; font-weight: 600;
            transition: 0.3s; font-size: 13px;
        }
        .nav-btn.active, .nav-btn:hover { background: #fff; color: #000; border-color: #fff; }

        /* --- BARRE DE RECHERCHE EXTENSIBLE --- */
        .search-container {
            position: relative; display: flex; align-items: center;
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 5px; border-radius: 25px; transition: 0.4s; width: 45px; overflow: hidden;
        }
        .search-container:focus-within { width: 250px; background: rgba(255,255,255,0.1); border-color: #fff; }
        .search-container input {
            background: none; border: none; color: white; padding-left: 15px; width: 180px; outline: none; font-size: 14px;
        }
        .search-icon { font-size: 18px; cursor: pointer; padding: 5px 12px; }

        .header-right { display: flex; align-items: center; gap: 20px; }
        
        /* --- BADGE EXPIRATION --- */
        .expiry-badge {
            background: linear-gradient(45deg, #1a1a1a, #000);
            border: 1px solid #333; padding: 8px 15px; border-radius: 12px;
            font-size: 11px; font-weight: 800; color: #fff; text-align: center;
        }
        .expiry-badge span { color: var(--accent); display: block; font-size: 9px; opacity: 0.7; }

        /* --- CARDS & GRID --- */
        #main-content { padding-top: 110px; }
        .category-title { font-size: 1.5rem; font-weight: 800; margin: 20px 4% 15px; letter-spacing: -0.5px; }
        .carousel { display: flex; gap: 15px; padding: 0 4% 30px; overflow-x: auto; scrollbar-width: none; }
        .card { 
            flex: 0 0 170px; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
            position: relative;
        }
        .card:hover { transform: translateY(-10px) scale(1.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card-name { margin-top: 10px; font-size: 13px; font-weight: 600; color: #888; text-align: center; }

        .prog-bg { position: absolute; bottom: 35px; left: 5px; right: 5px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* --- MODAL DÉTAILS --- */
        #details-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            z-index: 3500; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .details-content { 
            background: #0a0a0a; max-width: 900px; width: 100%; border-radius: 25px; 
            display: flex; overflow: hidden; border: 1px solid var(--glass-border);
        }
        .details-poster { width: 35%; object-fit: cover; }
        .details-info { width: 65%; padding: 40px; }

        /* --- PROFILE SCREEN --- */
        #profile-screen { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-avatar { 
            width: 120px; height: 120px; border-radius: 20px; background: #111; 
            display: flex; align-items: center; justify-content: center; font-size: 40px; 
            border: 2px solid #222; transition: 0.3s; cursor: pointer;
        }
        .profile-avatar:hover { border-color: var(--accent); transform: scale(1.05); }

        /* focus state for TV */
        [tabindex="0"]:focus { outline: 3px solid white; outline-offset: 5px; transform: scale(1.1); }

        @media (max-width: 768px) {
            .details-content { flex-direction: column; }
            .details-poster { width: 100%; height: 250px; }
            .details-info { width: 100%; padding: 20px; }
            .nav-links { display: none; } /* On cache les liens nav sur mobile pour la recherche */
        }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<header id="main-header">
    <div class="header-left">
        <div class="logo">SFPP <span style="color:white">ELITE</span></div>
        <nav class="nav-links">
            <button class="nav-btn active" onclick="changeView('all')">Accueil</button>
            <button class="nav-btn" onclick="changeView('movies')">Films</button>
            <button class="nav-btn" onclick="changeView('series')">Séries</button>
        </nav>
    </div>

    <div class="header-right">
        <div class="search-container" tabindex="0">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher...">
        </div>

        <div class="expiry-badge" id="expiry-display">
            CHARGEMENT...
            <span>FIN D'ABONNEMENT</span>
        </div>

        <button onclick="switchProfile()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer;" tabindex="0">👤</button>
    </div>
</header>

<div id="main-content">
    <div id="categories-container"></div>
</div>

<div id="details-overlay">
    <div class="details-content">
        <img id="details-img" class="details-poster">
        <div class="details-info">
            <h2 id="details-title" style="font-size: 35px; margin: 0 0 15px 0;"></h2>
            <p id="details-desc" style="color: #888; line-height: 1.6;"></p>
            <button id="details-play-btn" style="width:100%; padding:15px; background:white; color:black; border:none; border-radius:12px; font-weight:800; cursor:pointer; margin-top:20px;" tabindex="0">LECTURE</button>
            <button onclick="closeDetails()" style="width:100%; margin-top:10px; background:none; border:none; color:#555; cursor:pointer;">Fermer</button>
        </div>
    </div>
</div>

<div id="profile-screen">
    <h1 style="font-size: 40px; margin-bottom: 50px;">Qui regarde ?</h1>
    <div id="profile-list" style="display:flex; gap:30px;">
        </div>
</div>

<section id="player-section" style="display:none; position:fixed; inset:0; background:#000; z-index:5000;">
    <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
    <button onclick="closeP()" style="position:absolute; top:20px; left:20px; z-index:5001; background:rgba(0,0,0,0.5); color:white; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">✕ RETOUR</button>
</section>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            loadPlaylist();
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            document.getElementById('expiry-display').innerHTML = `${snap.val() || 'N/A'} <span>ABONNEMENT ÉLITE</span>`;
            
            if(!localStorage.getItem('sfpp_profile')) {
                showProfiles();
            } else {
                render();
            }
        } else {
            // Rediriger vers login si besoin
        }
    });

    window.showProfiles = function() {
        document.getElementById('profile-screen').style.display = 'flex';
        const list = document.getElementById('profile-list');
        const p = ["Elite 1", "Elite 2", "Elite 3"];
        list.innerHTML = p.map(n => `<div onclick="selectProfile('${n}')" class="profile-avatar" tabindex="0">👤<div style="font-size:14px; position:absolute; bottom:-30px;">${n}</div></div>`).join('');
    }

    window.selectProfile = (n) => {
        localStorage.setItem('sfpp_profile', n);
        document.getElementById('profile-screen').style.display = 'none';
        render();
    }
</script>

<script>
    let player, playlistData = [], currentView = 'all';

    async function loadPlaylist() {
        const r = await fetch('films.json');
        playlistData = await r.json();
        render();
    }

    function render(search = "") {
        const cont = document.getElementById('categories-container');
        cont.innerHTML = "";
        const s = search.toLowerCase();
        const cats = [...new Set(playlistData.map(m => m.cat))];

        cats.forEach(c => {
            const filtered = playlistData.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
            if (filtered.length === 0) return;
            let html = `<div class="category-title">${c}</div><div class="carousel">`;
            filtered.forEach(m => {
                html += `
                <div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0">
                    <img src="${m.img}">
                    <div class="card-name">${m.t}</div>
                </div>`;
            });
            html += `</div>`;
            cont.innerHTML += html;
        });
    }

    function openDetails(idx) {
        const m = playlistData[idx];
        document.getElementById('details-img').src = m.img;
        document.getElementById('details-title').innerText = m.t;
        document.getElementById('details-desc').innerText = m.desc || "Aucune description disponible pour ce titre.";
        document.getElementById('details-play-btn').onclick = () => playMovie(idx);
        document.getElementById('details-overlay').style.display = 'flex';
    }

    function playMovie(idx) {
        const m = playlistData[idx];
        document.getElementById('player-section').style.display = 'block';
        player.src({ src: m.url, type: 'video/mp4' });
        player.play();
    }

    function filter() { render(document.getElementById('searchBar').value); }
    function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; }
    function closeP() { player.pause(); document.getElementById('player-section').style.display = 'none'; }
    function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }

    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('main-video');
        window.addEventListener('scroll', () => {
            if(window.scrollY > 30) document.getElementById('main-header').classList.add('scrolled');
            else document.getElementById('main-header').classList.remove('scrolled');
        });
    });
</script>
</body>
</html>
