<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; --card-radius: 8px; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding-bottom: 50px; -webkit-font-smoothing: antialiased; }
        
        [tabindex="0"]:focus {
            outline: 3px solid white !important;
            outline-offset: 2px;
            transform: scale(1.05);
            background: rgba(255,255,255,0.1);
            z-index: 100;
        }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-request { background: none !important; border: none; color: #666 !important; font-size: 11px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; border-radius: 8px; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-name { font-size: 14px; color: #888; }
        
        .edit-icon { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border-radius: 50%; padding: 5px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }
        .btn-manage { margin-top: 40px; background: none; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-size: 14px; letter-spacing: 1px; }

        header { 
            position: fixed; top: 0; width: 100%; height: 65px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0) 100%); 
            display: flex; align-items: center; 
            padding: 0 4%; z-index: 2000; 
            justify-content: space-between; box-sizing: border-box; gap: 10px;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 22px; flex-shrink: 0; letter-spacing: 1px; }
        
        .nav-links { 
            display: flex; gap: 20px; flex: 1; overflow-x: auto; 
            white-space: nowrap; align-items: center; scrollbar-width: none;
            -webkit-overflow-scrolling: touch; justify-content: flex-start;
            margin: 0 20px;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: none; border: none; color: #e5e5e5; cursor: pointer; font-size: 14px; font-weight: 400; padding: 10px 0; transition: 0.3s; flex-shrink: 0; }
        .nav-btn.active { color: white; font-weight: 700; border-bottom: 3px solid var(--accent); }

        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 65px;
            background: #000; display: none; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 2001;
        }
        #searchBar { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 4px; outline: none; font-size: 15px; }
        
        .header-actions { display: flex; align-items: center; gap: 15px; flex-shrink: 0; }
        .btn-icon { background: none; border: none; color: white; font-size: 20px; cursor: pointer; opacity: 0.8; transition: 0.3s; }
        .btn-logout { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; }

        /* OVERLAY DETAILS - DESIGN PROFESSIONNEL */
        #details-overlay {
            position: fixed; inset: 0; background: #000;
            z-index: 3500; display: none; align-items: flex-start; justify-content: center;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
        }
        .details-content {
            width: 100%; max-width: 1000px; min-height: 100vh;
            display: flex; flex-direction: column; position: relative;
            background: var(--bg); animation: fadeIn 0.4s ease;
        }
        .details-hero {
            position: relative; width: 100%; height: 60vh;
            display: flex; align-items: flex-end; padding: 40px 6%;
            box-sizing: border-box; overflow: hidden;
        }
        .hero-bg {
            position: absolute; inset: 0; 
            background-size: cover; background-position: center 20%;
            z-index: 0; transform: scale(1.05); filter: brightness(0.7);
        }
        .hero-gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to top, var(--bg) 5%, transparent 60%),
                        linear-gradient(to right, rgba(0,0,0,0.8) 0%, transparent 100%);
            z-index: 1;
        }
        .hero-info { position: relative; z-index: 2; max-width: 600px; }
        .hero-info h2 { font-size: clamp(28px, 5vw, 48px); margin: 0 0 15px 0; font-weight: 800; line-height: 1.1; }
        
        .details-body { 
            position: relative; z-index: 3; padding: 0 6% 60px; 
            display: grid; grid-template-columns: 1fr 300px; gap: 40px;
            margin-top: -20px;
        }
        .details-main-col { display: flex; flex-direction: column; gap: 25px; }
        .details-side-col { display: flex; flex-direction: column; gap: 25px; }

        .meta-row { display: flex; align-items: center; gap: 15px; color: #a3a3a3; font-size: 14px; font-weight: 600; margin-bottom: 20px; }
        .meta-badge { border: 1px solid #666; padding: 2px 8px; border-radius: 3px; color: #fff; font-size: 12px; }
        .synopsis-text { font-size: 17px; line-height: 1.6; color: #e5e5e5; margin: 0; }
        
        .cast-section h3 { font-size: 14px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .cast-list { display: flex; flex-wrap: wrap; gap: 15px; }
        .actor-card { width: 80px; text-align: center; }
        .actor-card img { width: 65px; height: 65px; border-radius: 50%; object-fit: cover; margin-bottom: 8px; border: 2px solid #333; }
        .actor-card span { font-size: 11px; color: #bbb; display: block; line-height: 1.2; }

        .trailer-preview { 
            width: 100%; aspect-ratio: 16/9; background: #111; 
            border-radius: var(--card-radius); overflow: hidden; border: 1px solid #333;
        }

        .btn-play-hero { 
            background: white; color: black; border: none; 
            padding: 14px 35px; border-radius: 4px; font-weight: 700; 
            cursor: pointer; font-size: 18px; display: flex; align-items: center; gap: 10px;
            transition: 0.2s; width: fit-content;
        }
        .btn-close-overlay { 
            position: fixed; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3); 
            color: white; width: 45px; height: 45px; border-radius: 50%; 
            cursor: pointer; z-index: 4000; font-size: 20px;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        /* CARDS - CORRECTION DES PROPORTIONS */
        .category-row { position: relative; width: 100%; margin-bottom: 30px; }
        .category-title { font-size: clamp(16px, 3vw, 20px); font-weight: 700; margin: 0 4% 15px; color: #fff; }
        
        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 0 4% 20px; scrollbar-width: none; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .carousel::-webkit-scrollbar { display: none; }

        .card { 
            flex: 0 0 160px; 
            width: 160px;
            cursor: pointer; 
            transition: 0.3s ease; 
            position: relative; 
        }
        .card:hover { transform: scale(1.05); z-index: 10; }
        
        .card img { 
            width: 100% !important; 
            height: 240px !important; /* Ratio 2:3 forcé */
            object-fit: cover !important; 
            border-radius: var(--card-radius); 
            background: #1a1a1a;
            display: block;
        }

        .card-name { margin-top: 8px; font-size: 13px; color: #a3a3a3; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; text-align: left; }

        .prog-bg { position: absolute; bottom: 30px; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 0 0 var(--card-radius) var(--card-radius); overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); }

        /* PLAYER */
        #player-section { display: none; width: 100%; background: #000; position: fixed; inset: 0; z-index: 4500; overflow-y: auto; }
        .video-container { position: relative; width: 100%; background: #000; }
        .vjs-blur-bg { position: absolute; inset: 0; z-index: 0; background-size: cover; background-position: center; filter: blur(30px) brightness(0.3); transform: scale(1.2); }
        
        #main-content { padding-top: 80px; }
        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 80px 5% 40px; }
        .episode-item { background: #161616; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; gap: 15px; border: 1px solid #222; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            .card { flex: 0 0 130px; width: 130px; }
            .card img { height: 195px !important; }
            .details-body { grid-template-columns: 1fr; padding-top: 20px; }
            .details-hero { height: 50vh; }
            .details-side-col { order: -1; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="email" id="user" name="email" placeholder="E-mail" autocapitalize="none" autocomplete="username" required>
        <input type="password" id="pass" name="password" placeholder="Mot de passe" autocomplete="current-password" required>

<header>

<div id="main-content">
    <div id="expiration-banner" style="display: none; background: var(--gold); color: #000; text-align: center; padding: 10px; font-weight: bold;"></div>
    <div id="history-sec" style="display:none">
        <div class="category-title">Reprendre avec <span id="current-user-name"></span></div>
        <div class="category-row">
            <div class="carousel" id="history-container"></div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    const savedEmail = localStorage.getItem('sfpp_last_email');
    if(savedEmail) document.getElementById('user').value = savedEmail;

    async function verifyExpiration(user) {
        if (!user) return false;
        const snapshot = await get(ref(db, 'users_data/' + user.uid + '/expire'));
        const expireValue = snapshot.val();
        if (!expireValue) return false;
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const todayStr = `${y}-${m}-${d}`;
        if (todayStr >= expireValue) {
            alert("Accès expiré le " + expireValue);
            await signOut(auth);
            const mail = localStorage.getItem('sfpp_last_email');
            localStorage.clear();
            localStorage.setItem('sfpp_last_email', mail);
            localStorage.setItem('sfpp_device_id', deviceId);
            location.reload();
            return true;
        }
        return false;
    }

    window.startSessionSync = function(uid) {
        onValue(ref(db, 'sessions/' + uid), (snapshot) => {
            const session = snapshot.val();
            if (session && session.deviceId !== deviceId) {
                alert("⚠️ Ce compte est utilisé sur un autre appareil.");
                localStorage.removeItem('sfpp_profile'); 
                signOut(auth).then(() => location.reload());
            }
        });
    };

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            const exp = await verifyExpiration(u.user);
            if (!exp) { set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() }); }
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            if (await verifyExpiration(user)) return;
            window.startSessionSync(user.uid);
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            const expireValue = snap.val();
            if(expireValue) {
                const today = new Date();
                const expireDate = new Date(expireValue);
                const diffDays = Math.ceil((expireDate - today) / (1000 * 60 * 60 * 24));
                const banner = document.getElementById('expiration-banner');
                if(diffDays > 0 && diffDays <= 5) {
                    banner.style.display = 'block';
                    banner.innerHTML = `⚠️ Fin d'accès dans ${diffDays} jour(s).`;
                }
            }
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = async function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('current-user-name').innerText = name;
        const user = auth.currentUser;
        if(user) {
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            document.getElementById('header-logo').innerHTML = `SFPP | ${icon} <span style="font-size:10px; color:#666;">(${snap.val()})</span>`;
        }
        render();
        if (window.history.state?.overlay !== 'home') window.history.pushState({ overlay: 'home' }, "");
    };

    window.logout = function() { 
        const mail = localStorage.getItem('sfpp_last_email');
        signOut(auth).then(() => { localStorage.clear(); localStorage.setItem('sfpp_last_email', mail); localStorage.setItem('sfpp_device_id', deviceId); location.reload(); }); 
    };
</script>

<script>
let player, playlistData = [], currentProfile = null, isEditMode = false, currentView = 'all', currentPlayingTitle = "", exitConfirmed = false;

window.addEventListener('popstate', function (event) {
    if (document.getElementById('details-overlay').style.display === 'flex') { closeDetails(); return; }
    if (document.getElementById('series-overlay').style.display === 'block') { document.getElementById('series-overlay').style.display = 'none'; return; }
    if (document.getElementById('player-section').style.display === 'block') { closeP(); return; }
    if (!exitConfirmed) {
        history.pushState({ overlay: 'home' }, "");
        if (confirm("Quitter l'application ?")) { exitConfirmed = true; history.back(); }
    }
});

function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('searchBar').focus(); }
function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; document.getElementById('searchBar').value = ''; filter(); }

async function loadPlaylist() { try { const response = await fetch('films.json'); playlistData = await response.json(); render(); } catch (e) {} }

function openDetails(idx) {
    history.pushState({ overlay: 'details' }, "");
    const m = playlistData[idx];
    
    document.getElementById('hero-bg-img').style.backgroundImage = `url('${m.img}')`;
    document.getElementById('details-title').innerText = m.t;
    document.getElementById('details-desc').innerText = m.desc || "Aucun synopsis disponible.";
    
    const castCont = document.getElementById('details-cast-list');
    castCont.innerHTML = "";
    if (m.actors_pics && m.actors_pics.length > 0) {
        m.actors_pics.forEach(a => {
            castCont.innerHTML += `<div class="actor-card"><img src="${a.img}" onerror="this.src='https://via.placeholder.com/65'"><span>${a.name}</span></div>`;
        });
    } else {
        castCont.innerHTML = `<p style="color:#666; font-size:13px;">${m.actors || m.cast || 'Casting non renseigné'}</p>`;
    }

    const tBox = document.getElementById('details-trailer-box');
    tBox.innerHTML = m.trailer ? `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}?rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>` : `<div style="display:flex; align-items:center; justify-content:center; height:100%; color:#444;">Bande-annonce non disponible</div>`;
    
    document.getElementById('details-play-btn').onclick = () => playMovie(idx);
    document.getElementById('details-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeDetails() {
    document.getElementById('details-overlay').style.display = 'none';
    document.getElementById('details-trailer-box').innerHTML = "";
    document.body.style.overflow = 'auto';
}

function initProfiles() {
    let profiles = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
        { id: 1, name: "Profil 1", icon: "🟦", color: "#1e90ff" },
        { id: 2, name: "Profil 2", icon: "🟩", color: "#2ecc71" },
        { id: 3, name: "Profil 3", icon: "🟧", color: "#e67e22" },
        { id: 4, name: "Profil 4", icon: "🟪", color: "#9b59b6" }
    ];
    document.getElementById('profile-list').innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="handleProfileClick(${p.id}, '${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div class="edit-icon">✏️</div>
            <div class="profile-name">${p.name}</div>
        </div>`).join('');
}

function handleProfileClick(id, name, icon) {
    if(isEditMode) {
        let n = prompt("Nouveau nom :", name);
        if(n) {
            let saved = JSON.parse(localStorage.getItem('sfpp_profiles_data') || "[]");
            const idx = saved.findIndex(p => p.id === id);
            if(idx !== -1) { saved[idx].name = n; localStorage.setItem('sfpp_profiles_data', JSON.stringify(saved)); initProfiles(); }
        }
    } else selectProfile(name, icon);
}

function toggleFavCurrent() {
    let key = 'sfpp_fav_' + currentProfile;
    let favs = JSON.parse(localStorage.getItem(key) || "[]");
    if(favs.includes(currentPlayingTitle)) favs = favs.filter(t => t !== currentPlayingTitle);
    else favs.push(currentPlayingTitle);
    localStorage.setItem(key, JSON.stringify(favs));
    updatePlayerFavUI();
    render(document.getElementById('searchBar').value);
}

function updatePlayerFavUI() {
    let favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const btn = document.getElementById('player-fav-btn');
    btn.innerText = favs.includes(currentPlayingTitle) ? "❤️ Dans Ma Liste" : "+ Ma Liste";
}

function saveP() {
    if(!currentPlayingTitle || !currentProfile) return;
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        prog[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(prog));
    }
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histSec = document.getElementById('history-sec');
    const histCont = document.getElementById('history-container');
    cont.innerHTML = ""; histCont.innerHTML = "";
    const s = search.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    if(currentProfile && s === "" && currentView === 'all') {
        let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
        if(history.length > 0) {
            histSec.style.display = "block";
            history.slice().reverse().forEach(title => {
                const m = playlistData.find(item => item.t === title);
                if(m) {
                    const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                    histCont.innerHTML += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
                }
            });
        }
    }

    const cats = [...new Set(data.map(m => m.cat))];
    let addedSeries = [];

    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="carousel">`;
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const heart = favs.includes(m.t) ? `<div style="position:absolute; top:8px; right:8px; z-index:5; font-size:12px;">❤️</div>` : "";
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}">${heart}<div class="card-name">${sName}</div></div>`;
                }
            } else {
                html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${heart}${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        html += `</div>`;
        cont.innerHTML += html;
    });
}

function openSeries(name) {
    history.pushState({ overlay: 'series' }, "");
    const overlay = document.getElementById('series-overlay');
    const content = document.getElementById('series-detail-content');
    const eps = playlistData.filter(m => m.t.startsWith(name));
    overlay.style.display = 'block';
    let html = `<div style="display:flex; gap:25px; align-items:center; margin-bottom:40px;"><img src="${eps[0].img}" style="width:140px; border-radius:8px;"><div><h1 style="margin:0">${name}</h1><p style="color:#666">${eps.length} Épisodes disponibles</p></div></div>`;
    const seasons = {};
    eps.forEach(ep => {
        const sMatch = ep.t.match(/S(\d{2})/);
        const sNum = sMatch ? sMatch[1] : "01";
        if(!seasons[sNum]) seasons[sNum] = [];
        seasons[sNum].push(ep);
    });
    Object.keys(seasons).sort().forEach(s => {
        html += `<h3 style="color:var(--accent); margin:30px 0 15px; border-bottom:1px solid #222; padding-bottom:10px;">SAISON ${s}</h3>`;
        seasons[s].forEach(ep => {
            const epName = ep.t.split(' - ')[1] || ep.t;
            html += `<div class="episode-item" onclick="openDetails(${playlistData.indexOf(ep)});" tabindex="0"><div style="flex:1"><b>${epName}</b></div><div style="color:var(--accent); font-size:12px; font-weight:bold;">DETAILS</div></div>`;
        });
    });
    content.innerHTML = html;
}

function playMovie(idx) {
    history.replaceState({ overlay: 'player' }, "");
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    if(currentProfile) {
        let key = 'sfpp_hist_' + currentProfile;
        let hist = JSON.parse(localStorage.getItem(key) || "[]").filter(t => t !== m.t);
        hist.push(m.t); if(hist.length > 20) hist.shift();
        localStorage.setItem(key, JSON.stringify(hist));
    }
    closeDetails();
    document.getElementById('series-overlay').style.display = 'none';
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('display-desc').innerText = m.desc || "";
    updatePlayerFavUI();
    document.getElementById('player-blur-bg').style.backgroundImage = `url('${m.img}')`;
    player.poster(m.img); 
    player.src({ src: m.url, type: 'video/mp4' });
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t] && prog[m.t].t > 10) player.currentTime(prog[m.t].t);
    player.play();
}

function playNextEpisode() {
    const parts = currentPlayingTitle.match(/(.*[SE])(\d+)(.*)/i);
    if (!parts) return;
    const nextSearch = (parts[1] + (parseInt(parts[2]) + 1).toString().padStart(2, '0')).toUpperCase();
    const nextIdx = playlistData.findIndex(m => m.t.toUpperCase().includes(nextSearch));
    if (nextIdx !== -1) playMovie(nextIdx);
}

function closeP() { saveP(); player.pause(); document.getElementById('player-section').style.display = 'none'; render(); }
function closeSeries() { document.getElementById('series-overlay').style.display = 'none'; }
function changeView(v) { currentView = v; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+v).classList.add('active'); render(); }
function filter() { render(document.getElementById('searchBar').value); }
function toggleEditMode() { isEditMode = !isEditMode; document.getElementById('profile-screen').classList.toggle('is-editing'); }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }
function requestAccess() { window.location.href = "mailto:sfpp.ott@gmail.com"; }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { controls: true, fluid: true, techOrder: ['chromecast', 'html5'], plugins: { chromecast: { addButtonToControlBar: true } } });
    player.on('timeupdate', () => {
        const dur = player.duration(), cur = player.currentTime();
        if (/S\d{2}E\d{2}/i.test(currentPlayingTitle) && dur > 0 && (dur - cur) < 80) document.getElementById('next-episode-btn').style.display = 'block';
        if(Math.floor(cur) % 10 === 0) saveP();
    });
    const Button = videojs.getComponent('Button');
    class Back extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-replay-10'; } handleClick() { player.currentTime(player.currentTime()-10); } }
    class Forward extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-forward-10'; } handleClick() { player.currentTime(player.currentTime()+10); } }
    videojs.registerComponent('Back', Back); videojs.registerComponent('Forward', Forward);
    player.ready(() => { player.getChild('controlBar').addChild('Back', {}, 1); player.getChild('controlBar').addChild('Forward', {}, 2); });
});
</script>
</body>
