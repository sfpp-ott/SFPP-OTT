<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; --card-w: 160px; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        [tabindex="0"]:focus {
            outline: 4px solid white !important;
            outline-offset: 4px;
            transform: scale(1.1) !important;
            background: rgba(255,255,255,0.1);
            z-index: 1000;
            border-radius: 8px;
        }

        #login-screen, #profile-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: #0a0a0a; padding: 40px; border-radius: 15px; width: 300px; text-align: center; border: 1px solid #222; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .login-box button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: 900; border-radius: 8px; cursor: pointer; letter-spacing: 1px; }
        
        .profile-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; max-width: 90%; margin-top: 40px; }
        .profile-item { text-align: center; cursor: pointer; transition: 0.3s; width: 140px; }
        .profile-avatar { width: 120px; height: 120px; border-radius: 12px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid transparent; transition: 0.3s; }
        .profile-item:hover .profile-avatar { border-color: white; transform: translateY(-10px); }
        .profile-name { font-size: 16px; color: #aaa; font-weight: 500; }

        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); 
            display: flex; align-items: center; padding: 0 4%; z-index: 2000; 
            justify-content: space-between; box-sizing: border-box; transition: background 0.3s;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 24px; letter-spacing: -1px; }
        
        .nav-links { display: flex; gap: 5px; align-items: center; }
        .nav-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; font-weight: 600; padding: 8px 15px; border-radius: 20px; }
        .nav-btn.active { color: white; background: rgba(255,255,255,0.15); }

        #main-content { padding-top: 80px; }
        .category-title { font-size: 20px; font-weight: 800; margin: 30px 4% 15px; color: #e5e5e5; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 10px 4% 20px; scrollbar-width: none; }

        /* CORRECTIF TAILLE DES JAQUETTES */
        .card { flex: 0 0 var(--card-w); width: var(--card-w); cursor: pointer; transition: 0.4s; position: relative; }
        .card img { 
            width: 100%; 
            height: 240px; 
            aspect-ratio: 2/3; 
            object-fit: cover; 
            border-radius: 8px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            background: #1a1a1a;
        }
        .card-name { margin-top: 10px; font-size: 13px; text-align: center; color: #999; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #details-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 3500; display: none; align-items: center; justify-content: center; }
        .details-content { background: #111; max-width: 900px; width: 92%; border-radius: 15px; display: flex; overflow: hidden; position: relative; }
        .details-poster { width: 35%; object-fit: cover; }
        .details-info { width: 65%; padding: 40px; }
        
        #player-section { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); window.checkLogin();">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="email" id="user" placeholder="E-mail" required autocomplete="username">
        <input type="password" id="pass" placeholder="Mot de passe" required autocomplete="current-password">
        <button type="submit">CONNEXION</button>
    </form>
</div>

<div id="profile-screen" style="display:none;">
    <h1>Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button onclick="logout()" style="margin-top:20px; background:none; border:none; color:#444;">DÉCONNEXION</button>
</div>

<header>
    <div class="logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" onclick="changeView('fav')">Ma Liste ❤️</button>
    </div>
    <button onclick="switchProfile()" style="background:#333; color:white; border:none; padding:5px 10px; border-radius:4px; cursor:pointer;">PROFILS</button>
</header>

<div id="main-content">
    <div id="expiration-banner" style="display:none; background:var(--gold); color:black; text-align:center; padding:10px; font-weight:bold;"></div>
    <div id="categories-container"></div>
</div>

<div id="details-overlay">
    <div class="details-content">
        <button onclick="closeDetails()" style="position:absolute; top:15px; right:15px; background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
        <img id="details-img" class="details-poster" src="">
        <div class="details-info">
            <h2 id="details-title"></h2>
            <p id="details-desc" style="color:#ccc;"></p>
            <button id="details-play-btn" style="background:white; color:black; border:none; padding:15px 30px; border-radius:8px; font-weight:bold; cursor:pointer;">▶ Lancer</button>
        </div>
    </div>
</div>

<section id="player-section">
    <video id="main-video" class="video-js vjs-theme-fantasy" controls preload="auto" width="100%" height="100%"></video>
    <button onclick="closeP()" style="position:absolute; top:20px; left:20px; z-index:5000; background:rgba(0,0,0,0.5); color:white; border:none; padding:10px; border-radius:5px; cursor:pointer;">✕ Retour</button>
</section>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // VÉRIFICATION DE LA DATE DE VALIDITÉ
    async function checkExpiration(user) {
        const snapshot = await get(ref(db, `users_data/${user.uid}/expire`));
        const expireDate = snapshot.val(); 
        
        if (expireDate) {
            const today = new Date().toISOString().split('T')[0]; // Format YYYY-MM-DD
            if (today >= expireDate) {
                alert("Votre accès a expiré le : " + expireDate);
                signOut(auth);
                return true;
            }
            // Affiche la date dans une bannière si l'utilisateur est connecté
            const banner = document.getElementById('expiration-banner');
            banner.style.display = 'block';
            banner.innerText = "Abonnement valide jusqu'au : " + expireDate;
        }
        return false;
    }

    window.checkLogin = function() {
        const email = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(err => alert("Erreur: " + err.message));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const isExpired = await checkExpiration(user);
            if (!isExpired) {
                document.getElementById('login-screen').style.display = 'none';
                loadPlaylist();
                initProfiles();
                if(localStorage.getItem('sfpp_profile')) {
                    document.getElementById('profile-screen').style.display = 'none';
                } else {
                    document.getElementById('profile-screen').style.display = 'flex';
                }
            }
        } else {
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('profile-screen').style.display = 'none';
        }
    });

    window.logout = function() { signOut(auth).then(() => { localStorage.clear(); location.reload(); }); };
</script>

<script>
    let player, playlistData = [], currentProfile = null, currentView = 'all';

    async function loadPlaylist() {
        try {
            const response = await fetch('films.json');
            playlistData = await response.json();
            render();
        } catch (e) { console.error("Erreur chargement JSON"); }
    }

    function initProfiles() {
        const profiles = [{name:"SFPP 1", icon:"🟦"}, {name:"SFPP 2", icon:"🟩"}];
        const list = document.getElementById('profile-list');
        list.innerHTML = profiles.map(p => `
            <div class="profile-item" onclick="selectProfile('${p.name}')" tabindex="0">
                <div class="profile-avatar">${p.icon}</div>
                <div class="profile-name">${p.name}</div>
            </div>`).join('');
    }

    window.selectProfile = function(name) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        document.getElementById('profile-screen').style.display = 'none';
        render();
    };

    function render() {
        const cont = document.getElementById('categories-container');
        cont.innerHTML = "";
        const cats = [...new Set(playlistData.map(m => m.cat))];
        
        cats.forEach(c => {
            let filtered = playlistData.filter(m => m.cat === c);
            let html = `<div class="category-title">${c}</div><div class="carousel">`;
            filtered.forEach(m => {
                html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0">
                            <img src="${m.img}">
                            <div class="card-name">${m.t}</div>
                         </div>`;
            });
            html += `</div>`;
            cont.innerHTML += html;
        });
    }

    function openDetails(idx) {
        const m = playlistData[idx];
        document.getElementById('details-img').src = m.img;
        document.getElementById('details-title').innerText = m.t;
        document.getElementById('details-desc').innerText = m.desc || "Pas de description.";
        document.getElementById('details-play-btn').onclick = () => playMovie(m.url);
        document.getElementById('details-overlay').style.display = 'flex';
    }

    function playMovie(url) {
        document.getElementById('details-overlay').style.display = 'none';
        document.getElementById('player-section').style.display = 'block';
        player.src({ src: url, type: 'video/mp4' });
        player.play();
    }

    function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; }
    function closeP() { player.pause(); document.getElementById('player-section').style.display = 'none'; }
    function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }

    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('main-video');
    });
</script>
</body>
</html>
