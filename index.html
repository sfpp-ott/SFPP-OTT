<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - STREAMING PRO</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { 
            --accent: #e50914; 
            --gold: #ffcc00; 
            --bg: #050505; 
            --glass: rgba(15, 15, 15, 0.85);
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            margin: 0; 
            padding-bottom: 50px; 
            -webkit-font-smoothing: antialiased;
        }
        
        /* FOCUS & ACCESSIBILITÉ */
        [tabindex="0"]:focus {
            outline: 3px solid var(--accent) !important;
            outline-offset: 2px;
            transform: scale(1.05);
            z-index: 100;
        }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 40px; border-radius: 12px; width: 320px; text-align: center; border: 1px solid #333; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
        .login-box input:focus { border-color: var(--accent); outline: none; }
        .login-box button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; transition: opacity 0.3s; }
        .login-box button:hover { opacity: 0.9; }
        .btn-request { background: none !important; border: none; color: #888 !important; font-size: 12px; margin-top: 20px; cursor: pointer; text-decoration: underline; }

        /* PROFILES */
        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.5s; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; width: 85%; max-width: 450px; margin-top: 40px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.3s; position: relative; }
        .profile-item:hover { transform: scale(1.1); }
        .profile-avatar { width: 110px; height: 110px; border-radius: 8px; margin: 0 auto 12px; display: flex; align-items: center; justify-content: center; font-size: 45px; border: 3px solid transparent; transition: border 0.3s; }
        .profile-item:hover .profile-avatar { border-color: white; }
        .profile-name { font-size: 16px; color: #aaa; transition: color 0.3s; }
        .profile-item:hover .profile-name { color: white; }
        
        .edit-icon { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border-radius: 50%; padding: 8px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }

        /* HEADER GLASSMORPHISM */
        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 4%; z-index: 2000; 
            border-bottom: 1px solid rgba(255,255,255,0.1); justify-content: space-between; box-sizing: border-box; gap: 20px;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 22px; letter-spacing: 1px; flex-shrink: 0; }
        
        .nav-links { 
            display: flex; gap: 20px; flex: 1; overflow-x: auto; 
            scrollbar-width: none; align-items: center;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; font-weight: 500; padding: 10px 0; transition: all 0.3s; white-space: nowrap; }
        .nav-btn:hover { color: white; }
        .nav-btn.active { color: white; font-weight: bold; position: relative; }
        .nav-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--accent); border-radius: 2px; }

        #search-overlay {
            position: absolute; inset: 0; background: #000; display: none; align-items: center; padding: 0 4%; z-index: 2001;
        }
        #searchBar { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 16px; }

        /* PLAYER & BLUR */
        #player-section { display: none; position: fixed; inset: 0; background: #000; z-index: 4500; }
        .vjs-blur-bg {
            position: absolute; inset: 0; z-index: 0;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.2); transform: scale(1.2); 
        }

        /* DETAILS OVERLAY */
        #details-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 3500; display: none; flex-direction: column; overflow-y: auto;
            scrollbar-width: thin;
        }
        .details-hero { 
            position: relative; width: 100%; height: 65vh; 
            background-size: cover; background-position: center top; 
            transition: background 0.5s ease;
        }
        .details-hero::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg) 5%, transparent 100%),
                        linear-gradient(to right, var(--bg) 0%, transparent 50%); 
        }

        .details-info { padding: 0 5% 60px; margin-top: -120px; position: relative; z-index: 5; }
        .details-info h2 { font-size: clamp(30px, 5vw, 50px); font-weight: bold; margin-bottom: 15px; }

        /* CARDS & CAROUSEL */
        .category-row { position: relative; margin-bottom: 30px; }
        .category-title { font-size: 20px; font-weight: bold; margin: 0 4% 15px; color: #e5e5e5; }
        
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 4% 20px; scrollbar-width: none; scroll-behavior: smooth; }
        .card { 
            flex: 0 0 160px; width: 160px; cursor: pointer; transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            position: relative; border-radius: 6px; overflow: hidden;
        }
        .card:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 10px 20px rgba(0,0,0,0.6); }
        .card img { width: 160px; height: 240px; object-fit: cover; background: #1a1a1a; display: block; }
        .card-name { padding: 8px 2px; font-size: 13px; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .prog-bg { position: absolute; bottom: 35px; left: 5%; width: 90%; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .prog-fill { height: 100%; background: var(--accent); border-radius: 2px; }

        /* ANIMATIONS */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @media (max-width: 768px) {
            header { height: 60px; }
            .card { flex: 0 0 130px; width: 130px; }
            .card img { height: 195px; }
            .details-hero { height: 50vh; }
        }
    </style>
</head>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    // PRO VERIFICATION: Date objects comparison
    async function verifyExpiration(user) {
        if (!user) return false;
        const snapshot = await get(ref(db, 'users_data/' + user.uid + '/expire'));
        const expireValue = snapshot.val();
        if (!expireValue) return false;
        
        const now = new Date();
        const expireDate = new Date(expireValue);
        
        if (now > expireDate) {
            alert("Accès expiré le " + expireValue);
            await signOut(auth);
            localStorage.removeItem('sfpp_profile');
            location.reload();
            return true;
        }
        return false;
    }

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            const exp = await verifyExpiration(u.user);
            if (!exp) { 
                set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() }); 
            }
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            if (await verifyExpiration(user)) return;
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            if(snap.val()) {
                const diff = Math.ceil((new Date(snap.val()) - new Date()) / (1000*60*60*24));
                if(diff > 0 && diff <= 5) {
                    const banner = document.getElementById('expiration-banner');
                    banner.style.display = 'block';
                    banner.innerText = `⚠️ Votre abonnement expire dans ${diff} jours.`;
                }
            }
            
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = async function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        render();
    };

    window.logout = function() { signOut(auth).then(() => { localStorage.clear(); location.reload(); }); };
</script>

<script>
let player, playlistData = [], currentProfile = null, isEditMode = false, currentView = 'all', currentPlayingTitle = "";

// PRO: Placeholder pour images cassées
function handleImgError(img) {
    img.onerror = null;
    img.src = 'https://via.placeholder.com/300x450?text=Image+Indisponible';
}

async function loadPlaylist() { 
    try { 
        const response = await fetch('films.json'); 
        playlistData = await response.json(); 
        render(); 
    } catch (e) { console.error("Erreur chargement JSON", e); } 
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histCont = document.getElementById('history-container');
    const histSec = document.getElementById('history-sec');
    cont.innerHTML = ""; 
    const s = search.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    // Rendu Historique
    if(currentProfile && s === "" && currentView === 'all') {
        let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
        if(history.length > 0) {
            histSec.style.display = "block";
            histCont.innerHTML = history.slice().reverse().map(title => {
                const m = playlistData.find(item => item.t === title);
                if(!m) return "";
                const p = (prog[m.t]) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                return `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0">
                            <img src="${m.img}" loading="lazy" onerror="handleImgError(this)">${p}
                            <div class="card-name">${m.t}</div>
                        </div>`;
            }).join('');
        }
    } else histSec.style.display = "none";

    // Rendu Catégories
    const cats = [...new Set(data.map(m => m.cat))];
    let addedSeries = [];

    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        
        let html = `<div class="category-row">
                        <div class="category-title">${c}</div>
                        <div class="carousel">`;
        
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const p = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName.replace(/'/g, "\\'")}')" tabindex="0">
                                <img src="${m.img}" loading="lazy" onerror="handleImgError(this)">
                                <div class="card-name">${sName}</div>
                             </div>`;
                }
            } else {
                html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0">
                            <img src="${m.img}" loading="lazy" onerror="handleImgError(this)">${p}
                            <div class="card-name">${m.t}</div>
                         </div>`;
            }
        });
        html += `</div></div>`;
        cont.insertAdjacentHTML('beforeend', html);
    });
}

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    
    // Save history
    if(currentProfile) {
        let key = 'sfpp_hist_' + currentProfile;
        let hist = JSON.parse(localStorage.getItem(key) || "[]").filter(t => t !== m.t);
        hist.push(m.t); if(hist.length > 20) hist.shift();
        localStorage.setItem(key, JSON.stringify(hist));
    }
    
    document.getElementById('details-overlay').style.display = 'none';
    document.getElementById('series-overlay').style.display = 'none';
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('player-blur-bg').style.backgroundImage = `url('${m.img}')`;
    
    player.src({ src: m.url, type: 'video/mp4' });
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t] && prog[m.t].t > 5) player.currentTime(prog[m.t].t);
    player.play();
}

function saveP() {
    if(!currentPlayingTitle || !currentProfile) return;
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        prog[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(prog));
    }
}

function openDetails(idx) {
    const m = playlistData[idx];
    document.getElementById('details-header-bg').style.backgroundImage = `url('${m.img}')`;
    document.getElementById('details-title').innerText = m.t;
    document.getElementById('details-desc').innerText = m.desc || "Pas de description.";
    document.getElementById('details-meta-cat').innerText = m.cat;
    
    document.getElementById('details-trailer-box').innerHTML = m.trailer ? 
        `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}?autoplay=0&rel=0&modestbranding=1" frameborder="0" allowfullscreen></iframe>` : "";
    
    document.getElementById('details-play-btn').onclick = () => playMovie(idx);
    document.getElementById('details-overlay').style.display = 'flex';
}

function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('searchBar').focus(); }
function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; filter(); }
function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; document.getElementById('details-trailer-box').innerHTML = ""; }
function closeP() { saveP(); player.pause(); document.getElementById('player-section').style.display = 'none'; render(); }
function changeView(v) { currentView = v; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+v).classList.add('active'); render(); }
function filter() { render(document.getElementById('searchBar').value); }

function initProfiles() {
    const profiles = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
        { id: 1, name: "Elite 1", icon: "🎬", color: "#e50914" },
        { id: 2, name: "Elite 2", icon: "🍿", color: "#2ecc71" }
    ];
    document.getElementById('profile-list').innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="selectProfile('${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div class="profile-name">${p.name}</div>
        </div>`).join('');
}

function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }
function requestAccess() { window.location.href = "mailto:sfpp.ott@gmail.com?subject=Demande accès SFPP ELITE"; }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { 
        techOrder: ['chromecast', 'html5'], 
        plugins: { chromecast: { addButtonToControlBar: true } }
    });
    
    player.on('timeupdate', () => {
        if(Math.floor(player.currentTime()) % 15 === 0) saveP();
    });

    // PRO: Save on close
    window.addEventListener('beforeunload', saveP);
});
</script>
