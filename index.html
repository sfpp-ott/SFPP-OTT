<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        
        [tabindex="0"]:focus {
            outline: 3px solid white !important;
            outline-offset: 2px;
            transform: scale(1.05);
            background: rgba(255,255,255,0.1);
            z-index: 100;
        }

        /* CORRECTION : LOGIN SCREEN EN PRIORITÉ ABSOLUE */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; position: relative; z-index: 10000; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-request { background: none !important; border: none; color: #666 !important; font-size: 11px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; border-radius: 8px; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-name { font-size: 14px; color: #888; }
        
        .edit-icon { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border-radius: 50%; padding: 5px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }
        .btn-manage { margin-top: 40px; background: none; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-size: 14px; letter-spacing: 1px; }

        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.95); display: flex; align-items: center; 
            padding: 0 15px; z-index: 2000; border-bottom: 1px solid #222; 
            justify-content: space-between; box-sizing: border-box; gap: 10px;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 18px; flex-shrink: 0; }
        
        .nav-links { 
            display: flex; gap: 15px; flex: 1; overflow-x: auto; 
            white-space: nowrap; align-items: center; scrollbar-width: none;
            -webkit-overflow-scrolling: touch; justify-content: flex-start;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; font-weight: 500; padding: 10px 5px; transition: color 0.3s; flex-shrink: 0; border-radius: 4px; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: #000; display: none; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 2001;
        }
        #searchBar { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        
        .header-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .btn-icon { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .btn-logout { background: #333; color: white; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; flex-shrink: 0; }

        /* LECTEUR : PLEIN ÉCRAN ET FLOU */
        #player-section { display: none; position: fixed; inset: 0; background: #000; z-index: 4500; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; }
        
        .vjs-blur-bg {
            position: absolute; inset: 0; z-index: 0;
            background-size: cover; background-position: center;
            filter: blur(40px) brightness(0.3); transform: scale(1.1); 
        }
        
        .video-js { z-index: 1 !important; width: 100% !important; height: 100% !important; }
        .video-js video { object-fit: contain !important; }

        #next-episode-btn {
            position: absolute; bottom: 85px; right: 25px; z-index: 99999 !important;
            background: #e50914; color: white; border: 2px solid #fff; padding: 15px 25px;

        }

        .btn-close-player {
            position: absolute; top: 20px; left: 20px; z-index: 5000;
            background: rgba(0,0,0,0.5); border: none; color: white;
            width: 45px; height: 45px; border-radius: 50%; font-size: 20px; cursor: pointer;
        }

        #expiration-banner { display: none; background: #ffcc00; color: #000; text-align: center; padding: 10px; font-size: 13px; font-weight: bold; position: relative; z-index: 1500; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .vjs-skip-button { font-size: 1.5em !important; cursor: pointer; }
        
        /* --- DESIGN OVERLAY DETAILS --- */
        #details-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 3500; display: none; flex-direction: column; overflow-y: auto;
        }
        .details-content { position: relative; width: 100%; display: block; animation: fadeIn 0.3s; }
        
        .details-hero { 
            position: relative; width: 100%; height: 55vh; 
            background-size: cover; background-position: center top; 
        }
        .details-hero::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg) 10%, transparent 70%); 
        }

        .details-info { padding: 0 5% 40px; margin-top: -80px; position: relative; z-index: 5; }
        .details-info h2 { font-size: 32px; font-weight: bold; margin-bottom: 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .details-info .meta { color: #888; font-size: 14px; margin-bottom: 15px; display: flex; gap: 15px; }
        .details-info .synopsis { color: #ddd; line-height: 1.6; font-size: 15px; max-width: 850px; margin-bottom: 25px; }
        
        .details-actions { display: flex; gap: 15px; margin-bottom: 30px; }
        .btn-play-main { 
            background: white; color: black; border: none; padding: 15px 35px; 
            border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; 
            display: flex; align-items: center; gap: 10px;
        }

        .section-label { font-weight: bold; color: white; margin: 30px 0 15px; font-size: 18px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .trailer-box { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 8px; margin-bottom: 25px; overflow: hidden; border: 1px solid #333; }
        
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
        .actor-item { flex: 0 0 90px; text-align: center; }
        .actor-item img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .actor-name { font-size: 11px; color: #aaa; margin-top: 8px; }

        .btn-close-details { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.5); border: none; color: white; 
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 100; font-size: 20px;
        }

        #main-content { padding-top: 80px; }
        
        .category-row { position: relative; width: 100%; margin-bottom: 20px; }
        .category-title { font-size: 18px; font-weight: bold; margin: 20px 4% 10px; color: #fff; text-transform: uppercase; }
        
        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 0 4% 10px; scrollbar-width: none; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .nav-arrow { position: absolute; top: 0; bottom: 30px; width: 50px; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; color: white; font-size: 30px; opacity: 0; transition: opacity 0.3s; }
        .category-row:hover .nav-arrow { opacity: 1; }
        .arrow-left { left: 0; }
        .arrow-right { right: 0; }

        .card { flex: 0 0 150px; width: 150px; cursor: pointer; position: relative; display: flex; flex-direction: column; }
        .card img { width: 150px !important; height: 225px !important; object-fit: cover !important; border-radius: 4px; background: #222; display: block; }
        .card-name { margin-top: 6px; font-size: 12px; text-align: center; color: #bbb; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; width: 100%; }

        .prog-bg { position: absolute; bottom: 25px; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 0 0 4px 4px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); transition: width 0.3s; }

        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 80px 5% 40px; }
        .overlay-header { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; }
        .overlay-img { width: 120px; border-radius: 8px; border: 1px solid #333; }
        .season-title { color: var(--accent); font-size: 18px; font-weight: bold; margin: 25px 0 10px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .episode-item { background: #111; padding: 15px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; border: 1px solid #222; }
        .btn-close { background: #333; color: #fff; border: none; padding: 10px 22px; border-radius: 4px; cursor: pointer; }

        @media (max-width: 768px) {
            .card { flex: 0 0 130px; width: 130px; }
            .card img { width: 130px !important; height: 195px !important; }
            .details-hero { height: 45vh; }
        }
    </style>
</head>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    const savedEmail = localStorage.getItem('sfpp_last_email');
    if(savedEmail) document.getElementById('user').value = savedEmail;

    async function verifyExpiration(user) {
        if (!user) return false;
        const snapshot = await get(ref(db, 'users_data/' + user.uid + '/expire'));
        const expireValue = snapshot.val();
        if (!expireValue) return false;
        
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const todayStr = `${y}-${m}-${d}`;
        
        if (todayStr >= expireValue) {
            alert("Accès expiré le " + expireValue);
            await signOut(auth);
            const mail = localStorage.getItem('sfpp_last_email');
            localStorage.clear();
            localStorage.setItem('sfpp_last_email', mail);
            localStorage.setItem('sfpp_device_id', deviceId);
            location.reload();
            return true;
        }
        return false;
    }

    window.startSessionSync = function(uid) {
        onValue(ref(db, 'sessions/' + uid), (snapshot) => {
            const session = snapshot.val();
            if (session && session.deviceId !== deviceId) {
                alert("⚠️ Ce compte est utilisé sur un autre appareil.");
                localStorage.removeItem('sfpp_profile'); 
                signOut(auth).then(() => location.reload());
            }
        });
    };

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            const exp = await verifyExpiration(u.user);
            if (!exp) { 
                set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() }); 
            }
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            if (await verifyExpiration(user)) return;
            window.startSessionSync(user.uid);
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            const expireValue = snap.val();
            if(expireValue) {
                const today = new Date();
                const expireDate = new Date(expireValue);
                const diffDays = Math.ceil((expireDate - today) / (1000 * 60 * 60 * 24));
                const banner = document.getElementById('expiration-banner');
                if(diffDays > 0 && diffDays <= 5) {
                    banner.style.display = 'block';
                    banner.innerHTML = `⚠️ Fin d'accès dans ${diffDays} jour(s).`;
                } else banner.style.display = 'none';
            }
            
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = async function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('current-user-name').innerText = name;
        const user = auth.currentUser;
        if(user) {
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            document.getElementById('header-logo').innerHTML = `SFPP | ${icon} <span style="font-size:10px; color:#666;">(${snap.val()})</span>`;
        }
        render();
        pushInitialState();
    };

    window.logout = function() { 
        const mail = localStorage.getItem('sfpp_last_email');
        signOut(auth).then(() => { 
            localStorage.clear(); 
            localStorage.setItem('sfpp_last_email', mail);
            localStorage.setItem('sfpp_device_id', deviceId);
            location.reload(); 
        }); 
    };

    function pushInitialState() {
        if (window.history.state?.overlay !== 'home') {
            window.history.pushState({ overlay: 'home' }, "");
        }
    }
</script>

<script>
let player, playlistData = [], currentProfile = null, isEditMode = false, currentView = 'all', currentPlayingTitle = "", exitConfirmed = false;

window.addEventListener('popstate', function (event) {
    const detailsOverlay = document.getElementById('details-overlay');
    const seriesOverlay = document.getElementById('series-overlay');
    const playerSection = document.getElementById('player-section');

    if (detailsOverlay.style.display === 'flex') {
        detailsOverlay.style.display = 'none';
        document.getElementById('details-trailer-box').innerHTML = "";
        return;
    }
    if (seriesOverlay.style.display === 'block') {
        seriesOverlay.style.display = 'none';
        return;
    }
    if (playerSection.style.display === 'block') {
        saveP(); 
        player.pause(); 
        playerSection.style.display = 'none';
        render();
        return;
    }

    if (!exitConfirmed) {
        history.pushState({ overlay: 'home' }, "");
        const quitter = confirm("Souhaitez-vous vraiment quitter l'application ?");
        if (quitter) {
            exitConfirmed = true;
            history.back();
        }
    }
});

async function loadPlaylist() { try { const response = await fetch('films.json'); playlistData = await response.json(); render(); } catch (e) {} }

function openDetails(idx) {
    history.pushState({ overlay: 'details' }, "");
    const m = playlistData[idx];
    
    document.getElementById('details-header-bg').style.backgroundImage = `url('${m.img}')`;
    document.getElementById('details-title').innerText = m.t;
    document.getElementById('details-desc').innerText = m.desc || "Aucun résumé disponible.";
    
    let castHtml = "";
    if (m.actors_pics && m.actors_pics.length > 0) {
        castHtml = m.actors_pics.map(a => `
                <div class="actor-item">
                    <img src="${a.img}" onerror="this.src='https://via.placeholder.com/80x80?text=?'">
                    <div class="actor-name">${a.name}</div>
                </div>
            `).join('');
    }
    document.getElementById('details-meta-cast').innerHTML = castHtml;

    document.getElementById('details-trailer-box').innerHTML = m.trailer ? 
        `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}?rel=0" frameborder="0" allowfullscreen></iframe>` : "";
    
    const playBtn = document.getElementById('details-play-btn');
    playBtn.onclick = () => { playMovie(idx); };
    
    document.getElementById('details-overlay').style.display = 'flex';
    playBtn.focus();
}

function closeDetails() {
    if (document.getElementById('details-overlay').style.display === 'flex') {
        history.back();
    }
}

function initProfiles() {
    let profiles = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
        { id: 1, name: "Profil 1", icon: "🟦", color: "#1e90ff" },
        { id: 2, name: "Profil 2", icon: "🟩", color: "#2ecc71" },
        { id: 3, name: "Profil 3", icon: "🟧", color: "#e67e22" },
        { id: 4, name: "Profil 4", icon: "🟪", color: "#9b59b6" }
    ];
    const list = document.getElementById('profile-list');
    list.innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="handleProfileClick(${p.id}, '${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div class="edit-icon">✏️</div>
            <div class="profile-name">${p.name}</div>
        </div>`).join('');
}

function handleProfileClick(id, name, icon) {
    if(isEditMode) {
        let n = prompt("Nouveau nom :", name);
        if(n) {
            let saved = JSON.parse(localStorage.getItem('sfpp_profiles_data') || "[]");
            const idx = saved.findIndex(p => p.id === id);
            if(idx !== -1) { saved[idx].name = n; localStorage.setItem('sfpp_profiles_data', JSON.stringify(saved)); initProfiles(); }
        }
    } else selectProfile(name, icon);
}

function toggleFavCurrent() {
    let key = 'sfpp_fav_' + currentProfile;
    let favs = JSON.parse(localStorage.getItem(key) || "[]");
    if(favs.includes(currentPlayingTitle)) favs = favs.filter(t => t !== currentPlayingTitle);
    else favs.push(currentPlayingTitle);
    localStorage.setItem(key, JSON.stringify(favs));
    updatePlayerFavUI();
    render(document.getElementById('searchBar').value);
}

function updatePlayerFavUI() {
    let favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const btn = document.getElementById('player-fav-btn');
    if(favs.includes(currentPlayingTitle)) { btn.innerText = "❤️ Dans Ma Liste"; btn.classList.add('is-fav'); }
    else { btn.innerText = "+ Ma Liste"; btn.classList.remove('is-fav'); }
}

function saveP() {
    if(!currentPlayingTitle || !currentProfile) return;
    const cur = player.currentTime();
    const dur = player.duration();
    if(dur > 0) {
        let prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        prog[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(prog));
    }
}

function scrollSide(btn, amt) { const car = btn.parentElement.querySelector('.carousel'); car.scrollBy({ left: amt, behavior: 'smooth' }); }

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histSec = document.getElementById('history-sec');
    const histCont = document.getElementById('history-container');
    cont.innerHTML = ""; histCont.innerHTML = "";
    const s = search.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    if(currentProfile && s === "" && currentView === 'all') {
        let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
        if(history.length > 0) {
            histSec.style.display = "block";
            history.slice().reverse().forEach(title => {
                const m = playlistData.find(item => item.t === title);
                if(m) {
                    const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                    histCont.innerHTML += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
                }
            });
        } else histSec.style.display = "none";
    } else histSec.style.display = "none";

    const cats = [...new Set(data.map(m => m.cat))];
    let addedSeries = [];

    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="category-row"><div class="nav-arrow arrow-left" onclick="scrollSide(this, -400)">‹</div><div class="carousel">`;
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const heart = favs.includes(m.t) ? `<div style="position:absolute; top:5px; right:5px; z-index:5;">❤️</div>` : "";
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}">${heart}<div class="card-name">${sName}</div></div>`;
                }
            } else {
                html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${heart}${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        html += `</div><div class="nav-arrow arrow-right" onclick="scrollSide(this, 400)">›</div></div>`;
        cont.innerHTML += html;
    });
}

function openSeries(name) {
    history.pushState({ overlay: 'series' }, "");
    const overlay = document.getElementById('series-overlay');
    const content = document.getElementById('series-detail-content');
    const eps = playlistData.filter(m => m.t.startsWith(name));
    overlay.style.display = 'block';
    let html = `<div class="overlay-header"><img src="${eps[0].img}" class="overlay-img"><div><h2>${name}</h2></div></div>`;
    const seasons = {};
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    eps.forEach(ep => {
        const sMatch = ep.t.match(/S(\d{2})/);
        const sNum = sMatch ? sMatch[1] : "01";
        if(!seasons[sNum]) seasons[sNum] = [];
        seasons[sNum].push(ep);
    });
    Object.keys(seasons).sort().forEach(s => {
        html += `<div class="season-title">SAISON ${s}</div>`;
        seasons[s].forEach(ep => {
            const epName = ep.t.split(' - ')[1] || ep.t;
            const pct = (prog[ep.t] && prog[ep.t].p > 1) ? `<div style="height:3px; background:#444; width:100px; margin-top:5px;"><div style="height:100%; background:var(--accent); width:${prog[ep.t].p}%"></div></div>` : "";
            html += `<div class="episode-item" onclick="openDetails(${playlistData.indexOf(ep)});" tabindex="0">
                        <div style="flex:1"><b>${epName}</b>${pct}</div>
                        <div style="color:var(--accent)">DÉTAILS</div>
                     </div>`;
        });
    });
    content.innerHTML = html;
}

function playMovie(idx) {
    history.replaceState({ overlay: 'player' }, "");
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('next-episode-btn').style.display = 'none';
    
    if(currentProfile) {
        let key = 'sfpp_hist_' + currentProfile;
        let hist = JSON.parse(localStorage.getItem(key) || "[]").filter(t => t !== m.t);
        hist.push(m.t); if(hist.length > 15) hist.shift();
        localStorage.setItem(key, JSON.stringify(hist));
    }
    
    document.getElementById('details-overlay').style.display = 'none';
    document.getElementById('details-trailer-box').innerHTML = "";
    document.getElementById('series-overlay').style.display = 'none';
    
    const pSection = document.getElementById('player-section');
    pSection.style.display = 'block';
    document.getElementById('player-blur-bg').style.backgroundImage = `url('${m.img}')`;
    
    player.poster(m.img); 
    player.src({ src: m.url, type: 'video/mp4' });
    
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t] && prog[m.t].t > 10) player.currentTime(prog[m.t].t);
    player.play();
}

function playNextEpisode() {
    const parts = currentPlayingTitle.match(/(.*[SE])(\d+)(.*)/i);
    if (!parts) return;
    const nextTitleSearch = (parts[1] + (parseInt(parts[2]) + 1).toString().padStart(2, '0')).toUpperCase();
    const nextIdx = playlistData.findIndex(m => m.t.toUpperCase().includes(nextTitleSearch));
    if (nextIdx !== -1) playMovie(nextIdx);
}

function closeP() { if (document.getElementById('player-section').style.display === 'block') history.back(); }
function closeSeries() { if (document.getElementById('series-overlay').style.display === 'block') history.back(); }
function changeView(v) { currentView = v; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+v).classList.add('active'); render(); }
function filter() { render(document.getElementById('searchBar').value); }
function toggleEditMode() { isEditMode = !isEditMode; document.getElementById('profile-screen').classList.toggle('is-editing'); }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }
function requestAccess() { window.location.href = "mailto:sfpp.ott@gmail.com"; }

function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('searchBar').focus(); }
function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; document.getElementById('searchBar').value = ''; filter(); }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { 
        controls: true, fluid: false,
        techOrder: ['chromecast', 'html5'], plugins: { chromecast: { addButtonToControlBar: true } }
    });
    player.on('timeupdate', function() {
        const dur = player.duration(), cur = player.currentTime();
        if (/S\d{2}E\d{2}/i.test(currentPlayingTitle) && dur > 0 && (dur - cur) < 80) {
            if (player.isFullscreen()) player.exitFullscreen();
            document.getElementById('next-episode-btn').style.display = 'block';
        } else document.getElementById('next-episode-btn').style.display = 'none';
        if(Math.floor(cur) % 10 === 0) saveP();
    });
    const Button = videojs.getComponent('Button');
    class Back extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-replay-10'; } handleClick() { player.currentTime(player.currentTime()-10); } }
    class Forward extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-forward-10'; } handleClick() { player.currentTime(player.currentTime()+10); } }
    videojs.registerComponent('Back', Back); videojs.registerComponent('Forward', Forward);
    player.ready(() => { 
        player.getChild('controlBar').addChild('Back', {}, 1); 
        player.getChild('controlBar').addChild('Forward', {}, 2); 
        
        // --- DOUBLE-CLIC PLEIN ÉCRAN (FIX) ---
        player.tech().on('dblclick', function() {
            if (player.isFullscreen()) player.exitFullscreen();
            else player.requestFullscreen();
        });
    });
});
</script>
