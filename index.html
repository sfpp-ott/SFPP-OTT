<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* FOCUS TV AMÉLIORÉ */
        [tabindex="0"]:focus {
            outline: 4px solid white !important;
            outline-offset: 2px;
            transform: scale(1.05);
            background: rgba(255,255,255,0.15) !important;
            z-index: 100;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-request { background: none !important; border: none; color: #666 !important; font-size: 11px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; border-radius: 8px; padding: 10px; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-name { font-size: 14px; color: #888; }
        
        .edit-icon { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border-radius: 50%; padding: 5px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }
        .btn-manage { margin-top: 40px; background: none; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-size: 14px; letter-spacing: 1px; }

        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.95); display: flex; align-items: center; 
            padding: 0 15px; z-index: 2000; border-bottom: 1px solid #222; 
            justify-content: space-between; box-sizing: border-box; gap: 10px;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 18px; flex-shrink: 0; }
        
        .nav-links { 
            display: flex; gap: 15px; flex: 1; overflow-x: auto; 
            white-space: nowrap; align-items: center; scrollbar-width: none;
            -webkit-overflow-scrolling: touch; justify-content: flex-start;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; font-weight: 500; padding: 10px 5px; transition: color 0.3s; flex-shrink: 0; border-radius: 4px; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: #000; display: none; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 2001;
        }
        #searchBar { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        
        .header-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .btn-icon { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .btn-logout { background: #333; color: white; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; flex-shrink: 0; }

        /* LECTEUR PRO STYLE TV */
        #player-section { display: none; width: 100%; height: 100vh; background: #000; position: fixed; inset: 0; z-index: 4000; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        
        #player-ui-overlay {
            position: absolute; inset: 0; 
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%, transparent 80%, rgba(0,0,0,0.6) 100%);
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 40px 5%; opacity: 1; transition: opacity 0.5s ease; z-index: 2;
        }
        .player-ui-hide { opacity: 0 !important; cursor: none; }

        .player-top { display: flex; align-items: center; gap: 20px; }
        .player-bottom { display: flex; flex-direction: column; gap: 15px; }
        
        #next-episode-btn {
            background: var(--accent); color: white; border: 2px solid #fff; padding: 15px 25px;
            border-radius: 8px; font-weight: bold; font-size: 18px; display: none; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.9); align-self: flex-end;
        }

        #expiration-banner { display: none; background: #ffcc00; color: #000; text-align: center; padding: 10px; font-size: 13px; font-weight: bold; position: relative; z-index: 1500; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* MODAL FICHE FILM DÉTAILS */
        #details-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 3500; display: none; align-items: center; justify-content: center;
            padding: 20px;
        }
        .details-content {
            background: #111; max-width: 900px; width: 100%; border-radius: 12px;
            display: flex; position: relative; overflow: hidden; border: 1px solid #333;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .details-poster { width: 35%; object-fit: cover; border-right: 1px solid #222; }
        .details-info { width: 65%; padding: 40px; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; max-height: 85vh; }
        .details-info h2 { margin: 0; font-size: 32px; }
        .details-info .meta { color: var(--gold); font-weight: bold; font-size: 14px; }
        .details-info .synopsis { color: #ccc; line-height: 1.6; font-size: 16px; margin: 10px 0; }
        .details-actions { margin-top: 20px; display: flex; gap: 15px; }
        
        .btn-play-main { background: white; color: black; border: none; padding: 15px 35px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 18px; flex: 1; }
        .btn-play-main:hover { background: #ddd; }
        .btn-close-details { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; font-size: 20px; }

        /* TRAILER ET ACTEURS */
        .trailer-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; margin-bottom: 15px; overflow: hidden; border: 1px solid #333; }
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cast-row::-webkit-scrollbar { display: none; }
        .actor-item { flex: 0 0 80px; text-align: center; }
        .actor-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
        .actor-name { font-size: 11px; color: #aaa; margin-top: 5px; }

        .movie-title-large { font-size: 35px; font-weight: bold; color: #fff; margin: 0; }
        #player-fav-btn { background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
        #player-fav-btn.is-fav { background: var(--accent); border-color: var(--accent); }
        
        #main-content { padding-top: 80px; }
        .category-row { position: relative; width: 100%; margin-bottom: 30px; }
        .category-title { font-size: 20px; font-weight: bold; margin: 20px 4% 10px; color: #fff; text-transform: uppercase; letter-spacing: 1px; }
        
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 4% 15px; scrollbar-width: none; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .carousel::-webkit-scrollbar { display: none; }

        .card { flex: 0 0 180px; cursor: pointer; position: relative; border-radius: 8px; transition: transform 0.3s; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; background: #222; }
        .card-name { margin-top: 8px; font-size: 14px; text-align: center; color: #eee; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .prog-bg { position: absolute; bottom: 35px; left: 0; width: 100%; height: 5px; background: rgba(255,255,255,0.2); border-radius: 0 0 8px 8px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); }

        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 80px 5% 40px; }

        /* VIDEO JS CUSTOM FOR TV */
        .video-js { width: 100% !important; height: 100% !important; }
        .vjs-control-bar { background: transparent !important; height: 60px !important; }
        .vjs-big-play-button { display: none !important; }

        @media (max-width: 768px) {
            .details-content { flex-direction: column; max-height: 90vh; }
            .details-poster { width: 100%; height: 200px; }
            .details-info { width: 100%; padding: 20px; }
            .card { flex: 0 0 130px; }
        }
    </style>
</head>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() }); 
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('current-user-name').innerText = name;
        render();
    };

    window.logout = function() { signOut(auth).then(() => { localStorage.clear(); location.reload(); }); };
</script>

<script>
let player, playlistData = [], currentProfile = null, isEditMode = false, currentView = 'all', currentPlayingTitle = "", uiTimer;

// AUTO-HIDE UI DU LECTEUR
function showPlayerUI() {
    const ui = document.getElementById('player-ui-overlay');
    if (!ui) return;
    ui.classList.remove('player-ui-hide');
    clearTimeout(uiTimer);
    uiTimer = setTimeout(() => {
        if (player && !player.paused()) ui.classList.add('player-ui-hide');
    }, 5000);
}

async function loadPlaylist() { try { const r = await fetch('films.json'); playlistData = await r.json(); render(); } catch(e){} }

function openDetails(idx) {
    const m = playlistData[idx];
    document.getElementById('details-img').src = m.img;
    document.getElementById('details-title').innerText = m.t;
    
    let castHtml = "";
    if (m.actors_pics) {
        castHtml = `<div class="cast-row">` + m.actors_pics.map(a => `
            <div class="actor-item">
                <img src="${a.img}" onerror="this.src='https://via.placeholder.com/60x60?text=?'">
                <div class="actor-name">${a.name}</div>
            </div>`).join('') + `</div>`;
    } else { castHtml = m.cast ? "Avec : " + m.cast : ""; }
    
    document.getElementById('details-meta').innerHTML = castHtml;
    document.getElementById('details-trailer-box').innerHTML = m.trailer ? `<div class="trailer-box"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}?autoplay=0&rel=0" frameborder="0" allowfullscreen></iframe></div>` : "";
    document.getElementById('details-desc').innerText = m.desc || "";
    
    const playBtn = document.getElementById('details-play-btn');
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    playBtn.innerText = (prog[m.t] && prog[m.t].p > 1) ? "▶ REPRENDRE À " + Math.floor(prog[m.t].p) + "%" : "▶ LANCER LE FILM";
    
    playBtn.onclick = () => { closeDetails(); playMovie(idx); };
    document.getElementById('details-overlay').style.display = 'flex';
    playBtn.focus();
}

function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; document.getElementById('details-trailer-box').innerHTML = ""; }

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('display-desc').innerText = m.desc || "";
    document.getElementById('display-actors').innerText = m.cast ? "Avec : " + m.cast : "";
    
    updatePlayerFavUI();
    player.src({ src: m.url, type: 'video/mp4' });
    
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t] && prog[m.t].t > 10) player.currentTime(prog[m.t].t);
    
    player.play();
    showPlayerUI();
}

function toggleFavCurrent() {
    let key = 'sfpp_fav_' + currentProfile;
    let favs = JSON.parse(localStorage.getItem(key) || "[]");
    if(favs.includes(currentPlayingTitle)) favs = favs.filter(t => t !== currentPlayingTitle);
    else favs.push(currentPlayingTitle);
    localStorage.setItem(key, JSON.stringify(favs));
    updatePlayerFavUI();
    render();
}

function updatePlayerFavUI() {
    let favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const btn = document.getElementById('player-fav-btn');
    if(favs.includes(currentPlayingTitle)) { btn.innerText = "❤️ Ma Liste"; btn.classList.add('is-fav'); }
    else { btn.innerText = "+ Ma Liste"; btn.classList.remove('is-fav'); }
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histCont = document.getElementById('history-container');
    cont.innerHTML = ""; histCont.innerHTML = "";
    const s = search.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    // Gestion historique
    let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
    if(history.length > 0 && s === "" && currentView === 'all') {
        document.getElementById('history-sec').style.display = "block";
        history.slice().reverse().forEach(t => {
            const m = playlistData.find(i => i.t === t);
            if(m) {
                const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                histCont.innerHTML += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
    }

    const cats = [...new Set(data.map(m => m.cat))];
    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="carousel">`;
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!html.includes(sName)) html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}"><div class="card-name">${sName}</div></div>`;
            } else {
                html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        html += `</div>`;
        cont.innerHTML += html;
    });
}

function saveP() {
    if(!currentPlayingTitle || !player) return;
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let p = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        p[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(p));
    }
}

function closeP() { saveP(); player.pause(); document.getElementById('player-section').style.display = 'none'; render(); }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { 
        controls: true,
        techOrder: ['chromecast', 'html5'],
        plugins: { chromecast: { addButtonToControlBar: true } }
    });

    player.on('play', showPlayerUI);
    player.on('timeupdate', () => { if(Math.floor(player.currentTime()) % 10 === 0) saveP(); });
});

function initProfiles() {
    let p = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
        { id: 1, name: "Famille", icon: "🏠", color: "#e50914" },
        { id: 2, name: "Invité", icon: "👤", color: "#333" }
    ];
    document.getElementById('profile-list').innerHTML = p.map(x => `
        <div class="profile-item" onclick="selectProfile('${x.name}', '${x.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${x.color}">${x.icon}</div>
            <div class="profile-name">${x.name}</div>
        </div>`).join('');
}
</script>
