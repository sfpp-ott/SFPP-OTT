<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumeo - Streaming HD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            background-color: #0a0a0a;
            color: #efefef;
            font-family: 'Inter', sans-serif;
        }

        /* Sidebar personnalisée */
        .sidebar {
            width: 80px;
            transition: width 0.3s ease;
            background: #000000;
            border-right: 1px solid #1a1a1a;
        }
        .sidebar:hover { width: 240px; }

        .sidebar-label {
            display: none;
            white-space: nowrap;
            margin-left: 15px;
        }
        .sidebar:hover .sidebar-label { display: block; }

        /* Scrollbar Lumeo Style */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }

        /* Overlay dégradé sur les posters */
        .movie-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%);
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="sidebar fixed h-full z-50 flex flex-col items-center py-6 gap-8">
        <div class="text-purple-500 mb-4">
            <i data-lucide="play-circle" class="w-10 h-10 fill-current"></i>
        </div>

        <nav class="flex flex-col w-full gap-2 px-4">
            <a href="#" class="flex items-center p-3 text-purple-500 bg-purple-500/10 rounded-xl">
                <i data-lucide="home"></i>
                <span class="sidebar-label font-semibold">Accueil</span>
            </a>
            <a href="#" class="flex items-center p-3 text-gray-500 hover:text-white transition">
                <i data-lucide="clapperboard"></i>
                <span class="sidebar-label font-semibold">Films</span>
            </a>
            <a href="#" class="flex items-center p-3 text-gray-500 hover:text-white transition">
                <i data-lucide="tv"></i>
                <span class="sidebar-label font-semibold">Séries</span>
            </a>
            <a href="#" class="flex items-center p-3 text-gray-500 hover:text-white transition">
                <i data-lucide="heart"></i>
                <span class="sidebar-label font-semibold">Ma Liste</span>
            </a>
        </nav>

        <div class="mt-auto flex flex-col w-full px-4 gap-2 border-t border-white/5 pt-4">
             <a href="#" class="flex items-center p-3 text-gray-500 hover:text-white transition">
                <i data-lucide="settings"></i>
                <span class="sidebar-label font-semibold">Paramètres</span>
            </a>
        </div>
    </aside>

    <main class="ml-[80px] flex-1 overflow-y-auto">
        
        <header class="flex items-center justify-between p-6 bg-transparent">
            <div class="flex items-center bg-[#111] border border-white/5 rounded-full px-4 py-2 w-full max-w-xl">
                <i data-lucide="search" class="w-4 h-4 text-gray-500 mr-3"></i>
                <input type="text" placeholder="Rechercher sur Lumeo..." class="bg-transparent border-none outline-none text-sm w-full">
            </div>
            <div class="flex items-center gap-4">
                <button class="text-sm font-bold bg-white text-black px-6 py-2 rounded-full hover:bg-gray-200 transition">VIP</button>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 border-2 border-white/10"></div>
            </div>
        </header>

        <section class="px-6 mb-10">
            <div class="relative w-full h-[450px] rounded-3xl overflow-hidden shadow-2xl group">
                <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070&auto=format&fit=crop" class="w-full h-full object-cover" alt="Hero Movie">
                <div class="absolute inset-0 bg-gradient-to-r from-black via-black/40 to-transparent p-12 flex flex-col justify-end">
                    <span class="text-purple-500 font-bold mb-2 tracking-widest text-sm uppercase">Nouveau sur Lumeo</span>
                    <h1 class="text-5xl font-extrabold mb-4 max-w-2xl leading-tight">Interstellar : <br><span class="text-gray-400">Le voyage ultime</span></h1>
                    <div class="flex items-center gap-4 mb-8">
                        <span class="bg-white/10 px-3 py-1 rounded text-xs font-bold">4K ULTRA HD</span>
                        <span class="text-gray-300 text-sm">2024 • 2h 49m • Science-fiction</span>
                    </div>
                    <div class="flex gap-4">
                        <button class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-xl font-bold flex items-center gap-2 transition">
                            <i data-lucide="play" class="fill-current w-4"></i> Regarder
                        </button>
                        <button class="bg-white/5 hover:bg-white/10 backdrop-blur-md text-white px-8 py-3 rounded-xl font-bold transition">Détails</button>
                    </div>
                </div>
            </div>
        </section>

        <section class="px-6 pb-20">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xl font-bold flex items-center gap-2">
                    <span class="w-1 h-6 bg-purple-500 rounded-full"></span>
                    Tendances actuelles
                </h2>
                <div class="flex gap-2">
                    <button class="p-2 bg-white/5 rounded-lg hover:bg-white/10"><i data-lucide="chevron-left" class="w-5"></i></button>
                    <button class="p-2 bg-white/5 rounded-lg hover:bg-white/10"><i data-lucide="chevron-right" class="w-5"></i></button>
                </div>
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6">
                <script>
                    const movies = [
                        {title: "The Batman", year: "2022", img: "https://images.unsplash.com/photo-1509248961158-e54f6934749c?w=400"},
                        {title: "Inception", year: "2010", img: "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=400"},
                        {title: "Joker", year: "2019", img: "https://images.unsplash.com/photo-1531259683007-016a7b628fc3?w=400"},
                        {title: "The Whale", year: "2023", img: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=400"},
                        {title: "Avatar", year: "2022", img: "https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?w=400"},
                        {title: "Dune", year: "2021", img: "https://images.unsplash.com/photo-1509347528160-9a9e33742cdb?w=400"}
                    ];

                    movies.forEach(movie => {
                        document.write(`
                            <div class="movie-card relative group cursor-pointer overflow-hidden rounded-2xl bg-white/5">
                                <img src="${movie.img}" class="w-full aspect-[2/3] object-cover transition duration-500 group-hover:scale-110">
                                <div class="absolute inset-0 z-10 flex flex-col justify-end p-4">
                                    <h3 class="font-bold text-sm truncate">${movie.title}</h3>
                                    <p class="text-[10px] text-gray-400 uppercase tracking-widest mt-1">${movie.year} • Film</p>
                                </div>
                                <div class="absolute inset-0 bg-purple-600/20 opacity-0 group-hover:opacity-100 transition-opacity z-20 flex items-center justify-center">
                                    <div class="bg-white text-black p-3 rounded-full shadow-xl translate-y-4 group-hover:translate-y-0 transition-transform duration-300">
                                        <i data-lucide="play" class="fill-current w-6 h-6"></i>
                                    </div>
                                </div>
                            </div>
                        `);
                    });
                </script>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
