<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* Focus accessible pour télécommande/clavier */
        [tabindex="0"]:focus {
            outline: 3px solid white !important;
            outline-offset: 2px;
            transform: scale(1.05);
            background: rgba(255,255,255,0.1);
            z-index: 100;
        }

        /* --- SCREENS --- */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 8px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-item:focus .profile-avatar { border-color: white; }
        .profile-name { font-size: 14px; color: #888; }
        .edit-icon { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border-radius: 50%; padding: 5px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }

        /* --- HEADER --- */
        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%); 
            display: flex; align-items: center; padding: 0 4%; z-index: 2000; transition: background 0.3s;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 22px; margin-right: 25px; }
        .nav-links { display: flex; gap: 20px; flex: 1; align-items: center; }
        .nav-btn { background: none; border: none; color: #e5e5e5; cursor: pointer; font-size: 14px; transition: color 0.3s; }
        .nav-btn.active { font-weight: bold; color: white; }

        /* --- CARROUSEL & FLÈCHES --- */
        .category-row { position: relative; width: 100%; margin-bottom: 40px; padding: 0 4%; box-sizing: border-box; }
        .category-title { font-size: 1.4vw; font-weight: bold; margin-bottom: 10px; color: #e5e5e5; }
        .carousel { display: flex; overflow-x: auto; gap: 10px; scrollbar-width: none; scroll-behavior: smooth; padding: 10px 0; }
        .carousel::-webkit-scrollbar { display: none; }
        
        .nav-arrow { 
            position: absolute; top: 0; bottom: 0; width: 4%; 
            background: rgba(0,0,0,0.5); display: flex; align-items: center; 
            justify-content: center; z-index: 10; cursor: pointer; color: white; 
            font-size: 30px; opacity: 0; transition: opacity 0.3s, background 0.3s;
            border: none;
        }
        .category-row:hover .nav-arrow { opacity: 1; }
        .nav-arrow:hover { background: rgba(0,0,0,0.8); }
        .arrow-left { left: 0; }
        .arrow-right { right: 0; }

        .card { flex: 0 0 16.666%; position: relative; transition: transform 0.3s; cursor: pointer; border-radius: 4px; overflow: hidden; }
        .card:hover, .card:focus { transform: scale(1.1); z-index: 20; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }

        /* --- LECTEUR ELITE --- */
        #player-section { display: none; position: fixed; inset: 0; background: #000; z-index: 4500; }
        .video-container { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        /* Arrière-plan flou pour le lecteur */
        .player-bg-blur {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.3); transform: scale(1.2);
            z-index: 0;
        }

        .video-js { width: 100% !important; height: 100% !important; z-index: 1; }
        .vjs-big-play-button { background-color: var(--accent) !important; border: none !important; }
        
        .btn-player-back {
            position: absolute; top: 30px; left: 30px; z-index: 10;
            background: rgba(0,0,0,0.5); color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%; font-size: 24px; cursor: pointer;
        }

        /* --- OVERLAY DÉTAILS / BANDE-ANNONCE --- */
        #details-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 3500; display: none; flex-direction: column; overflow-y: auto;
        }
        .details-hero { 
            position: relative; width: 100%; height: 70vh; 
            background-size: cover; background-position: center 20%; 
        }
        .details-hero::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg) 5%, transparent 50%),
                        linear-gradient(to right, var(--bg) 0%, transparent 40%); 
        }
        .details-body { padding: 0 4% 50px; margin-top: -150px; position: relative; z-index: 5; }
        .btn-play-elite {
            background: white; color: black; border: none; padding: 12px 35px;
            font-size: 18px; font-weight: bold; border-radius: 4px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; margin-bottom: 20px;
        }
        .btn-play-elite:hover { background: rgba(255,255,255,0.8); }
        
        .trailer-container { width: 100%; max-width: 900px; aspect-ratio: 16/9; margin: 30px 0; border: 1px solid #333; }
        
        .cast-list { display: flex; gap: 20px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .cast-member { flex: 0 0 100px; text-align: center; }
        .cast-member img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #444; }
        .cast-member p { font-size: 12px; margin-top: 8px; color: #aaa; }

        @media (max-width: 1000px) {
            .card { flex: 0 0 25%; }
            .category-title { font-size: 18px; }
        }
        @media (max-width: 600px) {
            .card { flex: 0 0 33.33%; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:20px; text-align:center">SFPP ELITE</div>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit">CONNEXION</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="font-size: 3.5vw;">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-manage" onclick="toggleEditMode()">GÉRER LES PROFILS</button>
</div>

<header id="main-header">
    <div class="logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" onclick="changeView('movies')">Films</button>
        <button class="nav-btn" onclick="changeView('series')">Séries</button>
        <button class="nav-btn" onclick="changeView('fav')">Ma Liste</button>
    </div>
    <div id="user-info" style="font-size: 12px; color: #666;"></div>
</header>

<div id="details-overlay">
    <button class="btn-player-back" onclick="closeDetails()">✕</button>
    <div id="details-hero" class="details-hero"></div>
    <div class="details-body">
        <h1 id="details-title" style="font-size: 4vw; margin: 0;"></h1>
        <p id="details-meta" style="color: #46d369; font-weight: bold; margin: 10px 0;"></p>
        <button id="details-play-main" class="btn-play-elite">▶ Lecture</button>
        <p id="details-desc" style="max-width: 600px; font-size: 16px; line-height: 1.5; color: #ddd;"></p>
        
        <div class="section-label" style="margin-top:40px; font-weight:bold; border-left: 4px solid var(--accent); padding-left: 10px;">BANDE-ANNONCE</div>
        <div id="details-trailer" class="trailer-container"></div>
        
        <div class="section-label" style="margin-top:40px; font-weight:bold; border-left: 4px solid var(--accent); padding-left: 10px;">CASTING</div>
        <div id="details-cast" class="cast-list"></div>
    </div>
</div>

<div id="player-section">
    <button class="btn-player-back" onclick="closeP()">✕</button>
    <div class="video-container">
        <div id="player-blur" class="player-bg-blur"></div>
        <video id="main-video" class="video-js vjs-theme-fantasy vjs-big-play-centered" controls preload="auto"></video>
    </div>
</div>

<main id="main-content" style="padding-top: 100px;">
    <div id="categories-container"></div>
</main>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script type="module">
    // --- LOGIQUE FIREBASE & AUTH ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            const dateExp = snap.val() || "Illimité";
            document.getElementById('user-info').innerText = `Abonnement : ${dateExp}`;
            initProfiles();
            loadPlaylist();
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.checkLogin = () => {
        const e = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, e, p).catch(err => alert("Erreur d'accès."));
    };
</script>

<script>
    let playlistData = [], player, currentProfile = "";

    // --- LECTEUR ---
    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('main-video', {
            fluid: false,
            autoplay: false,
            controls: true
        });
    });

    async function loadPlaylist() {
        const res = await fetch('films.json');
        playlistData = await res.json();
        render();
    }

    function render() {
        const container = document.getElementById('categories-container');
        container.innerHTML = "";
        const cats = [...new Set(playlistData.map(m => m.cat))];

        cats.forEach(c => {
            const movies = playlistData.filter(m => m.cat === c);
            let html = `
                <div class="category-row">
                    <h2 class="category-title">${c}</h2>
                    <button class="nav-arrow arrow-left" onclick="scrollC(this, -500)">‹</button>
                    <div class="carousel">
                        ${movies.map((m, idx) => `
                            <div class="card" tabindex="0" onclick="openDetails('${m.t}')">
                                <img src="${m.img}" loading="lazy">
                            </div>
                        `).join('')}
                    </div>
                    <button class="nav-arrow arrow-right" onclick="scrollC(this, 500)">›</button>
                </div>
            `;
            container.innerHTML += html;
        });
    }

    function scrollC(btn, dist) {
        const carousel = btn.parentElement.querySelector('.carousel');
        carousel.scrollBy({ left: dist, behavior: 'smooth' });
    }

    function openDetails(title) {
        const m = playlistData.find(x => x.t === title);
        const overlay = document.getElementById('details-overlay');
        document.getElementById('details-hero').style.backgroundImage = `url('${m.img}')`;
        document.getElementById('details-title').innerText = m.t;
        document.getElementById('details-desc').innerText = m.desc || "Aucun résumé disponible pour ce titre.";
        document.getElementById('details-meta').innerText = `Nouveauté • ${m.cat} • SFPP Elite`;
        
        // Trailer
        document.getElementById('details-trailer').innerHTML = m.trailer ? 
            `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}?autoplay=0&mute=1" frameborder="0" allowfullscreen></iframe>` : "";

        // Casting
        let castHtml = "";
        if(m.actors_pics) {
            castHtml = m.actors_pics.map(a => `
                <div class="cast-member">
                    <img src="${a.img}" onerror="this.src='https://via.placeholder.com/80'">
                    <p>${a.name}</p>
                </div>
            `).join('');
        }
        document.getElementById('details-cast').innerHTML = castHtml;

        document.getElementById('details-play-main').onclick = () => playMovie(m.t);
        overlay.style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function playMovie(title) {
        const m = playlistData.find(x => x.t === title);
        const pSection = document.getElementById('player-section');
        document.getElementById('player-blur').style.backgroundImage = `url('${m.img}')`;
        
        pSection.style.display = 'block';
        player.src({ src: m.url, type: 'video/mp4' });
        player.play();
    }

    function closeDetails() {
        document.getElementById('details-overlay').style.display = 'none';
        document.getElementById('details-trailer').innerHTML = "";
        document.body.style.overflow = 'auto';
    }

    function closeP() {
        player.pause();
        document.getElementById('player-section').style.display = 'none';
    }

    function initProfiles() {
        const list = document.getElementById('profile-list');
        const icons = ["🟦","🟩","🟧","🟪"];
        list.innerHTML = icons.map((icon, i) => `
            <div class="profile-item" tabindex="0" onclick="selectProfile('Profil ${i+1}')">
                <div class="profile-avatar">${icon}</div>
                <div class="profile-name">Profil ${i+1}</div>
            </div>
        `).join('');
        document.getElementById('profile-screen').style.display = 'flex';
    }

    function selectProfile(name) {
        currentProfile = name;
        document.getElementById('profile-screen').style.display = 'none';
    }
</script>

</body>
</html>
