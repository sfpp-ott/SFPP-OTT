<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* STYLE FOCUS TV - INDISPENSABLE */
        [tabindex="0"]:focus {
            outline: 4px solid white !important;
            outline-offset: 2px;
            transform: scale(1.08);
            z-index: 100;
            transition: transform 0.2s ease, outline 0.1s ease;
            background: rgba(255, 255, 255, 0.1);
        }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; }
        .profile-item { text-align: center; cursor: pointer; position: relative; border-radius: 8px; padding: 10px; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-name { font-size: 14px; color: #888; }
        
        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.95); display: flex; align-items: center; 
            padding: 0 15px; z-index: 2000; border-bottom: 1px solid #222; 
            justify-content: space-between; box-sizing: border-box;
        }
        .nav-links { display: flex; gap: 10px; flex: 1; overflow: hidden; margin-left: 15px; }
        .nav-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; font-weight: 500; padding: 10px 15px; border-radius: 4px; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        #player-section { display: none; width: 100%; background: #000; padding-top: 60px; }
        .movie-info { padding: 20px 5%; background: #0a0a0a; border-bottom: 3px solid var(--accent); }
        
        #main-content { padding-top: 80px; }
        .category-row { position: relative; width: 100%; margin-bottom: 30px; }
        .category-title { font-size: 18px; font-weight: bold; margin: 0 4% 10px; color: #fff; }
        
        .carousel { 
            display: flex; overflow-x: auto; gap: 15px; padding: 10px 4%; 
            scrollbar-width: none; scroll-behavior: smooth;
        }
        .carousel::-webkit-scrollbar { display: none; }

        .card { flex: 0 0 160px; cursor: pointer; position: relative; border-radius: 6px; overflow: hidden; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #222; border-radius: 4px; }
        .card-name { margin-top: 6px; font-size: 12px; text-align: center; color: #bbb; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; padding: 0 5px; }

        .prog-bg { position: absolute; bottom: 25px; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .prog-fill { height: 100%; background: var(--accent); }

        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 80px 5% 40px; }
        .episode-item { background: #111; padding: 15px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; display: flex; border: 1px solid #222; }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <h2 style="color:var(--accent)">SFPP ELITE</h2>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit" tabindex="0">CONNEXION</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="margin-bottom:30px">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
</div>

<header>
    <div class="logo" id="header-logo" style="color:var(--accent); font-weight:bold;">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')" tabindex="0">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')" tabindex="0">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')" tabindex="0">Séries</button>
        <button class="nav-btn" id="btn-fav" onclick="changeView('fav')" tabindex="0">Ma Liste</button>
    </div>
    <button class="btn-logout" onclick="switchProfile()" tabindex="0" style="background:#333; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">Profils</button>
</header>

<div id="series-overlay">
    <button class="btn-close" onclick="closeSeries()" tabindex="0">← Retour</button>
    <div id="series-detail-content"></div>
</div>

<section id="player-section">
    <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
    <div class="movie-info">
        <h2 id="display-title"></h2>
        <button id="player-fav-btn" onclick="toggleFavCurrent()" tabindex="0">+ Ma Liste</button>
        <button class="btn-close" onclick="closeP()" tabindex="0" style="margin-left:10px">Fermer</button>
    </div>
</section>

<div id="main-content">
    <div id="expiration-banner"></div>
    <div id="history-sec" style="display:none">
        <div class="category-title">Reprendre</div>
        <div class="category-row"><div class="carousel" id="history-container"></div></div>
    </div>
    <div id="categories-container"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Erreur de connexion"));
    };

    window.selectProfile = function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        render();
    };
</script>

<script>
let player, playlistData = [], currentProfile = null, currentView = 'all', currentPlayingTitle = "";

// LOGIQUE DE NAVIGATION TV (SANS FLÈCHES INVISIBLES)
document.addEventListener('keydown', (e) => {
    const active = document.activeElement;
    if (!active) return;

    // Défilement automatique lors du focus
    setTimeout(() => {
        active.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
    }, 50);

    // Navigation horizontale forcée dans les carrousels
    if (active.classList.contains('card')) {
        const carousel = active.parentElement;
        if (e.key === 'ArrowRight') {
            const next = active.nextElementSibling;
            if (next) next.focus();
            e.preventDefault();
        }
        if (e.key === 'ArrowLeft') {
            const prev = active.previousElementSibling;
            if (prev) prev.focus();
            e.preventDefault();
        }
    }
});

async function loadPlaylist() {
    try { const response = await fetch('films.json'); playlistData = await response.json(); render(); } catch (e) {}
}

function initProfiles() {
    let profiles = [
        { name: "Profil 1", icon: "🟦", color: "#1e90ff" },
        { name: "Profil 2", icon: "🟩", color: "#2ecc71" },
        { name: "Profil 3", icon: "🟧", color: "#e67e22" },
        { name: "Profil 4", icon: "🟪", color: "#9b59b6" }
    ];
    document.getElementById('profile-list').innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="selectProfile('${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div class="profile-name">${p.name}</div>
        </div>`).join('');
}

function render() {
    const cont = document.getElementById('categories-container');
    cont.innerHTML = "";
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    const cats = [...new Set(data.map(m => m.cat))];
    let addedSeries = [];

    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c);
        let html = `<div class="category-title">${c}</div><div class="category-row"><div class="carousel">`;
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${sName}</div></div>`;
                }
            } else {
                html += `<div class="card" onclick="playMovie(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        html += `</div></div>`;
        cont.innerHTML += html;
    });
}

function openSeries(name) {
    const overlay = document.getElementById('series-overlay');
    overlay.style.display = 'block';
    const eps = playlistData.filter(m => m.t.startsWith(name));
    document.getElementById('series-detail-content').innerHTML = eps.map(ep => `
        <div class="episode-item" onclick="playMovie(${playlistData.indexOf(ep)}); closeSeries();" tabindex="0">
            ${ep.t}
        </div>`).join('');
    document.querySelector('.btn-close').focus();
}

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    window.scrollTo(0,0);
    player.src({ src: m.url, type: 'video/mp4' });
    player.play();
}

function closeP() { player.pause(); document.getElementById('player-section').style.display = 'none'; }
function closeSeries() { document.getElementById('series-overlay').style.display = 'none'; }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }
function changeView(v) { 
    currentView = v; 
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+v).classList.add('active');
    render(); 
}

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video');
});
</script>
</body>
</html>
