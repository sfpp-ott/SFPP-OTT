
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFPP OTT - Premium Cast & Épuré</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body { background-color: #000; color: white; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; scroll-behavior: smooth; }
        
        /* Navbar */
        nav { display: flex; justify-content: space-between; padding: 15px 5%; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: fixed; width: 100%; box-sizing: border-box; z-index: 100; }
        .logo { color: #E50914; font-size: 1.6rem; font-weight: bold; text-decoration: none; letter-spacing: 2px; }

        /* Hero Section */
        .hero { height: 75vh; background: linear-gradient(to bottom, transparent, #000), url('https://media.themoviedb.org/t/p/w500_and_h282_face/hz7TdCrpLLt2Dz7S3PS2HG9rpAO.jpg'); background-size: cover; background-position: center; display: flex; align-items: center; padding: 0 5%; }
        .hero-content { max-width: 550px; }
        .hero-content h1 { font-size: 2.8rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        
        .hero-buttons { display: flex; gap: 15px; margin-top: 25px; flex-wrap: wrap; }
        
        .btn-main { padding: 12px 28px; font-weight: bold; border-radius: 4px; border: none; cursor: pointer; transition: 0.3s; font-size: 1rem; display: flex; align-items: center; gap: 8px; }
        .btn-watch { background-color: #fff; color: #000; }
        .btn-watch:hover { background-color: #e6e6e6; transform: scale(1.05); }
        .btn-trailer { background-color: rgba(109, 109, 110, 0.7); color: white; }
        .btn-trailer:hover { background-color: rgba(109, 109, 110, 0.9); transform: scale(1.05); }

        /* Conteneur Principal */
        .main-container { padding: 20px 5%; max-width: 900px; margin: 0 auto; }
        
        /* Sections Masquées */
        #trailer-area, #movie-area { display: none; margin-bottom: 50px; background: #141414; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
        
        .video-info-bar { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #1f1f1f; border-bottom: 1px solid #333; flex-wrap: wrap; gap: 10px; }
        
        .controls-group { display: flex; gap: 10px; align-items: center; }

        /* Bouton Cast & Format */
        .btn-cast-tool { background: #333; color: white; border: 1px solid #444; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; display: flex; align-items: center; gap: 5px; }
        .btn-cast-tool:hover { background: #E50914; border-color: #E50914; }
        
        .format-box select { background: #000; color: #fff; border: 1px solid #E50914; padding: 6px 12px; border-radius: 5px; outline: none; cursor: pointer; font-size: 0.8rem; }

        /* Style Plyr */
        .plyr--full-ui { --plyr-color-main: #E50914; }
        .video-wrapper { position: relative; width: 100%; background: #000; aspect-ratio: 16/9; }
        
        /* Correction Formatage Vidéo */
        .fit-cover .plyr__video-wrapper video { object-fit: cover !important; }
        .fit-fill .plyr__video-wrapper video { object-fit: fill !important; }
        .fit-contain .plyr__video-wrapper video { object-fit: contain !important; }

        h2 { border-left: 4px solid #E50914; padding-left: 15px; font-size: 1.4rem; margin: 20px 0; }
    </style>
</head>
<body>

<nav>
    <a href="#" class="logo">SFPP OTT</a>
</nav>

<section class="hero">
    <div class="hero-content">
        <h1>SCREAM 7 : (2026)</h1>
        <p style="color: #bbb;">Sidney Prescott revient pour affronter un nouveau Ghostface. Déterminée à protéger sa famille, elle doit affronter les démons de son passé.</p>
        <div class="hero-buttons">
            <button class="btn-main btn-watch" onclick="showMovie()">▶ Regarder le film</button>
            <button class="btn-main btn-trailer" onclick="showTrailer()">ⓘ Bande-annonce</button>
        </div>
    </div>
</section>

<div class="main-container">
    
    <div id="trailer-area">
        <h2 style="margin: 15px;">Bande-annonce officielle</h2>
        <div id="youtube-player" style="width: 100%; aspect-ratio: 16/9;"></div>
    </div>

    <div id="movie-area">
        <div class="video-info-bar">
            <h3 style="margin:0; font-size: 1rem;">Film Complet - Qualité HD</h3>
            
            <div class="controls-group">
                <button class="btn-cast-tool" onclick="alert('Option Cast : Utilisez le menu de votre navigateur Chrome (Enregistrer et Partager > Caster) ou l\'icône AirPlay sur Safari.')">
                    📺 Caster sur TV
                </button>

                <div class="format-box">
                    <select onchange="updateFormat(this.value)">
                        <option value="fit-contain">Format : Original</option>
                        <option value="fit-cover">Format : Zoom</option>
                        <option value="fit-fill">Format : Étiré</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="video-wrapper" id="player-container">
            <video id="player" playsinline controls class="fit-contain">
                <source src="https://ia600504.us.archive.org/22/items/1282921/1282921.mp4" type="video/mp4">
            </video>
        </div>
    </div>

    <h2>À ne pas manquer</h2>
    <img src="https://media.themoviedb.org/t/p/w500_and_h282_face/hz7TdCrpLLt2Dz7S3PS2HG9rpAO.jpg" style="width: 200px; border-radius: 8px; cursor: pointer; border: 1px solid #333;" onclick="showMovie()">

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>

<script>
    // Initialisation globale du lecteur
    const videoElement = document.getElementById('player');
    const playerInstance = new Plyr(videoElement, {
        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'settings', 'pip', 'airplay', 'fullscreen'],
    });

    function showMovie() {
        const movieArea = document.getElementById('movie-area');
        const trailerArea = document.getElementById('trailer-area');
        
        trailerArea.style.display = 'none';
        document.getElementById('youtube-player').innerHTML = ''; // Arrête le trailer
        movieArea.style.display = 'block';
        
        movieArea.scrollIntoView({ behavior: 'smooth' });
        
        // Relance la vidéo MP4 au début si besoin et joue
        playerInstance.play();
    }

    function showTrailer() {
        const movieArea = document.getElementById('movie-area');
        const trailerArea = document.getElementById('trailer-area');
        
        movieArea.style.display = 'none';
        playerInstance.pause(); // Arrête le film

        trailerArea.style.display = 'block';
        document.getElementById('youtube-player').innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/QM8n8XpEm_c?autoplay=1" frameborder="0" allowfullscreen></iframe>`;
        
        trailerArea.scrollIntoView({ behavior: 'smooth' });
    }

    function updateFormat(val) {
        // Applique le format au conteneur Plyr
        const container = document.getElementById('player-container');
        container.classList.remove('fit-cover', 'fit-fill', 'fit-contain');
        container.classList.add(val);
    }
</script>

</body>
</html>
