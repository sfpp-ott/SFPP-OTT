<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* LOGIN & PROFILES */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        
        /* HEADER OPTIMISÉ POUR DÉFILEMENT */
        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.95); display: flex; align-items: center; 
            padding: 0 10px; z-index: 2000; border-bottom: 1px solid #222; box-sizing: border-box;
        }
        
        .logo { color: var(--accent); font-weight: 900; font-size: 16px; flex-shrink: 0; margin-right: 10px; }
        
        .nav-links { 
            display: flex; gap: 15px; flex: 1; overflow-x: auto; 
            white-space: nowrap; align-items: center; scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .nav-links::-webkit-scrollbar { display: none; }

        .nav-btn { 
            background: none; border: none; color: #bbb; cursor: pointer; 
            font-size: 14px; font-weight: 500; padding: 15px 5px; flex-shrink: 0;
        }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 3px solid var(--accent); }

        /* RECHERCHE ÉVOLUÉE */
        .header-actions { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        #search-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: #000; display: none; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 2005;
        }
        #searchBar { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 10px; border-radius: 4px; outline: none; }

        /* CARDS & PROGRESSION ROUGE */
        .card { flex: 0 0 140px; cursor: pointer; position: relative; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; background: #222; }
        .prog-bg { position: absolute; bottom: 25px; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); }
        .prog-fill { height: 100%; background: var(--accent); }
        .card-name { margin-top: 6px; font-size: 12px; text-align: center; color: #bbb; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        /* PLAYER & INFO */
        #player-section { display: none; width: 100%; background: #000; padding-top: 60px; }
        .movie-info { padding: 20px 5%; background: #0a0a0a; border-bottom: 3px solid var(--accent); }
        #next-episode-btn {
            position: absolute; bottom: 85px; right: 25px; z-index: 100;
            background: var(--accent); color: white; border: 2px solid #fff;
            padding: 12px 20px; border-radius: 8px; font-weight: bold; display: none;
        }
        
        #expiration-banner { display: none; background: #ffcc00; color: #000; text-align: center; padding: 10px; font-weight: bold; }
        #main-content { padding-top: 75px; }
        .category-row { position: relative; margin-bottom: 20px; }
        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 0 4% 10px; scrollbar-width: none; }
        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 80px 5% 40px; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="text" id="user" placeholder="E-mail">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="checkLogin()">CONNEXION</button>
    </div>
</div>

<div id="profile-screen">
    <h1>Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
</div>

<header>
    <div class="logo" id="header-logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')">Séries</button>
        <button class="nav-btn" id="btn-fav" onclick="changeView('fav')">Ma Liste ❤️</button>
    </div>
    
    <div class="header-actions">
        <button onclick="toggleSearch(true)" style="background:none; border:none; color:white; font-size:18px;">🔍</button>
        <button onclick="switchProfile()" style="background:#333; color:white; border:none; padding:5px 8px; border-radius:4px; font-size:10px;">PROFILS</button>
    </div>

    <div id="search-wrapper">
        <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher...">
        <button onclick="toggleSearch(false)" style="background:none; border:none; color:white; margin-left:10px;">✖</button>
    </div>
</header>

<section id="player-section">
    <div class="video-container">
        <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
        <button id="next-episode-btn" onclick="playNextEpisode()">ÉPISODE SUIVANT ⏭️</button>
    </div>
    <div class="movie-info">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 id="display-title" style="margin:0;"></h2>
            <button id="player-fav-btn" onclick="toggleFavCurrent()" style="background:#222; color:white; border:1px solid #444; padding:8px 12px; border-radius:4px;">+ Ma Liste</button>
        </div>
        <p id="display-desc" style="color:#bbb; font-size:14px;"></p>
        <p id="display-actors" style="color:var(--gold); font-size:13px; font-weight:bold;"></p>
        <button onclick="closeP()" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:4px; width:100%;">Fermer</button>
    </div>
</section>

<div id="main-content">
    <div id="expiration-banner"></div>
    <div id="history-sec" style="display:none">
        <div style="font-size:18px; font-weight:bold; margin:20px 4% 10px;">Reprendre avec <span id="current-user-name"></span></div>
        <div class="carousel" id="history-container"></div>
    </div>
    <div id="categories-container"></div>
</div>

<div id="series-overlay">
    <button onclick="closeSeries()" style="background:none; border:none; color:white; font-size:18px; margin-bottom:20px;">← Retour</button>
    <div id="series-detail-content"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.checkLogin = function() {
        signInWithEmailAndPassword(auth, document.getElementById('user').value, document.getElementById('pass').value).catch(() => alert("Erreur"));
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.initProfiles = function() {
        const profiles = [{n:"Papa",i:"🟦"}, {n:"Maman",i:"🟩"}, {n:"Enfants",i:"🟧"}];
        document.getElementById('profile-list').innerHTML = profiles.map(p => `
            <div onclick="selectProfile('${p.n}', '${p.i}')">
                <div class="profile-avatar">${p.i}</div>
                <div style="text-align:center">${p.n}</div>
            </div>`).join('');
    };
</script>

<script>
let player, playlistData = [], currentProfile = null, currentView = 'all', currentPlayingTitle = "";

function toggleSearch(show) {
    document.getElementById('search-wrapper').style.display = show ? 'flex' : 'none';
    if(show) document.getElementById('searchBar').focus();
}

async function loadPlaylist() {
    const res = await fetch('films.json');
    playlistData = await res.json();
    render();
}

function selectProfile(n, i) {
    currentProfile = n;
    localStorage.setItem('sfpp_profile', n);
    localStorage.setItem('sfpp_profile_icon', i);
    document.getElementById('profile-screen').style.display = 'none';
    document.getElementById('current-user-name').innerText = n;
    document.getElementById('header-logo').innerHTML = `SFPP | ${i}`;
    render();
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histCont = document.getElementById('history-container');
    const s = search.toLowerCase();
    cont.innerHTML = ""; histCont.innerHTML = "";

    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");

    // REPRENDRE (HISTORIQUE)
    let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
    if(history.length > 0 && s === "") {
        document.getElementById('history-sec').style.display = "block";
        history.reverse().forEach(t => {
            const m = playlistData.find(x => x.t === t);
            if(m) {
                const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                histCont.innerHTML += `<div class="card" onclick="playMovie('${m.t}')"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
    }

    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    const cats = [...new Set(data.map(m => m.cat))];
    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if(filtered.length === 0) return;
        let html = `<div style="font-size:18px; font-weight:bold; margin:20px 4% 10px;">${c}</div><div class="carousel">`;
        let addedSeries = [];
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')"><img src="${m.img}"><div class="card-name">${sName}</div></div>`;
                }
            } else {
                html += `<div class="card" onclick="playMovie('${m.t}')"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        cont.innerHTML += html + `</div>`;
    });
}

function playMovie(title) {
    const m = playlistData.find(x => x.t === title);
    currentPlayingTitle = m.t;
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('display-desc').innerText = m.desc || "";
    document.getElementById('display-actors').innerText = m.actors ? "Avec : " + m.actors : "";
    
    player.src({ src: m.url, type: 'video/mp4' });
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t]) player.currentTime(prog[m.t].t);
    
    let hist = JSON.parse(localStorage.getItem('sfpp_hist_'+currentProfile) || "[]").filter(t => t !== m.t);
    hist.push(m.t);
    localStorage.setItem('sfpp_hist_'+currentProfile, JSON.stringify(hist));
    
    updateFavBtn();
    player.play();
    window.scrollTo(0,0);
}

function saveP() {
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        prog[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(prog));
    }
}

function toggleFavCurrent() {
    let favs = JSON.parse(localStorage.getItem('sfpp_fav_'+currentProfile) || "[]");
    if(favs.includes(currentPlayingTitle)) favs = favs.filter(t => t !== currentPlayingTitle);
    else favs.push(currentPlayingTitle);
    localStorage.setItem('sfpp_fav_'+currentProfile, JSON.stringify(favs));
    updateFavBtn();
}

function updateFavBtn() {
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_'+currentProfile) || "[]");
    document.getElementById('player-fav-btn').innerText = favs.includes(currentPlayingTitle) ? "❤️ Ma Liste" : "+ Ma Liste";
}

function closeP() { saveP(); player.pause(); document.getElementById('player-section').style.display = 'none'; render(); }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }
function changeView(v) { currentView = v; render(); }
function filter() { render(document.getElementById('searchBar').value); }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video');
    player.on('timeupdate', () => { if(Math.floor(player.currentTime()) % 10 === 0) saveP(); });
});
</script>
</body>
</html>
