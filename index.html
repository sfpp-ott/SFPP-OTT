<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        /* --- DESIGN ÉLITE --- */
        :root { 
            --accent: #e50914; 
            --gold: #ffcc00; 
            --bg: #050505; 
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; 
            padding-bottom: 50px; 
            overflow-x: hidden;
        }
        
        [tabindex="0"]:focus {
            outline: 4px solid white !important;
            outline-offset: 4px;
            transform: scale(1.1) !important;
            z-index: 1000;
        }

        /* --- LOGIN & PROFIL --- */
        #login-screen, #profile-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: #0a0a0a; padding: 40px; border-radius: 20px; width: 320px; text-align: center; border: 1px solid #222; }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; background: #111; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: 800; border-radius: 10px; cursor: pointer; text-transform: uppercase; }

        .profile-grid { display: flex; gap: 30px; margin-top: 40px; }
        .profile-item { text-align: center; cursor: pointer; transition: 0.3s; }
        .profile-avatar { width: 130px; height: 130px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 4px solid transparent; transition: 0.3s; }
        .profile-item:hover .profile-avatar { border-color: white; transform: scale(1.05); }

        /* --- HEADER MODERNE --- */
        header { 
            position: fixed; top: 0; width: 100%; height: 75px; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(25px);
            display: flex; align-items: center; padding: 0 4%; z-index: 2000; 
            border-bottom: 1px solid rgba(255,255,255,0.1); justify-content: space-between; box-sizing: border-box;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 24px; letter-spacing: -1px; }
        
        .nav-links { display: flex; gap: 10px; align-items: center; margin-left: 30px; }
        .nav-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; font-weight: 600; padding: 10px 15px; border-radius: 20px; transition: 0.3s; }
        .nav-btn.active { color: black; background: white; }

        /* --- RECHERCHE --- */
        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 75px;
            background: #000; display: none; align-items: center; padding: 0 4%;
            box-sizing: border-box; z-index: 2001;
        }
        #searchBar { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 12px 25px; border-radius: 30px; outline: none; }

        /* --- GRILLE ET CARTES --- */
        #main-content { padding-top: 100px; }
        .category-title { font-size: 22px; font-weight: 800; margin: 40px 4% 15px; text-transform: uppercase; letter-spacing: 1px; }
        .carousel { display: flex; overflow-x: auto; gap: 20px; padding: 0 4% 30px; scrollbar-width: none; }
        .carousel::-webkit-scrollbar { display: none; }
        
        .card { flex: 0 0 170px; cursor: pointer; position: relative; transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1); }
        .card:hover { transform: scale(1.15); z-index: 100; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .card-name { margin-top: 12px; font-size: 13px; text-align: center; color: #aaa; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .prog-bg { position: absolute; bottom: 35px; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 0 0 12px 12px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* --- DETAILS OVERLAY --- */
        #details-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 3500; display: none; align-items: center; justify-content: center; }
        .details-content { background: #0a0a0a; max-width: 900px; width: 90%; border-radius: 25px; display: flex; overflow: hidden; border: 1px solid #222; position: relative; }
        .details-poster { width: 40%; object-fit: cover; }
        .details-info { width: 60%; padding: 50px; }
        .btn-play-main { background: white; color: black; border: none; padding: 18px 30px; border-radius: 12px; font-weight: 800; cursor: pointer; font-size: 18px; width: 100%; margin-top: 20px; }

        /* --- LECTEUR --- */
        #player-section { position: fixed; inset: 0; background: #000; z-index: 4000; display: none; }
        .vjs-blur-bg { position: absolute; inset: 0; background-size: cover; filter: blur(40px) brightness(0.3); opacity: 0.6; }

        #next-episode-btn {
            position: absolute; bottom: 100px; right: 40px; z-index: 5000;
            background: var(--accent); color: white; border: 2px solid #fff; padding: 15px 30px;
            border-radius: 50px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 30px rgba(229, 9, 20, 0.4);
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .details-content { flex-direction: column; }
            .details-poster { width: 100%; height: 250px; }
            .details-info { width: 100%; padding: 25px; }
            .card { flex: 0 0 130px; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:30px; font-size: 35px;">SFPP <span style="color:white">ELITE</span></div>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit" tabindex="0">Se connecter</button>
        <button type="button" class="btn-request" onclick="requestAccess()" style="background:none; border:none; color:#555; margin-top:20px; cursor:pointer;" tabindex="0">Besoin d'aide ?</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="font-size: 40px; font-weight: 800; margin-bottom: 40px;">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-manage" id="manage-btn" onclick="toggleEditMode()" style="margin-top: 50px; background:none; border: 1px solid #333; color: #888; padding: 10px 25px; border-radius: 30px; cursor: pointer;" tabindex="0">GÉRER LES PROFILS</button>
    <button onclick="logout()" style="margin-top: 20px; color:#444; background:none; border:none; cursor:pointer;" tabindex="0">DÉCONNEXION</button>
</div>

<header>
    <div style="display: flex; align-items: center;">
        <div class="logo" id="header-logo">SFPP ELITE</div>
        <div class="nav-links">
            <button class="nav-btn active" id="btn-all" onclick="changeView('all')" tabindex="0">Accueil</button>
            <button class="nav-btn" id="btn-movies" onclick="changeView('movies')" tabindex="0">Films</button>
            <button class="nav-btn" id="btn-series" onclick="changeView('series')" tabindex="0">Séries</button>
            <button class="nav-btn" id="btn-fav" onclick="changeView('fav')" tabindex="0">Ma Liste</button>
        </div>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
        <button class="btn-icon" onclick="openSearch()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;" tabindex="0">🔍</button>
        <button onclick="switchProfile()" style="background:none; border: 1px solid #444; color:white; padding: 6px 15px; border-radius: 20px; font-size: 12px; cursor:pointer;" tabindex="0">PROFIL</button>
        <button onclick="logout()" style="background:none; border:none; color:var(--accent); font-weight:bold; cursor:pointer;" tabindex="0">QUITTER</button>
    </div>
    <div id="search-overlay">
        <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher un titre..." tabindex="0">
        <button class="btn-icon" onclick="closeSearch()" style="margin-left:20px; background:none; border:none; color:white; font-size:20px;" tabindex="0">✕</button>
    </div>
</header>

<div id="details-overlay">
    <div class="details-content">
        <button onclick="closeDetails()" style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.1); border:none; color:white; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:20px; z-index:10;">✕</button>
        <img id="details-img" class="details-poster" src="">
        <div class="details-info">
            <h2 id="details-title" style="font-size: 35px; margin:0;"></h2>
            <div id="details-meta" style="color:var(--gold); margin: 15px 0; font-weight:bold;"></div>
            <p id="details-desc" style="color:#888; line-height:1.6; font-size:16px; margin: 20px 0;"></p>
            <div id="details-trailer-box"></div>
            <button id="details-play-btn" class="btn-play-main" tabindex="0">▶ LIRE MAINTENANT</button>
        </div>
    </div>
</div>

<div id="series-overlay" style="position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 100px 5% 40px;">
    <button onclick="closeSeries()" style="background:#222; color:white; border:none; padding:10px 25px; border-radius:30px; margin-bottom:30px; cursor:pointer;" tabindex="0">← RETOUR</button>
    <div id="series-detail-content"></div>
</div>

<section id="player-section">
    <div id="player-blur-bg" class="vjs-blur-bg"></div>
    <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
    <button id="next-episode-btn" onclick="playNextEpisode()" tabindex="0">ÉPISODE SUIVANT ⏭️</button>
    <div style="padding: 30px 5%;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="display-title" style="font-size: 30px; margin:0;"></h2>
            <button id="player-fav-btn" onclick="toggleFavCurrent()" style="background:#222; border:1px solid #444; color:white; padding:10px 20px; border-radius:10px; cursor:pointer;" tabindex="0">+ MA LISTE</button>
        </div>
        <p id="display-desc" style="color:#888; margin-top:20px;"></p>
        <button onclick="closeP()" style="margin-top:30px; background:var(--accent); color:white; border:none; padding:12px 30px; border-radius:10px; cursor:pointer;" tabindex="0">FERMER LE LECTEUR</button>
    </div>
</section>

<div id="main-content">
    <div id="expiration-banner" style="display:none; background:var(--gold); color:black; text-align:center; padding:10px; font-weight:800;"></div>
    <div id="history-sec" style="display:none">
        <div class="category-title">Continuer la lecture</div>
        <div class="carousel" id="history-container"></div>
    </div>
    <div id="categories-container"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    // --- TA LOGIQUE FIREBASE CONSERVÉE ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            location.reload();
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = async function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        render();
    };

    window.logout = function() { signOut(auth).then(() => { localStorage.clear(); location.reload(); }); };
</script>

<script>
    // --- TES FONCTIONS DE LECTURE ET RENDU ---
    let player, playlistData = [], currentProfile = null, currentView = 'all', currentPlayingTitle = "";

    async function loadPlaylist() {
        const response = await fetch('films.json');
        playlistData = await response.json();
        render();
    }

    function render(search = "") {
        const cont = document.getElementById('categories-container');
        cont.innerHTML = "";
        const s = search.toLowerCase();
        const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
        const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");

        let data = playlistData;
        if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
        else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
        else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

        const cats = [...new Set(data.map(m => m.cat))];
        let addedSeries = [];

        cats.forEach(c => {
            const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
            if (filtered.length === 0) return;
            let html = `<div class="category-title">${c}</div><div class="carousel">`;
            filtered.forEach(m => {
                const isS = /S\d{2}E\d{2}/i.test(m.t);
                const pct = (prog[m.t]) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                
                if(isS) {
                    const sName = m.t.split(' - ')[0];
                    if(!addedSeries.includes(sName)) {
                        addedSeries.push(sName);
                        html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${sName}</div></div>`;
                    }
                } else {
                    html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
                }
            });
            html += `</div>`;
            cont.innerHTML += html;
        });
    }

    function openDetails(idx) {
        const m = playlistData[idx];
        document.getElementById('details-img').src = m.img;
        document.getElementById('details-title').innerText = m.t;
        document.getElementById('details-desc').innerText = m.desc || "Pas de description.";
        document.getElementById('details-play-btn').onclick = () => { closeDetails(); playMovie(idx); };
        document.getElementById('details-overlay').style.display = 'flex';
        document.getElementById('details-play-btn').focus();
    }

    function playMovie(idx) {
        const m = playlistData[idx];
        currentPlayingTitle = m.t;
        document.getElementById('player-section').style.display = 'block';
        document.getElementById('display-title').innerText = m.t;
        document.getElementById('player-blur-bg').style.backgroundImage = `url('${m.img}')`;
        player.src({ src: m.url, type: 'video/mp4' });
        player.play();
    }

    function initProfiles() {
        const profiles = [
            { id: 1, name: "Elite 1", icon: "🟥", color: "#e50914" },
            { id: 2, name: "Elite 2", icon: "🟦", color: "#1e90ff" }
        ];
        document.getElementById('profile-list').innerHTML = profiles.map(p => `
            <div class="profile-item" onclick="selectProfile('${p.name}', '${p.icon}')" tabindex="0">
                <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
                <div style="margin-top:15px; font-weight:600;">${p.name}</div>
            </div>`).join('');
    }

    function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; }
    function closeP() { player.pause(); document.getElementById('player-section').style.display = 'none'; }
    function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('searchBar').focus(); }
    function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; filter(); }
    function filter() { render(document.getElementById('searchBar').value); }
    function changeView(v) { currentView = v; render(); }
    function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }

    document.addEventListener('DOMContentLoaded', () => {
        player = videojs('main-video', { controls: true, fluid: true });
    });
</script>
</body>
</html>
