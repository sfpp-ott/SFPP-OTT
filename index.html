<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-request { background: none !important; border: none; color: #666 !important; font-size: 11px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; }
        .profile-item:hover { transform: scale(1.05); }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-item:hover .profile-avatar { border-color: white; }
        .profile-name { font-size: 14px; color: #888; }
        
        .edit-icon { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border-radius: 50%; padding: 5px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }
        .btn-manage { margin-top: 40px; background: none; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-size: 14px; letter-spacing: 1px; }

        /* HEADER OPTIMISÉ POUR TOUT FAIRE TENIR */
        header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            height: 60px; 
            background: rgba(0,0,0,0.95); 
            display: flex; 
            align-items: center; 
            padding: 0 1%; /* Réduit au minimum */
            z-index: 2000; 
            gap: 3px; /* Espacement très serré pour gagner de la place */
            border-bottom: 1px solid #222; 
            justify-content: space-between; 
            box-sizing: border-box;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 16px; flex-shrink: 0; }
        
        .nav-links { 
            display: flex; 
            gap: 0px; 
            flex: 1; 
            justify-content: center;
            white-space: nowrap;
        }
        .nav-btn { 
            background: none; 
            border: none; 
            color: #bbb; 
            cursor: pointer; 
            font-size: 12px; /* Police réduite */
            font-weight: 500; 
            padding: 5px 4px; 
            transition: color 0.3s; 
        }
        .nav-btn:hover { color: white; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        #searchBar { 
            flex: 0 1 75px; /* Largeur de recherche plus courte */
            background: #222; 
            border: 1px solid #444; 
            color: white; 
            padding: 5px 6px; 
            border-radius: 20px; 
            outline: none; 
            font-size: 11px; 
        }
        /* Bouton Profils plus petit pour tenir à droite */
        .btn-logout { 
            background: #333; 
            color: white; 
            border: none; 
            padding: 5px 6px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 10px; 
            flex-shrink: 0; 
            border: 1px solid #444; 
            margin-right: 2px;
        }

        /* --- NOUVEAU DESIGN LECTEUR ELITE --- */
        #player-section { display: none; width: 100%; background: #000; padding-top: 60px; }
        .video-container { position: relative; width: 100%; overflow: hidden; background: #000; }
        
        #video-touch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 50px);
            z-index: 10;
            cursor: pointer;
        }

        .video-js { font-family: 'Helvetica Neue', Arial, sans-serif; }
        .vjs-theme-fantasy .vjs-control-bar { background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%); height: 50px; }
        .vjs-theme-fantasy .vjs-play-progress { background-color: var(--accent); }
        .vjs-theme-fantasy .vjs-big-play-centered .vjs-big-play-button { 
            background-color: rgba(229, 9, 20, 0.85); 
            border: none; 
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            line-height: 80px;
            margin-top: -40px;
            margin-left: -40px;
        }

        .movie-info { padding: 20px 5%; background: #0a0a0a; min-height: 150px; border-bottom: 3px solid var(--accent); }
        .movie-title { font-size: 26px; font-weight: bold; margin-bottom: 8px; color: #fff; }
        .movie-cast { display: none; color: var(--gold); font-weight: bold; font-size: 15px; margin: 10px 0; padding: 5px 0; border-top: 1px solid #222; border-bottom: 1px solid #222; }
        .movie-desc { font-size: 14px; color: #bbb; line-height: 1.5; margin-bottom: 20px; }

        #main-content { padding-top: 80px; }
        .category-title { font-size: 18px; font-weight: bold; margin: 20px 4% 10px; color: #fff; text-transform: uppercase; }
        
        .featured-grid { display: flex; overflow-x: auto; gap: 15px; padding: 0 4% 20px; scrollbar-width: none; }
        .featured-card { flex: 0 0 320px; aspect-ratio: 16/9; position: relative; border-radius: 6px; overflow: hidden; cursor: pointer; border: 1px solid #333; }
        .featured-card img { width: 100%; height: 100%; object-fit: cover; }
        .featured-title { position: absolute; bottom: 0; width: 100%; padding: 25px 10px 5px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); font-weight: bold; }

        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 0 4% 20px; scrollbar-width: none; }
        .card { flex: 0 0 150px; cursor: pointer; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; background: #222; }
        .card-name { margin-top: 6px; font-size: 12px; text-align: center; color: #bbb; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .btn-close { background: #333; color: #fff; border: none; padding: 10px 22px; border-radius: 4px; cursor: pointer; }

        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 80px 5% 40px; }
        .overlay-header { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; }
        .overlay-img { width: 120px; border-radius: 8px; border: 1px solid #333; }
        .season-title { color: var(--accent); font-size: 18px; font-weight: bold; margin: 25px 0 10px; border-left: 3px solid var(--accent); padding-left: 10px; }
        .episode-item { background: #111; padding: 15px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; border: 1px solid #222; }
        .episode-item:hover { background: #222; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="text" id="user" placeholder="Utilisateur">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="checkLogin()">CONNEXION</button>
        <button class="btn-request" onclick="requestAccess()">Nouveau ? Demander un accès</button>
    </div>
</div>

<div id="profile-screen">
    <h1 id="profile-title" style="font-size: 32px;">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-manage" id="manage-btn" onclick="toggleEditMode()">GÉRER LES PROFILS</button>
    <button onclick="logout()" style="margin-top: 15px; background:none; border: none; color:#444; cursor:pointer; font-size: 12px;">DÉCONNEXION</button>
</div>

<header>
    <div class="logo" id="header-logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')">Séries</button>
    </div>
    <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher...">
    <button class="btn-logout" onclick="switchProfile()">PROFILS</button>
</header>

<div id="series-overlay">
    <button class="btn-close" onclick="closeSeries()" style="margin-bottom: 20px;">← Retour</button>
    <div id="series-detail-content"></div>
</div>

<section id="player-section">
    <div class="video-container">
        <div id="video-touch-overlay"></div>
        <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
    </div>
    <div class="movie-info">
        <div id="display-title" class="movie-title"></div>
        <div id="display-cast" class="movie-cast"></div>
        <div id="display-desc" class="movie-desc"></div>
        <button class="btn-close" onclick="closeP()">Fermer</button>
    </div>
</section>

<div id="main-content">
    <div id="history-sec" style="display:none">
        <div class="category-title">Reprendre avec <span id="current-user-name"></span></div>
        <div class="carousel" id="history-container"></div>
    </div>
    <div id="featured-sec">
        <div class="category-title">À la une</div>
        <div class="featured-grid" id="featured-container"></div>
    </div>
    <div id="categories-container"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script>
const USERS = [
    { u: "SFPP", p: "2025", exp: "2100-12-31" },
    { u: "test", p: "test", exp: "2026-04-13" },
    { u: "MEMBRE2", p: "123", exp: "2026-06-15" }
];

let player;
let playlistData = [];
let currentProfile = null;
let isEditMode = false;
let currentView = 'all';

const defaultProfiles = [
    { id: 1, name: "Papa", icon: "🟦", color: "#1e90ff" },
    { id: 2, name: "Maman", icon: "🟩", color: "#2ecc71" },
    { id: 3, name: "Enfant 1", icon: "🟧", color: "#e67e22" },
    { id: 4, name: "Enfant 2", icon: "🟪", color: "#9b59b6" }
];

async function loadPlaylist() {
    try {
        const response = await fetch('films.json');
        playlistData = await response.json();
        render();
    } catch (e) {
        console.error("Erreur chargement JSON:", e);
    }
}

function requestAccess() {
    const email = "sfpp.ott@gmail.com";
    const subject = "Demande d'accès SFPP ELITE";
    const body = "Bonjour,\n\nJe souhaiterais obtenir un accès pour SFPP ELITE.\n\nMerci d'avance.";
    window.location.href = `mailto:${email}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function initProfiles() {
    let saved = localStorage.getItem('sfpp_profiles_data');
    let profiles = saved ? JSON.parse(saved) : defaultProfiles;
    const list = document.getElementById('profile-list');
    list.innerHTML = "";
    profiles.forEach(p => {
        list.innerHTML += `<div class="profile-item" onclick="handleProfileClick(${p.id}, '${p.name}', '${p.icon}')">
                <div class="profile-avatar" style="background: ${p.color};">${p.icon}</div>
                <div class="edit-icon">✏️</div>
                <div class="profile-name" id="pname-${p.id}">${p.name}</div>
            </div>`;
    });
}

function toggleEditMode() {
    isEditMode = !isEditMode;
    const screen = document.getElementById('profile-screen');
    const btn = document.getElementById('manage-btn');
    const title = document.getElementById('profile-title');
    if(isEditMode) { screen.classList.add('is-editing'); btn.innerText = "TERMINÉ"; title.innerText = "Gérer les profils"; } 
    else { screen.classList.remove('is-editing'); btn.innerText = "GÉRER LES PROFILS"; title.innerText = "Qui regarde ?"; }
}

function handleProfileClick(id, name, icon) {
    if(isEditMode) {
        let newName = prompt("Nouveau nom pour ce profil :", name);
        if(newName && newName.trim() !== "") { updateProfileName(id, newName.trim()); }
    } else { selectProfile(name, icon); }
}

function updateProfileName(id, newName) {
    let saved = JSON.parse(localStorage.getItem('sfpp_profiles_data') || JSON.stringify(defaultProfiles));
    const idx = saved.findIndex(p => p.id === id);
    if(idx !== -1) { saved[idx].name = newName; localStorage.setItem('sfpp_profiles_data', JSON.stringify(saved)); initProfiles(); }
}

function selectProfile(name, icon) {
    currentProfile = name;
    localStorage.setItem('sfpp_profile', name);
    localStorage.setItem('sfpp_profile_icon', icon);
    document.getElementById('profile-screen').style.display = 'none';
    document.getElementById('current-user-name').innerText = name;
    document.getElementById('header-logo').innerText = "SFPP | " + icon;
    render();
}

function switchProfile() {
    currentProfile = null; isEditMode = false;
    document.getElementById('profile-screen').classList.remove('is-editing');
    document.getElementById('manage-btn').innerText = "GÉRER LES PROFILS";
    document.getElementById('profile-title').innerText = "Qui regarde ?";
    localStorage.removeItem('sfpp_profile');
    document.getElementById('profile-screen').style.display = 'flex';
    initProfiles();
}

function changeView(view) {
    currentView = view;
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    if(view === 'all') document.getElementById('btn-all').classList.add('active');
    if(view === 'movies') document.getElementById('btn-movies').classList.add('active');
    if(view === 'series') document.getElementById('btn-series').classList.add('active');
    render(document.getElementById('searchBar').value);
}

function render(search = "") {
    const catsCont = document.getElementById('categories-container');
    const featCont = document.getElementById('featured-container');
    const featSec = document.getElementById('featured-sec');
    const histSec = document.getElementById('history-sec');
    const histCont = document.getElementById('history-container');
    if(!catsCont) return;
    catsCont.innerHTML = ""; featCont.innerHTML = ""; histCont.innerHTML = "";
    const s = search.toLowerCase();
    
    let filteredData = playlistData;
    if (currentView === 'movies') { filteredData = playlistData.filter(m => m.cat !== "SÉRIES"); } 
    else if (currentView === 'series') { filteredData = playlistData.filter(m => m.cat === "SÉRIES"); }

    if(currentProfile) {
        let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
        if(history.length > 0 && s === "") {
            histSec.style.display = "block";
            history.reverse().forEach(movieTitle => {
                const m = filteredData.find(item => item.t === movieTitle);
                if(m) { const idx = playlistData.indexOf(m); histCont.innerHTML += `<div class="card" onclick="playMovie(${idx})"><img src="${m.img}"><div class="card-name">${m.t}</div></div>`; }
            });
        } else { histSec.style.display = "none"; }
    }

    if(s === "" && currentView === 'all') {
        featSec.style.display = "block";
        filteredData.slice(0, 5).forEach((m) => { 
            const idx = playlistData.indexOf(m);
            featCont.innerHTML += `<div class="featured-card" onclick="playMovie(${idx})"><img src="${m.img}"><div class="featured-title">${m.t}</div></div>`; 
        });
    } else { featSec.style.display = "none"; }

    const cats = [...new Set(filteredData.map(m => m.cat))];
    let addedSeries = [];

    cats.forEach(c => {
        const filtered = filteredData.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="carousel">`;
        
        filtered.forEach(m => {
            const isSeries = /S\d{2}E\d{2}/.test(m.t);
            if(isSeries) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')"><img src="${m.img}"><div class="card-name">${sName}</div></div>`;
                }
            } else {
                const idx = playlistData.indexOf(m);
                html += `<div class="card" onclick="playMovie(${idx})"><img src="${m.img}"><div class="card-name">${m.t}</div></div>`;
            }
        });
        catsCont.innerHTML += html + `</div>`;
    });
}

function openSeries(name) {
    const overlay = document.getElementById('series-overlay');
    const content = document.getElementById('series-detail-content');
    const eps = playlistData.filter(m => m.t.startsWith(name));
    overlay.style.display = 'block';
    document.body.style.overflow = 'hidden';
    let html = `<div class="overlay-header"><img src="${eps[0].img}" class="overlay-img"><div><h2 style="margin:0">${name}</h2><p style="color:#666">Saisons disponibles</p></div></div>`;
    const seasons = {};
    eps.forEach(ep => {
        const sMatch = ep.t.match(/S(\d{2})/);
        const sNum = sMatch ? sMatch[1] : "01";
        if(!seasons[sNum]) seasons[sNum] = [];
        seasons[sNum].push(ep);
    });
    Object.keys(seasons).sort().forEach(s => {
        html += `<div class="season-title">SAISON ${s}</div>`;
        seasons[s].forEach(ep => {
            const idx = playlistData.indexOf(ep);
            const epName = ep.t.split(' - ')[1] || ep.t;
            html += `<div class="episode-item" onclick="playMovie(${idx}); closeSeries();"><div style="flex:1"><div style="font-weight:bold; color:white">${epName}</div><div style="font-size:12px; color:#555">${ep.desc || 'Aucune description.'}</div></div><div style="color:var(--accent); font-weight:bold">LIRE</div></div>`;
        });
    });
    content.innerHTML = html;
}

function addToHistory(title) {
    if(!currentProfile) return;
    let key = 'sfpp_hist_' + currentProfile;
    let history = JSON.parse(localStorage.getItem(key) || "[]");
    history = history.filter(t => t !== title);
    history.push(title);
    if(history.length > 10) history.shift();
    localStorage.setItem(key, JSON.stringify(history));
}

function playMovie(idx) {
    const m = playlistData[idx];
    addToHistory(m.t);
    const castDiv = document.getElementById('display-cast');
    castDiv.style.display = "none";
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('display-desc').innerText = m.desc || "";
    if (m.cast && m.cast.trim().length > 1) { castDiv.innerHTML = "⭐️ AVEC : " + m.cast; castDiv.style.display = "block"; }
    window.scrollTo({ top: 0, behavior: 'smooth' });
    player.src({ src: m.url, type: m.url.includes('.m3u8') ? 'application/x-mpegURL' : 'video/mp4' });
    player.play();
    render();
}

function checkLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const found = USERS.find(user => user.u === u && user.p === p);
    if (found) {
        localStorage.setItem('sfpp_logged', 'true');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('profile-screen').style.display = 'flex';
        initProfiles();
        loadPlaylist();
    } else { alert("Accès refusé"); }
}

function logout() { localStorage.clear(); location.reload(); }
function closeP() { player.pause(); document.getElementById('player-section').style.display = 'none'; }
function closeSeries() { document.getElementById('series-overlay').style.display = 'none'; document.body.style.overflow = 'auto'; }
function filter() { render(document.getElementById('searchBar').value); }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { 
        techOrder: ['chromecast', 'html5'], 
        plugins: { 
            chromecast: { addButtonToControlBar: true } 
        }
    });

    const touchOverlay = document.getElementById('video-touch-overlay');
    let lastTap = 0;

    touchOverlay.addEventListener('dblclick', () => {
        if (player.isFullscreen()) { player.exitFullscreen(); } 
        else { player.requestFullscreen(); }
    });

    touchOverlay.addEventListener('touchstart', (e) => {
        let now = new Date().getTime();
        let timesince = now - lastTap;
        if ((timesince < 300) && (timesince > 0)) {
            if (player.isFullscreen()) { player.exitFullscreen(); } 
            else { player.requestFullscreen(); }
            e.preventDefault();
        }
        lastTap = now;
    });

    touchOverlay.addEventListener('click', () => {
        if (player.userActive()) { player.userActive(false); } 
        else { player.userActive(true); }
    });

    if (localStorage.getItem('sfpp_logged') === 'true') {
        document.getElementById('login-screen').style.display = 'none';
        loadPlaylist(); initProfiles();
        const savedProfile = localStorage.getItem('sfpp_profile');
        const savedIcon = localStorage.getItem('sfpp_profile_icon');
        if(savedProfile) { selectProfile(savedProfile, savedIcon || "👤"); } 
        else { document.getElementById('profile-screen').style.display = 'flex'; }
    }
});
</script>
</body>
</html>
