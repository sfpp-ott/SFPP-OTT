<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFPP ELITE - FULL OPTIONS</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #ff0000; 
            --sidebar-width: 80px;
            --sidebar-expanded: 260px;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { 
            background: #050505; color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; 
            display: flex; height: 100vh; overflow: hidden;
        }

        /* --- SIDEBAR ÉTIRABLE --- */
        nav#sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 3000;
            padding: 20px 0;
            flex-shrink: 0;
        }

        nav#sidebar:hover { width: var(--sidebar-expanded); align-items: flex-start; padding: 20px; }

        .nav-item {
            width: 100%; display: flex; align-items: center; padding: 15px;
            color: #888; text-decoration: none; cursor: pointer; transition: 0.3s;
            border-radius: 12px; margin-bottom: 5px; white-space: nowrap; overflow: hidden;
        }
        .nav-item i { font-size: 24px; min-width: 40px; text-align: center; font-style: normal; }
        .nav-item span { margin-left: 20px; font-weight: 600; opacity: 0; transition: 0.3s; }
        nav#sidebar:hover .nav-item span { opacity: 1; }
        .nav-item:hover, .nav-item.active { background: var(--glass); color: white; }

        /* --- MAIN CONTENT --- */
        main { 
            flex-grow: 1; overflow-y: auto; padding: 40px 5%; 
            background: radial-gradient(circle at top right, rgba(255,0,0,0.05), transparent);
        }

        /* --- HEADER ACTIONS (Recherche & Compte) --- */
        .top-bar {
            display: flex; justify-content: flex-end; align-items: center;
            gap: 20px; margin-bottom: 40px;
        }

        .search-box {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px; padding: 10px 20px; display: flex; align-items: center;
        }
        .search-box input { background: none; border: none; color: white; outline: none; margin-left: 10px; width: 200px; }

        .account-pill {
            background: linear-gradient(45deg, #1a1a1a, #000);
            border: 1px solid #333; padding: 10px 20px; border-radius: 15px;
            display: flex; flex-direction: column; align-items: flex-end;
        }
        .account-pill small { font-size: 9px; color: var(--accent); font-weight: 800; }

        /* --- GRID & CARDS --- */
        .section-title { font-size: 24px; font-weight: 800; margin: 30px 0 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); 
            gap: 25px; 
        }
        .card { 
            cursor: pointer; transition: 0.4s; position: relative;
        }
        .card:hover { transform: scale(1.08); z-index: 2; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-info { margin-top: 12px; font-weight: 600; font-size: 14px; text-align: center; color: #ccc; }

        /* --- PLAYER OVERLAY --- */
        #player-wrap {
            position: fixed; inset: 0; background: #000; z-index: 5000; display: none;
        }

        /* --- LOGIN & PROFILES (Logique conservée) --- */
        #auth-gate { position: fixed; inset: 0; background: #000; z-index: 6000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="logo" style="color: var(--accent); font-weight: 800; font-size: 22px; margin-bottom: 40px;">SFPP</div>
        
        <div class="nav-item active" onclick="setView('all')"><i>🏠</i> <span>Accueil</span></div>
        <div class="nav-item" onclick="setView('movies')"><i>🎬</i> <span>Films</span></div>
        <div class="nav-item" onclick="setView('series')"><i>📺</i> <span>Séries</span></div>
        <div class="nav-item" onclick="setView('fav')"><i>❤️</i> <span>Ma Liste</span></div>
        
        <div style="margin-top: auto; width: 100%;">
            <div class="nav-item" onclick="switchProfile()"><i>👤</i> <span id="current-user-name">Changer Profil</span></div>
            <div class="nav-item" onclick="logout()" style="color: #ff4444;"><i>🚪</i> <span>Déconnexion</span></div>
        </div>
    </nav>

    <main>
        <div class="top-bar">
            <div class="search-box">
                <i>🔍</i>
                <input type="text" id="search" onkeyup="filter()" placeholder="Titre, genre...">
            </div>
            <div class="account-pill">
                <div id="exp-date">--/--/--</div>
                <small>ABONNEMENT ÉLITE</small>
            </div>
        </div>

        <div id="content-area">
            </div>
    </main>

    <div id="player-wrap">
        <button onclick="closePlayer()" style="position:absolute; top:20px; left:20px; z-index:5001; background:rgba(0,0,0,0.5); color:white; border:none; padding:15px; border-radius:50%; cursor:pointer;">✕</button>
        <video id="vid" class="video-js vjs-big-play-centered vjs-16-9" controls width="100%"></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script type="module">
        // Ici, tu insères tes clés Firebase habituelles
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const config = { /* TES INFOS FIREBASE */ };
        const app = initializeApp(config);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Récupération Date Validité
        onAuthStateChanged(auth, async (user) => {
            if(user) {
                const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
                document.getElementById('exp-date').innerText = snap.val() || "ILLIMITÉ";
                loadData();
            } else {
                // Rediriger vers ton login.html
            }
        });

        window.logout = () => signOut(auth).then(() => location.reload());
    </script>

    <script>
        let movies = [];
        let player = videojs('vid');

        async function loadData() {
            const r = await fetch('films.json');
            movies = await r.json();
            render();
        }

        function render(filterText = "") {
            const area = document.getElementById('content-area');
            area.innerHTML = "";
            const cats = [...new Set(movies.map(m => m.cat))];

            cats.forEach(c => {
                const list = movies.filter(m => m.cat === c && m.t.toLowerCase().includes(filterText.toLowerCase()));
                if(list.length === 0) return;

                let html = `<div class="section-title">${c}</div><div class="grid">`;
                list.forEach(m => {
                    html += `
                        <div class="card" onclick="play('${m.url}')">
                            <img src="${m.img}">
                            <div class="card-info">${m.t}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                area.innerHTML += html;
            });
        }

        function play(url) {
            document.getElementById('player-wrap').style.display = 'block';
            player.src({ src: url, type: 'video/mp4' });
            player.play();
        }

        function closePlayer() {
            player.pause();
            document.getElementById('player-wrap').style.display = 'none';
        }

        function filter() {
            render(document.getElementById('search').value);
        }
    </script>
</body>
</html>
