<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* LOGIN & PROFILES (Inchangés) */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; }
        .profile-item { text-align: center; cursor: pointer; position: relative; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 4px; background: #333; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 10px; border: 3px solid transparent; }
        
        /* HEADER (Inchangé) */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 15px; z-index: 2000; justify-content: space-between; box-sizing: border-box; }
        .nav-links { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .nav-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; white-space: nowrap; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        /* CAROUSEL & CARDS (Inchangés) */
        .category-title { font-size: 18px; font-weight: bold; margin: 20px 4% 10px; }
        .category-row { position: relative; width: 100%; margin-bottom: 20px; }
        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 0 4% 10px; scrollbar-width: none; }
        .card { flex: 0 0 150px; cursor: pointer; transition: 0.3s; }
        .card img { width: 150px; height: 225px; object-fit: cover; border-radius: 4px; }
        .prog-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); margin-top: -4px; position: relative; }
        .prog-fill { height: 100%; background: var(--accent); }

        /* --- NOUVEAU DESIGN OVERLAY DETAILS (COMME PHOTO) --- */
        #details-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 3500; display: none; flex-direction: column; overflow-y: auto;
        }
        .details-hero {
            position: relative; width: 100%; height: 50vh;
            background-size: cover; background-position: center top;
        }
        .details-hero::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(to top, var(--bg) 5%, transparent 50%),
                        linear-gradient(to right, var(--bg) 0%, transparent 70%);
        }
        .btn-close-details {
            position: absolute; top: 20px; right: 20px; z-index: 100;
            background: rgba(0,0,0,0.5); border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer;
        }
        .details-body { padding: 0 5% 40px; position: relative; margin-top: -80px; z-index: 10; }
        .details-title { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .details-meta { display: flex; gap: 15px; color: #888; font-size: 14px; margin-bottom: 20px; align-items: center; }
        .meta-year { border: 1px solid #666; padding: 1px 6px; border-radius: 3px; }
        
        .details-actions { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn-play-main { 
            background: white; color: black; border: none; padding: 12px 30px; 
            border-radius: 4px; font-weight: bold; font-size: 16px; 
            display: flex; align-items: center; gap: 10px; cursor: pointer;
        }
        .btn-fav-round {
            background: rgba(255,255,255,0.1); color: white; border: 2px solid #888;
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px;
        }

        .section-title { font-size: 18px; font-weight: bold; margin: 30px 0 15px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .cast-row { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .actor-card { flex: 0 0 100px; text-align: center; }
        .actor-card img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .actor-name { font-size: 12px; margin-top: 8px; color: #aaa; }

        .trailer-container { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px; border: 1px solid #333; }

        /* LECTEUR (Inchangé) */
        #player-section { display: none; position: fixed; inset: 0; background: #000; z-index: 4500; }
        #next-episode-btn { position: absolute; bottom: 100px; right: 30px; z-index: 100; background: var(--accent); color: white; padding: 15px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; border: 2px solid white; display: none; }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit">CONNEXION</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="margin-bottom:30px">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-manage" onclick="toggleEditMode()" style="margin-top:40px; background:none; border:1px solid #444; color:#888; padding:10px 20px;">GÉRER LES PROFILS</button>
</div>

<header>
    <div class="logo" id="header-logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')">Séries</button>
        <button class="nav-btn" id="btn-fav" onclick="changeView('fav')">Ma Liste ❤️</button>
    </div>
    <button onclick="switchProfile()" style="background:none; border:none; color:white; font-size:18px;">👤</button>
</header>

<div id="main-content" style="padding-top: 70px;">
    <div id="expiration-banner" style="display:none; background:var(--gold); color:black; padding:10px; text-align:center; font-weight:bold;"></div>
    <div id="history-sec" style="display:none">
        <div class="category-title">Reprendre la lecture</div>
        <div class="carousel" id="history-container"></div>
    </div>
    <div id="categories-container"></div>
</div>

<div id="details-overlay">
    <button class="btn-close-details" onclick="closeDetails()">✕</button>
    <div id="det-hero" class="details-hero"></div>
    <div class="details-body">
        <div id="det-title" class="details-title"></div>
        <div class="details-meta">
            <span id="det-year" class="meta-year">2024</span>
            <span id="det-cat">Film</span>
            <span style="color:#46d369">98% match</span>
        </div>
        <div class="details-actions">
            <button id="det-play-btn" class="btn-play-main">▶ LECTURE</button>
            <button id="det-fav-btn" class="btn-fav-round" onclick="toggleFavCurrent()">+</button>
        </div>
        <p id="det-desc" style="max-width: 800px; line-height: 1.6; color: #ddd;"></p>
        
        <div id="det-trailer-sec">
            <div class="section-title">Bande-annonce</div>
            <div id="det-trailer-box" class="trailer-container"></div>
        </div>

        <div class="section-title">Casting principal</div>
        <div id="det-cast" class="cast-row"></div>
    </div>
</div>

<section id="player-section">
    <video id="main-video" class="video-js vjs-theme-fantasy vjs-big-play-centered" controls preload="auto" width="100%"></video>
    <button id="next-episode-btn" onclick="playNextEpisode()">ÉPISODE SUIVANT ⏭️</button>
    <button onclick="closeP()" style="position:absolute; top:20px; left:20px; z-index:100; background:rgba(0,0,0,0.5); border:none; color:white; padding:10px 20px; border-radius:5px;">← Retour</button>
</section>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    // --- FIREBASE LOGIC (STRICTEMENT IDENTIQUE À TON CODE) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU", authDomain: "sfpp-elite.firebaseapp.com", databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app", projectId: "sfpp-elite" };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    window.checkLogin = () => {
        const email = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).catch(() => alert("Erreur de connexion."));
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist(); initProfiles();
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = (name, icon) => {
        window.currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('header-logo').innerText = `SFPP | ${icon}`;
        render();
    };

    window.switchProfile = () => { localStorage.removeItem('sfpp_profile'); location.reload(); };
</script>

<script>
let player, playlistData = [], currentView = 'all', currentPlayingTitle = "", isEditMode = false;

// CHARGEMENT & AFFICHAGE
async function loadPlaylist() {
    const res = await fetch('films.json');
    playlistData = await res.json();
    render();
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histCont = document.getElementById('history-container');
    const histSec = document.getElementById('history-sec');
    cont.innerHTML = ""; histCont.innerHTML = "";
    
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + window.currentProfile) || "{}");
    const history = JSON.parse(localStorage.getItem('sfpp_hist_' + window.currentProfile) || "[]");

    // Historique
    if(history.length > 0 && currentView === 'all') {
        histSec.style.display = "block";
        history.slice().reverse().forEach(t => {
            const m = playlistData.find(item => item.t === t);
            if(m) histCont.innerHTML += createCard(m, prog[m.t]);
        });
    } else histSec.style.display = "none";

    // Catégories
    const cats = [...new Set(playlistData.map(m => m.cat))];
    cats.forEach(c => {
        let filtered = playlistData.filter(m => m.cat === c);
        if(currentView === 'movies' && c === "SÉRIES") return;
        if(currentView === 'series' && c !== "SÉRIES") return;
        if(filtered.length === 0) return;

        let html = `<div class="category-title">${c}</div><div class="category-row"><div class="carousel">`;
        filtered.forEach(m => html += createCard(m, prog[m.t]));
        html += `</div></div>`;
        cont.innerHTML += html;
    });
}

function createCard(m, pData) {
    const pct = (pData && pData.p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${pData.p}%"></div></div>` : "";
    return `<div class="card" onclick="openDetails('${m.t}')"><img src="${m.img}">${pct}</div>`;
}

// OUVERTURE DETAILS (DESIGN PHOTO)
function openDetails(title) {
    const m = playlistData.find(i => i.t === title);
    currentPlayingTitle = m.t;
    
    document.getElementById('det-hero').style.backgroundImage = `url('${m.img}')`;
    document.getElementById('det-title').innerText = m.t;
    document.getElementById('det-desc').innerText = m.desc || "Aucun synopsis disponible.";
    document.getElementById('det-year').innerText = m.year || "2024";
    document.getElementById('det-cat').innerText = m.cat;
    
    // Trailer
    const tBox = document.getElementById('det-trailer-box');
    if(m.trailer) {
        document.getElementById('det-trailer-sec').style.display = 'block';
        tBox.innerHTML = `<iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}" frameborder="0" allowfullscreen></iframe>`;
    } else {
        document.getElementById('det-trailer-sec').style.display = 'none';
    }

    // Cast
    const castBox = document.getElementById('det-cast');
    if(m.actors_pics) {
        castBox.innerHTML = m.actors_pics.map(a => `
            <div class="actor-card">
                <img src="${a.img}">
                <div class="actor-name">${a.name}</div>
            </div>
        `).join('');
    } else castBox.innerHTML = "Non renseigné.";

    document.getElementById('det-play-btn').onclick = () => playMovie(m);
    document.getElementById('details-overlay').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeDetails() {
    document.getElementById('details-overlay').style.display = 'none';
    document.getElementById('det-trailer-box').innerHTML = "";
    document.body.style.overflow = 'auto';
}

// LECTEUR & LOGIQUE (Inchangés)
function playMovie(m) {
    document.getElementById('details-overlay').style.display = 'none';
    document.getElementById('player-section').style.display = 'block';
    player.src({ src: m.url, type: 'video/mp4' });
    
    // Save history
    let hist = JSON.parse(localStorage.getItem('sfpp_hist_' + window.currentProfile) || "[]").filter(t => t !== m.t);
    hist.push(m.t); localStorage.setItem('sfpp_hist_' + window.currentProfile, JSON.stringify(hist));
    
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + window.currentProfile) || "{}");
    if(prog[m.t]) player.currentTime(prog[m.t].t);
    player.play();
}

function closeP() {
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let prog = JSON.parse(localStorage.getItem('sfpp_p_' + window.currentProfile) || "{}");
        prog[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_' + window.currentProfile, JSON.stringify(prog));
    }
    player.pause(); document.getElementById('player-section').style.display = 'none'; render();
}

function toggleFavCurrent() {
    let key = 'sfpp_fav_' + window.currentProfile;
    let favs = JSON.parse(localStorage.getItem(key) || "[]");
    if(favs.includes(currentPlayingTitle)) {
        favs = favs.filter(t => t !== currentPlayingTitle);
        document.getElementById('det-fav-btn').innerText = "+";
    } else {
        favs.push(currentPlayingTitle);
        document.getElementById('det-fav-btn').innerText = "❤️";
    }
    localStorage.setItem(key, JSON.stringify(favs));
}

function initProfiles() {
    const list = document.getElementById('profile-list');
    const profiles = [{n:"Papa", i:"👨‍🦰"}, {n:"Maman", i:"👩"}, {n:"Kids", i:"👶"}];
    list.innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="selectProfile('${p.n}', '${p.i}')">
            <div class="profile-avatar">${p.i}</div>
            <div style="color:#888">${p.n}</div>
        </div>
    `).join('');
}

function changeView(v) { currentView = v; render(); }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { controls: true, fluid: true, techOrder: ['chromecast', 'html5'], plugins: { chromecast: { addButtonToControlBar: true } } });
});
</script>
</body>
</html>
