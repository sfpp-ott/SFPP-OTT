<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - NEXT GEN</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #e50914; 
            --gold: #ffcc00; 
            --bg: #050505; 
            --sidebar-width: 70px;
            --sidebar-expanded: 240px;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: var(--bg); color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; overflow-x: hidden; display: flex;
        }

        /* --- SIDEBAR ELITE --- */
        .sidebar {
            position: fixed; left: 0; top: 0; height: 100vh;
            width: var(--sidebar-width); background: rgba(0,0,0,0.95);
            backdrop-filter: blur(25px); border-right: 1px solid var(--glass-border);
            z-index: 3000; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .sidebar:hover { width: var(--sidebar-expanded); }

        .sidebar-logo { 
            padding: 25px; color: var(--accent); font-weight: 800; font-size: 22px; 
            white-space: nowrap; border-bottom: 1px solid var(--glass-border);
        }
        
        .nav-item {
            display: flex; align-items: center; padding: 18px 24px;
            color: #888; cursor: pointer; white-space: nowrap; border: none; 
            background: none; width: 100%; text-align: left; transition: 0.3s;
        }
        .nav-item i { font-style: normal; font-size: 20px; margin-right: 25px; min-width: 25px; text-align: center; }
        .nav-item span { opacity: 0; transition: 0.3s; font-weight: 600; font-size: 14px; }
        .sidebar:hover .nav-item span { opacity: 1; }
        .nav-item:hover, .nav-item.active { color: white; background: var(--glass); }
        .nav-item.active { border-left: 3px solid var(--accent); color: white; }

        .sidebar-footer { margin-top: auto; padding: 15px; border-top: 1px solid var(--glass-border); background: rgba(255,255,255,0.02); }
        .user-block { display: flex; align-items: center; gap: 12px; padding: 10px; margin-bottom: 10px; overflow: hidden; }
        .user-icon { width: 35px; height: 35px; border-radius: 8px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 800; flex-shrink: 0; }
        .user-meta { opacity: 0; transition: 0.3s; white-space: nowrap; }
        .sidebar:hover .user-meta { opacity: 1; }

        /* --- CONTENU --- */
        main { flex: 1; margin-left: var(--sidebar-width); padding: 30px 4%; transition: 0.4s; }
        
        .top-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .search-container {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 30px; display: flex; align-items: center; padding: 10px 20px; width: 350px;
        }
        .search-container input { background: none; border: none; color: white; width: 100%; outline: none; margin-left: 10px; }

        /* --- CARDS PREMIUM --- */
        .category-title { font-size: 20px; font-weight: 800; margin: 40px 0 15px; display: flex; align-items: center; gap: 10px; }
        .category-title::before { content: ""; width: 3px; height: 20px; background: var(--accent); border-radius: 10px; }
        
        .carousel { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0 30px; scrollbar-width: none; }
        .card { flex: 0 0 160px; cursor: pointer; transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1); position: relative; }
        .card:hover { transform: scale(1.1) translateY(-10px); z-index: 10; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .card-name { margin-top: 10px; font-size: 12px; font-weight: 600; color: #888; text-align: center; }

        /* --- PROGRESS BAR --- */
        .prog-bg { position: absolute; bottom: 35px; left: 8px; right: 8px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        /* --- LOGIN & PROFILE (TES ÉCRANS) --- */
        #login-screen, #profile-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-box { background: #111; padding: 40px; border-radius: 20px; width: 320px; border: 1px solid var(--glass-border); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .login-box input { width: 100%; padding: 15px; margin: 10px 0; background: #222; border: 1px solid #333; color: white; border-radius: 10px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: 800; border-radius: 10px; cursor: pointer; margin-top: 10px; }

        .profile-grid { display: flex; gap: 25px; margin-top: 40px; }
        .profile-item { text-align: center; cursor: pointer; transition: 0.3s; }
        .profile-avatar { width: 110px; height: 110px; border-radius: 15px; margin-bottom: 12px; border: 3px solid transparent; font-size: 40px; display: flex; align-items: center; justify-content: center; }
        .profile-item:hover .profile-avatar { border-color: white; transform: scale(1.05); }

        /* --- PLAYER & DETAILS --- */
        #player-section { display: none; position: fixed; inset: 0; background: #000; z-index: 4000; }
        #details-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 3500; display: none; align-items: center; justify-content: center; }
        .details-content { background: #111; max-width: 900px; width: 95%; border-radius: 25px; display: flex; overflow: hidden; border: 1px solid var(--glass-border); }

        /* --- TV FOCUS --- */
        [tabindex="0"]:focus { outline: 3px solid white; outline-offset: 4px; transform: scale(1.1); }

        @media (max-width: 800px) {
            .sidebar { bottom: 0; top: auto; width: 100%; height: 70px; flex-direction: row; border-right: none; border-top: 1px solid var(--glass-border); }
            .sidebar:hover { width: 100%; }
            .sidebar-logo, .sidebar-footer { display: none; }
            .nav-item { flex: 1; flex-direction: column; justify-content: center; padding: 10px; }
            .nav-item i { margin: 0; }
            .nav-item span { opacity: 1; font-size: 10px; }
            main { margin-left: 0; padding-bottom: 100px; }
            .details-content { flex-direction: column; overflow-y: auto; max-height: 90vh; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div style="color:var(--accent); font-weight:800; font-size:30px; margin-bottom:20px; text-align:center;">SFPP <span style="color:white">ELITE</span></div>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit" tabindex="0">CONNEXION</button>
        <button type="button" onclick="requestAccess()" style="background:none; color:#555; font-size:12px; cursor:pointer; border:none; text-decoration:underline;">Demander un accès</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="font-size: 40px; font-weight: 800;">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-manage" onclick="toggleEditMode()" style="margin-top:50px; background:none; border:1px solid #333; color:#555; padding:10px 25px; border-radius:20px; cursor:pointer;">GÉRER LES PROFILS</button>
</div>

<aside class="sidebar">
    <div class="sidebar-logo">SFPP <span style="color:white">ELITE</span></div>
    
    <nav style="flex: 1; margin-top: 20px;">
        <button class="nav-item active" id="btn-all" onclick="changeView('all')" tabindex="0"><i>🏠</i><span>Accueil</span></button>
        <button class="nav-item" id="btn-movies" onclick="changeView('movies')" tabindex="0"><i>🎬</i><span>Films</span></button>
        <button class="nav-item" id="btn-series" onclick="changeView('series')" tabindex="0"><i>📺</i><span>Séries</span></button>
        <button class="nav-item" id="btn-fav" onclick="changeView('fav')" tabindex="0"><i>❤️</i><span>Ma Liste</span></button>
    </nav>

    <div class="sidebar-footer">
        <div class="user-block">
            <div class="user-icon" id="sidebar-initial">?</div>
            <div class="user-meta">
                <div id="sidebar-user-name" style="font-weight: 800; font-size: 14px;">Chargement...</div>
                <div id="sidebar-expiry" style="color: var(--gold); font-size: 10px; font-weight: 800;">FIN: --/--/--</div>
            </div>
        </div>
        <button class="nav-item" onclick="switchProfile()" tabindex="0" style="padding: 10px 24px;"><i>🔄</i><span>Changer Profil</span></button>
        <button class="nav-item" onclick="logout()" tabindex="0" style="padding: 10px 24px; color: var(--accent);"><i>🚪</i><span>Déconnexion</span></button>
    </div>
</aside>

<main>
    <div class="top-section">
        <div class="search-container">
            <span>🔍</span>
            <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher un titre..." tabindex="0">
        </div>
        <div id="expiration-banner" style="background:var(--gold); color:black; padding:5px 15px; border-radius:10px; font-size:12px; font-weight:800; display:none;"></div>
    </div>

    <div id="history-sec" style="display:none">
        <div class="category-title">Continuer la lecture</div>
        <div class="carousel" id="history-container"></div>
    </div>

    <div id="categories-container"></div>
</main>

<div id="details-overlay">
    <div class="details-content">
        <img id="details-img" style="width:35%; object-fit:cover;">
        <div style="padding:40px; width:65%; position:relative;">
            <button onclick="closeDetails()" style="position:absolute; top:20px; right:20px; background:none; border:none; color:white; font-size:24px; cursor:pointer;">✕</button>
            <h2 id="details-title" style="font-size: 40px; margin:0 0 10px 0;"></h2>
            <div id="details-meta" style="color:var(--gold); font-weight:800; margin-bottom:20px;"></div>
            <p id="details-desc" style="color:#aaa; line-height:1.6; font-size:16px; margin-bottom:30px;"></p>
            <div id="details-trailer-box"></div>
            <button id="details-play-btn" style="width:100%; padding:18px; background:white; color:black; border:none; border-radius:12px; font-weight:800; cursor:pointer;" tabindex="0">LECTURE</button>
        </div>
    </div>
</div>

<section id="player-section">
    <div id="player-blur-bg" style="position:absolute; inset:0; background-size:cover; filter:blur(30px) brightness(0.3); transform:scale(1.1);"></div>
    <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
    <div style="padding:30px; position:relative; z-index:10; display:flex; justify-content:space-between; align-items:center;">
        <div>
            <h2 id="display-title" style="margin:0;"></h2>
            <div id="display-desc" style="color:#888; font-size:14px; margin-top:5px;"></div>
        </div>
        <button onclick="closeP()" style="background:var(--glass); border:1px solid var(--glass-border); color:white; padding:15px 30px; border-radius:12px; cursor:pointer;">RETOUR ACCUEIL</button>
    </div>
    <button id="next-episode-btn" onclick="playNextEpisode()" style="position:fixed; bottom:100px; right:40px; z-index:9999; background:var(--accent); color:white; border:none; padding:20px 40px; border-radius:15px; font-weight:800; display:none;">EPISODE SUIVANT ⏭️</button>
</section>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);

    // TA LOGIQUE DE LOGIN
    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() });
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            
            // Récupération expiration pour la sidebar
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            if(snap.exists()) document.getElementById('sidebar-expiry').innerText = "FIN: " + snap.val();

            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('sidebar-user-name').innerText = name;
        document.getElementById('sidebar-initial').innerText = icon;
        render();
    };

    window.logout = function() { signOut(auth).then(() => { localStorage.clear(); location.reload(); }); };
</script>

<script>
// TA LOGIQUE D'AFFICHAGE ET LECTEUR
let player, playlistData = [], currentProfile = null, currentView = 'all', currentPlayingTitle = "";

async function loadPlaylist() { 
    try { const r = await fetch('films.json'); playlistData = await r.json(); render(); } catch(e){} 
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const s = search.toLowerCase();
    cont.innerHTML = "";
    
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    const cats = [...new Set(data.map(m => m.cat))];
    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="carousel">`;
        filtered.forEach(m => {
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0">
                        <img src="${m.img}">${pct}
                        <div class="card-name">${m.t}</div>
                    </div>`;
        });
        html += `</div>`;
        cont.innerHTML += html;
    });
}

function openDetails(idx) {
    const m = playlistData[idx];
    document.getElementById('details-img').src = m.img;
    document.getElementById('details-title').innerText = m.t;
    document.getElementById('details-desc').innerText = m.desc || "Aucun résumé.";
    document.getElementById('details-meta').innerText = m.actors || m.cast || "";
    document.getElementById('details-play-btn').onclick = () => { closeDetails(); playMovie(idx); };
    document.getElementById('details-overlay').style.display = 'flex';
}

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('player-blur-bg').style.backgroundImage = `url('${m.img}')`;
    player.src({ src: m.url, type: 'video/mp4' });
    player.play();
}

function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; }
function closeP() { player.pause(); document.getElementById('player-section').style.display = 'none'; render(); }
function filter() { render(document.getElementById('searchBar').value); }
function changeView(v) { 
    currentView = v; 
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('btn-'+v).classList.add('active');
    render(); 
}

function initProfiles() {
    let profiles = [{ id: 1, name: "Elite 1", icon: "🟥", color: "#222" }, { id: 2, name: "Elite 2", icon: "⬜", color: "#222" }];
    document.getElementById('profile-list').innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="selectProfile('${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div style="font-weight:800; font-size:14px;">${p.name}</div>
        </div>`).join('');
}

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { 
        techOrder: ['chromecast', 'html5'], 
        plugins: { chromecast: { addButtonToControlBar: true } }
    });
});
</script>
</body>
</html>
