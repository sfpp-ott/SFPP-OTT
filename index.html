<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        
        [tabindex="0"]:focus { outline: 3px solid white !important; outline-offset: 2px; transform: scale(1.05); background: rgba(255,255,255,0.1); z-index: 100; }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-request { background: none !important; border: none; color: #666 !important; font-size: 11px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; border-radius: 8px; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-name { font-size: 14px; color: #888; }
        
        .edit-icon { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border-radius: 50%; padding: 5px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }
        .btn-manage { margin-top: 40px; background: none; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-size: 14px; letter-spacing: 1px; }

        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.95); display: flex; align-items: center; 
            padding: 0 15px; z-index: 2000; border-bottom: 1px solid #222; 
            justify-content: space-between; box-sizing: border-box; gap: 10px;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 18px; flex-shrink: 0; }
        
        .nav-links { 
            display: flex; gap: 15px; flex: 1; overflow-x: auto; 
            white-space: nowrap; align-items: center; scrollbar-width: none;
            -webkit-overflow-scrolling: touch; justify-content: flex-start;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; font-weight: 500; padding: 10px 5px; transition: color 0.3s; flex-shrink: 0; border-radius: 4px; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: #000; display: none; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 2001;
        }
        #searchBar { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        
        .header-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .btn-icon { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .btn-logout { background: #333; color: white; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; flex-shrink: 0; }

        /* --- LECTEUR IMMERSIF PRO --- */
        #player-section { display: none; position: fixed; inset: 0; background: #000; z-index: 4500; overflow: hidden; }
        .video-container { position: relative; width: 100%; height: 100%; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }

        .player-info-overlay {
            position: absolute; top: 30px; left: 30px; z-index: 10;
            pointer-events: none; opacity: 0; transition: opacity 0.4s;
        }
        .video-js.vjs-user-active .player-info-overlay { opacity: 1; }
        .player-info-overlay h2 { font-size: 24px; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); }
        .player-info-overlay p { font-size: 14px; color: #ccc; max-width: 400px; margin-top: 5px; }

        .btn-close-player {
            position: absolute; top: 25px; right: 25px; z-index: 5000;
            background: rgba(0,0,0,0.5); border: 1px solid #444; color: white;
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer;
            font-size: 20px; opacity: 0; transition: opacity 0.4s;
        }
        .video-js.vjs-user-active + .btn-close-player, 
        #player-section:hover .btn-close-player { opacity: 1; }

        #next-episode-btn {
            position: absolute; bottom: 100px; right: 30px; z-index: 999;
            background: var(--accent); color: white; border: none; padding: 12px 20px;
            border-radius: 4px; font-weight: bold; display: none; cursor: pointer;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- DETAILS OVERLAY --- */
        #details-overlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 3500; display: none; flex-direction: column; overflow-y: auto;
        }
        .details-hero { 
            position: relative; width: 100%; height: 55vh; 
            background-size: cover; background-position: center top; 
        }
        .details-hero::after { 
            content: ''; position: absolute; inset: 0; 
            background: linear-gradient(to top, var(--bg) 10%, transparent 70%); 
        }
        .details-info { padding: 0 5% 40px; margin-top: -80px; position: relative; z-index: 5; }
        .btn-play-main { background: white; color: black; border: none; padding: 15px 35px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .section-label { font-weight: bold; color: white; margin: 30px 0 15px; font-size: 18px; border-left: 4px solid var(--accent); padding-left: 10px; }
        .synopsis { color: #ddd; line-height: 1.6; font-size: 15px; max-width: 800px; }
        .cast-row { display: flex; gap: 15px; overflow-x: auto; scrollbar-width: none; }
        .actor-item { flex: 0 0 90px; text-align: center; }
        .actor-item img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }

        /* --- MAIN CONTENT --- */
        #main-content { padding-top: 80px; }
        .category-title { font-size: 18px; font-weight: bold; margin: 20px 4% 10px; color: #fff; text-transform: uppercase; }
        .carousel { display: flex; overflow-x: auto; gap: 12px; padding: 0 4% 10px; scrollbar-width: none; scroll-behavior: smooth; }
        .card { flex: 0 0 150px; cursor: pointer; position: relative; }
        .card img { width: 150px; height: 225px; object-fit: cover; border-radius: 4px; background: #222; }
        .card-name { margin-top: 6px; font-size: 12px; text-align: center; color: #bbb; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .prog-bg { position: absolute; bottom: 25px; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.2); overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); }

        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 80px 5% 40px; }
        .episode-item { background: #111; padding: 15px; border-radius: 6px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 15px; border: 1px solid #222; }
        .btn-close { background: #333; color: #fff; border: none; padding: 10px 22px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="email" id="user" placeholder="E-mail" required>
        <input type="password" id="pass" placeholder="Mot de passe" required>
        <button type="submit">CONNEXION</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="font-size: 32px;">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-manage" onclick="logout()">DÉCONNEXION</button>
</div>

<header>
    <div class="logo" id="header-logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" onclick="changeView('movies')">Films</button>
        <button class="nav-btn" onclick="changeView('series')">Séries</button>
        <button class="nav-btn" onclick="changeView('fav')">Ma Liste ❤️</button>
    </div>
    <div class="header-actions">
        <button class="btn-icon" onclick="openSearch()">🔍</button>
        <button class="btn-logout" onclick="switchProfile()">PROFILS</button>
    </div>
</header>

<div id="details-overlay">
    <button class="btn-close" style="position:fixed; top:20px; right:20px; z-index:100;" onclick="closeDetails()">✕</button>
    <div id="details-header-bg" class="details-hero"></div>
    <div class="details-info">
        <h2 id="details-title">Titre</h2>
        <button id="details-play-btn" class="btn-play-main">▶ Lancer la lecture</button>
        <p id="details-desc" class="synopsis"></p>
        <div class="section-label">Casting</div>
        <div id="details-meta-cast" class="cast-row"></div>
    </div>
</div>

<section id="player-section">
    <div class="video-container">
        <video id="main-video" class="video-js vjs-theme-fantasy" controls preload="auto"></video>
        <div class="player-info-overlay">
            <h2 id="p-title">Titre</h2>
            <p id="p-desc"></p>
        </div>
        <button class="btn-close-player" onclick="closeP()">✕</button>
        <button id="next-episode-btn" onclick="playNextEpisode()">ÉPISODE SUIVANT ⏭️</button>
    </div>
</section>

<div id="main-content">
    <div id="categories-container"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(u => {
            set(ref(db, 'sessions/' + u.user.uid), { deviceId, lastLogin: Date.now() });
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, user => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            if(localStorage.getItem('sfpp_profile')) selectProfile(localStorage.getItem('sfpp_profile'), "👤");
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.logout = () => signOut(auth).then(() => location.reload());
</script>

<script>
let player, playlistData = [], currentProfile = null, currentPlayingTitle = "";

async function loadPlaylist() { 
    try { const r = await fetch('films.json'); playlistData = await r.json(); render(); } catch(e){} 
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    cont.innerHTML = "";
    const cats = [...new Set(playlistData.map(m => m.cat))];
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");

    cats.forEach(c => {
        let items = playlistData.filter(m => m.cat === c && m.t.toLowerCase().includes(search.toLowerCase()));
        if(items.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="carousel">`;
        items.forEach(m => {
            const p = (prog[m.t]) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})"><img src="${m.img}">${p}<div class="card-name">${m.t}</div></div>`;
        });
        cont.innerHTML += html + `</div>`;
    });
}

function openDetails(idx) {
    const m = playlistData[idx];
    document.getElementById('details-header-bg').style.backgroundImage = `url('${m.img}')`;
    document.getElementById('details-title').innerText = m.t;
    document.getElementById('details-desc').innerText = m.desc || "";
    document.getElementById('details-play-btn').onclick = () => playMovie(idx);
    document.getElementById('details-overlay').style.display = 'flex';
}

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('p-title').innerText = m.t;
    document.getElementById('p-desc').innerText = m.desc ? m.desc.substring(0, 100) + '...' : "";
    
    player.src({ src: m.url, type: 'video/mp4' });
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t]) player.currentTime(prog[m.t].t);
    player.play();
    if (player.requestFullscreen) player.requestFullscreen();
}

function closeP() {
    saveP();
    player.pause();
    document.getElementById('player-section').style.display = 'none';
    if (document.exitFullscreen) document.exitFullscreen();
    render();
}

function saveP() {
    if(!currentPlayingTitle) return;
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let p = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        p[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(p));
    }
}

function closeDetails() { document.getElementById('details-overlay').style.display = 'none'; }
function initProfiles() { 
    document.getElementById('profile-list').innerHTML = `<div class="profile-item" onclick="selectProfile('Famille', '👤')"><div class="profile-avatar">👤</div><div class="profile-name">Famille</div></div>`; 
}
function selectProfile(n, i) { currentProfile = n; localStorage.setItem('sfpp_profile', n); document.getElementById('profile-screen').style.display = 'none'; render(); }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { 
        controls: true, fluid: false,
        techOrder: ['chromecast', 'html5'],
        plugins: { chromecast: { addButtonToControlBar: true } }
    });

    // DOUBLE CLIQUE PLEIN ÉCRAN
    let lastTap = 0;
    player.on('touchstart', function(e) {
        let now = Date.now();
        if (now - lastTap < 300) {
            if (player.isFullscreen()) player.exitFullscreen();
            else player.requestFullscreen();
            e.preventDefault();
        }
        lastTap = now;
    });

    player.on('timeupdate', () => { if(Math.floor(player.currentTime()) % 10 === 0) saveP(); });
});
</script>
</body>
</html>
