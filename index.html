<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; --plyr-color-main: #e50914; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }
        
        /* Login & Profiles */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-item:hover .profile-avatar { border-color: white; transform: scale(1.05); }
        .edit-icon { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border-radius: 50%; padding: 5px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }

        /* Header */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); display: flex; align-items: center; padding: 0 4%; z-index: 2000; justify-content: space-between; box-sizing: border-box; }
        .logo { color: var(--accent); font-weight: 900; font-size: 24px; text-transform: uppercase; letter-spacing: 1px; }
        .nav-links { display: flex; gap: 15px; }
        .nav-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .nav-btn.active { color: white; font-weight: bold; }

        /* Player Section Customization */
        #player-section { display: none; width: 100%; background: #000; padding-top: 0; position: relative; z-index: 3000; }
        .plyr--full-ui { max-height: 80vh; } /* Pour ne pas manger tout l'écran sur PC */
        
        .movie-info { padding: 30px 5%; background: linear-gradient(to bottom, #111, #050505); }
        .movie-title { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
        .movie-cast { color: var(--gold); font-size: 14px; margin-bottom: 15px; font-weight: 500; }
        .movie-desc { color: #888; line-height: 1.6; max-width: 800px; font-size: 15px; }

        /* Grid & Cards */
        #main-content { padding-top: 80px; }
        .category-title { font-size: 20px; font-weight: bold; margin: 30px 4% 15px; border-left: 4px solid var(--accent); padding-left: 12px; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 4% 30px; scrollbar-width: none; }
        .card { flex: 0 0 160px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.08); z-index: 10; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .card-name { margin-top: 8px; font-size: 13px; text-align: center; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Search & Buttons */
        #searchBar { background: rgba(255,255,255,0.1); border: 1px solid #333; color: white; padding: 8px 15px; border-radius: 20px; font-size: 13px; width: 150px; }
        .btn-close { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 20px; }

        /* Series Overlay */
        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3500; display: none; overflow-y: auto; padding: 40px 5%; }
        .episode-item { background: #141414; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; border: 1px solid #222; }
        .episode-item:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="text" id="user" placeholder="Utilisateur">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="checkLogin()">CONNEXION</button>
    </div>
</div>

<div id="profile-screen">
    <h1 id="profile-title">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-manage" id="manage-btn" onclick="toggleEditMode()" style="margin-top:30px; background:none; color:#555; border:1px solid #333; padding:10px;">GÉRER LES PROFILS</button>
</div>

<header>
    <div class="logo" id="header-logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')">Séries</button>
    </div>
    <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher...">
    <button onclick="switchProfile()" style="background:none; border:1px solid #444; color:white; border-radius:4px; padding:5px 10px; cursor:pointer;">PROFIL</button>
</header>

<section id="player-section">
    <div class="container">
        <video id="main-video" playsinline controls data-poster="poster.jpg">
            <source src="" type="video/mp4" />
        </video>
    </div>
    <div class="movie-info">
        <div id="display-title" class="movie-title"></div>
        <div id="display-cast" class="movie-cast"></div>
        <div id="display-desc" class="movie-desc"></div>
        <button class="btn-close" onclick="closeP()">FERMER LE LECTEUR</button>
    </div>
</section>

<div id="main-content">
    <div id="history-sec" style="display:none">
        <div class="category-title">Reprendre avec <span id="current-user-name"></span></div>
        <div class="carousel" id="history-container"></div>
    </div>
    <div id="categories-container"></div>
</div>

<div id="series-overlay">
    <button class="btn-close" onclick="closeSeries()" style="margin-bottom: 20px;">← RETOUR</button>
    <div id="series-detail-content"></div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
const USERS = [
    { u: "SFPP", p: "2025", exp: "2100-12-31" },
    { u: "test", p: "test", exp: "2026-04-13" }
];

let player; // Instance Plyr
let playlistData = [];
let currentProfile = null;
let currentView = 'all';

// INITIALISATION DU LECTEUR PLYR
document.addEventListener('DOMContentLoaded', () => {
    player = new Plyr('#main-video', {
        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
        tooltips: { controls: true, seek: true },
        displayDuration: true
    });

    // DOUBLE CLIQUE POUR PLEIN ÉCRAN
    const playerWrapper = document.querySelector('.plyr');
    playerWrapper.addEventListener('dblclick', (e) => {
        e.preventDefault();
        player.fullscreen.toggle();
    });

    if (localStorage.getItem('sfpp_logged') === 'true') {
        document.getElementById('login-screen').style.display = 'none';
        loadPlaylist();
        initProfiles();
        const savedProfile = localStorage.getItem('sfpp_profile');
        if(savedProfile) selectProfile(savedProfile, localStorage.getItem('sfpp_profile_icon'));
        else document.getElementById('profile-screen').style.display = 'flex';
    }
});

async function loadPlaylist() {
    try {
        const response = await fetch('films.json');
        playlistData = await response.json();
        render();
    } catch (e) { console.error("Erreur JSON", e); }
}

function playMovie(idx) {
    const m = playlistData[idx];
    addToHistory(m.t);
    
    // Affichage section
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('display-desc').innerText = m.desc || "";
    const castDiv = document.getElementById('display-cast');
    if (m.cast) { castDiv.innerText = "⭐️ AVEC : " + m.cast; castDiv.style.display = "block"; } else { castDiv.style.display = "none"; }

    // Chargement source dans Plyr
    player.source = {
        type: 'video',
        title: m.t,
        sources: [{ src: m.url, type: 'video/mp4' }],
        poster: m.img
    };

    window.scrollTo({ top: 0, behavior: 'smooth' });
    player.play();
}

function closeP() {
    player.pause();
    document.getElementById('player-section').style.display = 'none';
}

// GESTION DES PROFILS ET RENDU (Logique identique à ton code précédent mais nettoyée)
function selectProfile(name, icon) {
    currentProfile = name;
    localStorage.setItem('sfpp_profile', name);
    localStorage.setItem('sfpp_profile_icon', icon);
    document.getElementById('profile-screen').style.display = 'none';
    document.getElementById('header-logo').innerText = "SFPP | " + icon;
    render();
}

function render(search = "") {
    const container = document.getElementById('categories-container');
    container.innerHTML = "";
    const s = search.toLowerCase();
    
    let data = playlistData;
    if (currentView === 'movies') data = data.filter(m => m.cat !== "SÉRIES");
    if (currentView === 'series') data = data.filter(m => m.cat === "SÉRIES");

    const cats = [...new Set(data.map(m => m.cat))];
    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        
        let html = `<div class="category-title">${c}</div><div class="carousel">`;
        filtered.forEach(m => {
            const idx = playlistData.indexOf(m);
            html += `<div class="card" onclick="playMovie(${idx})">
                        <img src="${m.img}">
                        <div class="card-name">${m.t}</div>
                    </div>`;
        });
        container.innerHTML += html + `</div>`;
    });
}

function checkLogin() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    const found = USERS.find(user => user.u === u && user.p === p);
    if (found) {
        localStorage.setItem('sfpp_logged', 'true');
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('profile-screen').style.display = 'flex';
        loadPlaylist();
        initProfiles();
    } else { alert("Identifiants incorrects"); }
}

function switchProfile() {
    localStorage.removeItem('sfpp_profile');
    document.getElementById('profile-screen').style.display = 'flex';
}

function filter() { render(document.getElementById('searchBar').value); }

function changeView(view) {
    currentView = view;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + view).classList.add('active');
    render();
}

function initProfiles() {
    const list = document.getElementById('profile-list');
    const profiles = [
        { name: "Papa", icon: "🟦", color: "#1e90ff" },
        { name: "Maman", icon: "🟩", color: "#2ecc71" },
        { name: "Enfant", icon: "🟧", color: "#e67e22" }
    ];
    list.innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="selectProfile('${p.name}', '${p.icon}')">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div class="profile-name">${p.name}</div>
        </div>
    `).join('');
}

function addToHistory(title) {
    if(!currentProfile) return;
    let history = JSON.parse(localStorage.getItem('sfpp_hist_'+currentProfile) || "[]");
    history = [title, ...history.filter(t => t !== title)].slice(0, 10);
    localStorage.setItem('sfpp_hist_'+currentProfile, JSON.stringify(history));
}

function closeSeries() { document.getElementById('series-overlay').style.display = 'none'; }
</script>

</body>
</html>
