<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - PREMIUM</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f0e13">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { 
            --accent: #a855f7; 
            --bg: #0f0e13; 
            --card-bg: #1a1921;
            --glass: rgba(15, 14, 19, 0.85);
            --gold: #ffcc00;
        }

        body { 
            background: var(--bg); color: #efeff1; 
            font-family: 'Inter', -apple-system, sans-serif; 
            margin: 0; padding-bottom: 50px; 
        }

        /* ANDROID TV FOCUS */
        [tabindex="0"]:focus {
            outline: 3px solid var(--accent) !important;
            outline-offset: 4px;
            transform: scale(1.05);
            z-index: 100;
            transition: 0.2s ease;
        }

        /* LOGIN */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card-bg); padding: 35px; border-radius: 20px; width: 300px; text-align: center; border: 1px solid #2a2931; }
        .login-box input { width: 100%; padding: 14px; margin: 10px 0; background: #25242d; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; font-weight: 800; border-radius: 12px; cursor: pointer; }

        /* HEADER GLASSMORPHISM */
        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; align-items: center; padding: 0 20px; z-index: 2000; 
            justify-content: space-between; box-sizing: border-box; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .logo { font-weight: 900; font-size: 22px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nav-links { display: flex; gap: 10px; overflow-x: auto; scrollbar-width: none; flex: 1; margin: 0 20px; }
        .nav-links::-webkit-scrollbar { display: none; }
        .nav-btn { background: none; border: none; color: #9494a5; cursor: pointer; font-size: 14px; font-weight: 600; padding: 8px 12px; border-radius: 10px; flex-shrink: 0; }
        .nav-btn.active { color: #fff; background: rgba(255,255,255,0.1); }

        #search-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 70px; background: #000; display: none; align-items: center; padding: 0 20px; z-index: 2001; }
        #searchBar { flex: 1; background: #25242d; border: 1px solid #333; color: white; padding: 12px 20px; border-radius: 15px; outline: none; }

        /* CONTENT */
        #main-content { padding-top: 85px; }
        .category-title { font-size: 19px; font-weight: 800; margin: 25px 4% 15px; color: #fff; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .category-row { position: relative; width: 100%; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 4% 20px; scrollbar-width: none; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }

        .nav-arrow { position: absolute; top: 0; bottom: 20px; width: 40px; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; color: white; font-size: 24px; opacity: 0; transition: 0.3s; }
        .category-row:hover .nav-arrow { opacity: 1; }
        .arrow-right { right: 0; border-radius: 15px 0 0 15px; }
        .arrow-left { left: 0; border-radius: 0 15px 15px 0; }

        /* CARDS */
        .card { flex: 0 0 155px; cursor: pointer; position: relative; border-radius: 15px; transition: transform 0.3s; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 15px; background: #25242d; }
        .card-name { margin-top: 8px; font-size: 12px; font-weight: 600; text-align: center; color: #9494a5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .prog-bg { position: absolute; bottom: 32px; left: 10px; right: 10px; height: 4px; background: rgba(0,0,0,0.6); border-radius: 10px; overflow: hidden; }
        .prog-fill { height: 100%; background: var(--accent); }

        /* PLAYER */
        #player-section { display: none; width: 100%; background: #000; padding-top: 70px; }
        .movie-info { padding: 30px 5%; background: linear-gradient(to bottom, #1a1921, #0f0e13); border-top: 2px solid var(--accent); }
        .movie-title { font-size: 28px; font-weight: 900; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; }
        
        #player-fav-btn { background: #25242d; border: 1px solid #333; color: white; padding: 10px 15px; border-radius: 10px; cursor: pointer; }
        #player-fav-btn.is-fav { border-color: var(--accent); color: var(--accent); }

        /* PROFILES (RESTAURÉ) */
        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; position: relative; }
        .profile-avatar { width: 110px; height: 110px; background: #333; border-radius: 20px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 45px; border: 3px solid transparent; }
        .edit-icon { position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); border-radius: 50%; padding: 8px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }

        /* OVERLAYS */
        #series-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: none; overflow-y: auto; padding: 90px 5% 40px; }
        .episode-item { background: var(--card-bg); padding: 18px; border-radius: 15px; margin-bottom: 10px; cursor: pointer; display: flex; align-items: center; border: 1px solid #2a2931; }
        
        .btn-close { background: #25242d; color: #fff; border: none; padding: 12px 25px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        #next-episode-btn { position: absolute; bottom: 80px; right: 25px; z-index: 9999; background: var(--accent); color: white; border: 2px solid #fff; padding: 15px 25px; border-radius: 12px; font-weight: bold; display: none; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.9); }
        #expiration-banner { display: none; background: var(--gold); color: #000; text-align: center; padding: 10px; font-weight: 800; font-size: 13px; }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:25px; font-size:28px">SFPP ELITE</div>
        <input type="email" id="user" placeholder="E-mail" autocomplete="username" required>
        <input type="password" id="pass" placeholder="Mot de passe" autocomplete="current-password" required>
        <button type="submit" tabindex="0">CONNEXION</button>
        <button type="button" onclick="requestAccess()" style="background:none; border:none; color:#666; font-size:11px; margin-top:20px; cursor:pointer; text-decoration:underline">Nouveau ? Demander un accès</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="font-size: 32px; font-weight:900">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-close" style="margin-top:40px; background:none; border:1px solid #333; color:#888" onclick="toggleEditMode()" tabindex="0">GÉRER LES PROFILS</button>
    <button onclick="logout()" style="margin-top: 20px; background:none; border:none; color:#444; font-size: 12px;" tabindex="0">DÉCONNEXION</button>
</div>

<header>
    <div class="logo" id="header-logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')" tabindex="0">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')" tabindex="0">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')" tabindex="0">Séries</button>
        <button class="nav-btn" id="btn-fav" onclick="changeView('fav')" tabindex="0">Ma Liste</button>
    </div>
    <div style="display:flex; gap:12px; align-items:center">
        <button onclick="openSearch()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer" tabindex="0">🔍</button>
        <button onclick="switchProfile()" style="background:#25242d; border:none; color:white; padding:8px 12px; border-radius:10px; font-size:11px; font-weight:700; cursor:pointer" tabindex="0">PROFILS</button>
    </div>
    <div id="search-overlay">
        <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher..." tabindex="0">
        <button onclick="closeSearch()" style="background:none; border:none; color:white; margin-left:15px; font-size:22px" tabindex="0">✕</button>
    </div>
</header>

<div id="series-overlay">
    <button class="btn-close" onclick="closeSeries()" style="margin-bottom: 25px;" tabindex="0">← RETOUR</button>
    <div id="series-detail-content"></div>
</div>

<section id="player-section">
    <div style="position:relative">
        <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
        <button id="next-episode-btn" onclick="playNextEpisode()" tabindex="0">ÉPISODE SUIVANT ⏭️</button>
    </div>
    <div class="movie-info">
        <div class="movie-title">
            <span id="display-title"></span>
            <button id="player-fav-btn" onclick="toggleFavCurrent()" tabindex="0">+ Ma Liste</button>
        </div>
        <div id="display-desc" style="color: #9494a5; margin-bottom: 10px; line-height:1.5"></div>
        <div id="display-actors" style="color: var(--gold); font-weight: bold; font-size: 14px; margin-bottom: 20px;"></div>
        <button class="btn-close" onclick="closeP()" tabindex="0">Fermer</button>
    </div>
</section>

<div id="main-content">
    <div id="expiration-banner"></div>
    <div id="history-sec" style="display:none">
        <div class="category-title">Reprendre avec <span id="current-user-name" style="color:var(--accent)"></span></div>
        <div class="category-row">
            <div class="nav-arrow arrow-left" onclick="scrollSide(this, -300)">‹</div>
            <div class="carousel" id="history-container"></div>
            <div class="nav-arrow arrow-right" onclick="scrollSide(this, 300)">›</div>
        </div>
    </div>
    <div id="categories-container"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    async function verifyExpiration(user) {
        if (!user) return false;
        const snapshot = await get(ref(db, 'users_data/' + user.uid + '/expire'));
        const expireValue = snapshot.val();
        if (!expireValue) return false;
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        if (todayStr >= expireValue) {
            alert("Accès expiré le " + expireValue);
            logout(); return true;
        }
        return false;
    }

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            const exp = await verifyExpiration(u.user);
            if (!exp) set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() });
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            if (await verifyExpiration(user)) return;
            onValue(ref(db, 'sessions/' + user.uid), (snap) => {
                const s = snap.val();
                if (s && s.deviceId !== deviceId) { alert("Session ouverte ailleurs."); logout(); }
            });
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            const expVal = snap.val();
            if(expVal) {
                const diff = Math.ceil((new Date(expVal) - new Date()) / (1000*3600*24));
                if(diff > 0 && diff <= 5) {
                    const b = document.getElementById('expiration-banner');
                    b.style.display = 'block'; b.innerText = `⚠️ Fin d'accès dans ${diff} jour(s).`;
                }
            }
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else { document.getElementById('login-screen').style.display = 'flex'; }
    });

    window.selectProfile = async function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('current-user-name').innerText = name;
        const user = auth.currentUser;
        if(user) {
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            document.getElementById('header-logo').innerHTML = `SFPP | ${icon} <span style="font-size:10px; color:#666;">(${snap.val()})</span>`;
        }
        render();
    };

    window.logout = function() { signOut(auth).then(() => { const m = localStorage.getItem('sfpp_last_email'); localStorage.clear(); localStorage.setItem('sfpp_last_email', m); localStorage.setItem('sfpp_device_id', deviceId); location.reload(); }); };
</script>

<script>
let player, playlistData = [], currentProfile = null, isEditMode = false, currentView = 'all', currentPlayingTitle = "";

function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('searchBar').focus(); }
function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; document.getElementById('searchBar').value = ''; render(); }
function scrollSide(btn, amt) { const car = btn.parentElement.querySelector('.carousel'); car.scrollBy({ left: amt, behavior: 'smooth' }); }

async function loadPlaylist() { try { const r = await fetch('films.json'); playlistData = await r.json(); render(); } catch(e){} }

function initProfiles() {
    let profiles = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
        { id: 1, name: "Profil 1", icon: "🟦", color: "#1e90ff" },
        { id: 2, name: "Profil 2", icon: "🟩", color: "#2ecc71" },
        { id: 3, name: "Profil 3", icon: "🟧", color: "#e67e22" },
        { id: 4, name: "Profil 4", icon: "🟪", color: "#9b59b6" }
    ];
    document.getElementById('profile-list').innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="handleProfileClick(${p.id}, '${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div class="edit-icon">✏️</div>
            <div class="profile-name">${p.name}</div>
        </div>`).join('');
}

function handleProfileClick(id, name, icon) {
    if(isEditMode) {
        let n = prompt("Nouveau nom :", name);
        if(n) {
            let saved = JSON.parse(localStorage.getItem('sfpp_profiles_data') || "[]");
            const idx = saved.findIndex(p => p.id === id);
            if(idx !== -1) { saved[idx].name = n; localStorage.setItem('sfpp_profiles_data', JSON.stringify(saved)); initProfiles(); }
        }
    } else selectProfile(name, icon);
}

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histSec = document.getElementById('history-sec');
    const histCont = document.getElementById('history-container');
    cont.innerHTML = ""; histCont.innerHTML = "";
    const s = search.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    if(currentProfile && s === "" && currentView === 'all') {
        let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
        if(history.length > 0) {
            histSec.style.display = "block";
            history.slice().reverse().forEach(title => {
                const m = playlistData.find(item => item.t === title);
                if(m) {
                    const pct = (prog[m.t]) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                    histCont.innerHTML += `<div class="card" onclick="playMovie(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
                }
            });
        }
    }

    const cats = [...new Set(data.map(m => m.cat))];
    let addedSeries = [];

    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="category-row"><div class="nav-arrow arrow-left" onclick="scrollSide(this, -400)">‹</div><div class="carousel">`;
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const heart = favs.includes(m.t) ? `<div style="position:absolute; top:8px; right:8px; font-size:14px">❤️</div>` : "";
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}">${heart}<div class="card-name">${sName}</div></div>`;
                }
            } else {
                html += `<div class="card" onclick="playMovie(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${heart}${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        html += `</div><div class="nav-arrow arrow-right" onclick="scrollSide(this, 400)">›</div></div>`;
        cont.innerHTML += html;
    });
}

function openSeries(name) {
    const overlay = document.getElementById('series-overlay');
    const content = document.getElementById('series-detail-content');
    const eps = playlistData.filter(m => m.t.startsWith(name));
    overlay.style.display = 'block';
    let html = `<h2>${name}</h2>`;
    const seasons = {};
    eps.forEach(ep => {
        const sMatch = ep.t.match(/S(\d{2})/);
        const sNum = sMatch ? sMatch[1] : "01";
        if(!seasons[sNum]) seasons[sNum] = [];
        seasons[sNum].push(ep);
    });
    Object.keys(seasons).sort().forEach(s => {
        html += `<h3 style="color:var(--accent); margin-top:20px">SAISON ${s}</h3>`;
        seasons[s].forEach(ep => {
            html += `<div class="episode-item" onclick="playMovie(${playlistData.indexOf(ep)}); closeSeries();" tabindex="0">
                        <div style="flex:1"><b>${ep.t.split(' - ')[1] || ep.t}</b></div>
                        <div style="color:var(--accent)">LIRE</div>
                     </div>`;
        });
    });
    content.innerHTML = html;
}

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('next-episode-btn').style.display = 'none';
    if(currentProfile) {
        let key = 'sfpp_hist_' + currentProfile;
        let hist = JSON.parse(localStorage.getItem(key) || "[]").filter(t => t !== m.t);
        hist.push(m.t); if(hist.length > 15) hist.shift();
        localStorage.setItem(key, JSON.stringify(hist));
    }
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('display-desc').innerText = m.desc || "";
    document.getElementById('display-actors').innerText = (m.actors || m.cast) ? "Avec : " + (m.actors || m.cast) : "";
    updatePlayerFavUI();
    window.scrollTo({top:0, behavior:'smooth'});
    player.src({ src: m.url, type: 'video/mp4' });
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t] && prog[m.t].t > 10) player.currentTime(prog[m.t].t);
    player.play();
}

function playNextEpisode() {
    const parts = currentPlayingTitle.match(/(.*[SE])(\d+)(.*)/i);
    if (!parts) return;
    const nextTitle = (parts[1] + (parseInt(parts[2]) + 1).toString().padStart(2, '0')).toUpperCase();
    const nextIdx = playlistData.findIndex(m => m.t.toUpperCase().includes(nextTitle));
    if (nextIdx !== -1) playMovie(nextIdx);
}

function closeP() { saveP(); player.pause(); document.getElementById('player-section').style.display = 'none'; render(); }
function saveP() {
    if(!currentPlayingTitle) return;
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        prog[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(prog));
    }
}

function closeSeries() { document.getElementById('series-overlay').style.display = 'none'; }
function changeView(v) { currentView = v; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+v).classList.add('active'); render(); }
function filter() { render(document.getElementById('searchBar').value); }
function toggleEditMode() { isEditMode = !isEditMode; document.getElementById('profile-screen').classList.toggle('is-editing'); }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }
function requestAccess() { window.location.href = "mailto:sfpp.ott@gmail.com"; }

function toggleFavCurrent() {
    let key = 'sfpp_fav_' + currentProfile;
    let favs = JSON.parse(localStorage.getItem(key) || "[]");
    if(favs.includes(currentPlayingTitle)) favs = favs.filter(t => t !== currentPlayingTitle);
    else favs.push(currentPlayingTitle);
    localStorage.setItem(key, JSON.stringify(favs));
    updatePlayerFavUI();
}

function updatePlayerFavUI() {
    let favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const btn = document.getElementById('player-fav-btn');
    btn.innerText = favs.includes(currentPlayingTitle) ? "❤️ Dans Ma Liste" : "+ Ma Liste";
    btn.classList.toggle('is-fav', favs.includes(currentPlayingTitle));
}

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { techOrder: ['chromecast', 'html5'], plugins: { chromecast: { addButtonToControlBar: true } } });
    player.on('timeupdate', () => {
        const dur = player.duration(), cur = player.currentTime();
        if (/S\d{2}E\d{2}/i.test(currentPlayingTitle) && dur > 0 && (dur - cur) < 80) document.getElementById('next-episode-btn').style.display = 'block';
        if(Math.floor(cur) % 10 === 0) saveP();
    });

    let lastTap = 0;
    player.on('touchend', (e) => {
        let now = Date.now();
        if (now - lastTap < 300) { if (player.isFullscreen()) player.exitFullscreen(); else player.requestFullscreen(); e.preventDefault(); }
        lastTap = now;
    });

    const Button = videojs.getComponent('Button');
    class Back extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-replay-10'; } handleClick() { player.currentTime(player.currentTime()-10); } }
    class Forward extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-forward-10'; } handleClick() { player.currentTime(player.currentTime()+10); } }
    videojs.registerComponent('Back', Back); videojs.registerComponent('Forward', Forward);
    player.ready(() => { player.getChild('controlBar').addChild('Back', {}, 1); player.getChild('controlBar').addChild('Forward', {}, 2); });
});
</script>
