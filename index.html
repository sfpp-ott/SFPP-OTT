<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --gold: #ffcc00; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        
        [tabindex="0"]:focus {
            outline: 3px solid white !important;
            outline-offset: 2px;
            transform: scale(1.05);
            background: rgba(255,255,255,0.1);
            z-index: 100;
        }

        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-request { background: none !important; border: none; color: #666 !important; font-size: 11px; margin-top: 15px; cursor: pointer; text-decoration: underline; }

        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 80%; max-width: 400px; margin-top: 30px; }
        .profile-item { text-align: center; cursor: pointer; transition: transform 0.2s; position: relative; border-radius: 8px; }
        .profile-avatar { width: 100px; height: 100px; background: #333; border-radius: 4px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid transparent; }
        .profile-name { font-size: 14px; color: #888; }
        
        .edit-icon { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); border-radius: 50%; padding: 5px; display: none; font-size: 20px; }
        .is-editing .edit-icon { display: block; }
        .btn-manage { margin-top: 40px; background: none; border: 1px solid #444; color: #888; padding: 10px 20px; cursor: pointer; font-size: 14px; letter-spacing: 1px; }

        header { 
            position: fixed; top: 0; width: 100%; height: 60px; 
            background: rgba(0,0,0,0.95); display: flex; align-items: center; 
            padding: 0 15px; z-index: 2000; border-bottom: 1px solid #222; 
            justify-content: space-between; box-sizing: border-box; gap: 10px;
        }
        .logo { color: var(--accent); font-weight: 900; font-size: 18px; flex-shrink: 0; }
        
        .nav-links { 
            display: flex; gap: 15px; flex: 1; overflow-x: auto; 
            white-space: nowrap; align-items: center; scrollbar-width: none;
            -webkit-overflow-scrolling: touch; justify-content: flex-start;
        }
        .nav-links::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 13px; font-weight: 500; padding: 10px 5px; transition: color 0.3s; flex-shrink: 0; border-radius: 4px; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: #000; display: none; align-items: center; padding: 0 15px;
            box-sizing: border-box; z-index: 2001;
        }
        #searchBar { flex: 1; background: #222; border: 1px solid #444; color: white; padding: 8px 15px; border-radius: 20px; outline: none; font-size: 14px; }
        
        .header-actions { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .btn-icon { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .btn-logout { background: #333; color: white; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; flex-shrink: 0; }

        #player-section { display: none; width: 100%; background: #000; padding-top: 60px; position: fixed; inset: 0; z-index: 4500; overflow-y: auto; }
        .video-container { position: relative; width: 100%; background: #000; min-height: 200px; }
        
        .vjs-blur-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background-size: cover;
            background-position: center;
            filter: blur(25px) brightness(0.4);
            transform: scale(1.1); 
            display: block;
        }
        
        .video-js { z-index: 1 !important; }
        .video-js.vjs-playing .vjs-blur-bg { display: none; }
        .video-js video { object-fit: cover !important; }

        #next-episode-btn {
            position: absolute; bottom: 85px; right: 25px; z-index: 99999 !important;
            background: #e50914; color: white; border: 2px solid #fff; padding: 15px 25px;
            border-radius: 8px; font-weight: bold; font-size: 15px; display: none; cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.9); animation: fadeIn 0.5s;
        }

        #expiration-banner { display: none; background: #ffcc00; color: #000; text-align: center; padding: 10px; font-size: 13px; font-weight: bold; position: relative; z-index: 1500; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .vjs-skip-button { font-size: 1.5em !important; cursor: pointer; }
        
        /* STYLE MISE À JOUR PAGE DETAILS (COMME PHOTO) */
        #details-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 3500; display: none; align-items: center; justify-content: center;
        }
        .details-content {
            background: #111; width: 100%; height: 100%;
            display: flex; position: relative; overflow-y: auto;
            flex-direction: column;
            animation: slideUp 0.4s ease;
        }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .details-header-bg {
            position: relative;
            width: 100%;
            height: 40vh;
            background-size: cover;
            background-position: center top;
        }
        .details-header-bg::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, #111, transparent);
        }
        .details-body {
            padding: 20px;
            margin-top: -60px;
            z-index: 2;
            position: relative;
        }
        .details-title-row { font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        .details-meta-row { display: flex; gap: 15px; align-items: center; color: #888; font-size: 14px; margin-bottom: 20px; }
        .meta-year { background: #333; padding: 2px 6px; border-radius: 4px; color: #eee; }
        .meta-rating { color: var(--gold); }

        .btn-lecture-big {
            background: white; color: black; border: none; width: 100%;
            padding: 12px; border-radius: 4px; font-weight: bold;
            font-size: 18px; cursor: pointer; margin-bottom: 30px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        
        .section-label { font-size: 18px; font-weight: bold; margin: 25px 0 15px; color: #fff; }
        
        .details-poster { display: none; } /* Caché sur la nouvelle version car on utilise le header-bg */
        
        .trailer-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; margin-bottom: 15px; overflow: hidden; border: 1px solid #333; }
        
        .cast-row { display: flex; gap: 15px; overflow-x: auto; padding: 5px 0 15px; scrollbar-width: none; }
        .cast-row::-webkit-scrollbar { display: none; }
        .actor-item { flex: 0 0 80px; text-align: center; }
        .actor-item img { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #444; }
        .actor-name { font-size: 11px; color: #aaa; margin-top: 8px; }

        .btn-close-details { 
            position: absolute; top: 15px; right: 15px; 
            background: rgba(0,0,0,0.6); border: none; color: white; 
            width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 100;
            font-size: 20px; display: flex; align-items: center; justify-content: center;
        }

        /* CARD STYLE */
        .card { flex: 0 0 150px; width: 150px; cursor: pointer; position: relative; }
        .card img { width: 150px !important; height: 225px !important; object-fit: cover !important; border-radius: 4px; display: block; }
        .card-name { margin-top: 6px; font-size: 12px; text-align: center; color: #bbb; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; width: 100%; }

        @media (min-width: 768px) {
            .details-content { width: 80%; height: 90%; border-radius: 12px; border: 1px solid #333; }
        }
    </style>
</head>
<body>

<div id="login-screen">
    <form class="login-box" onsubmit="event.preventDefault(); checkLogin();">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="email" id="user" name="email" placeholder="E-mail" autocapitalize="none" autocomplete="username" required>
        <input type="password" id="pass" name="password" placeholder="Mot de passe" autocomplete="current-password" required>
        <button type="submit" tabindex="0">CONNEXION</button>
        <button type="button" class="btn-request" onclick="requestAccess()" tabindex="0">Nouveau ? Demander un accès</button>
    </form>
</div>

<div id="profile-screen">
    <h1 style="font-size: 32px;">Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
    <button class="btn-manage" id="manage-btn" onclick="toggleEditMode()" tabindex="0">GÉRER LES PROFILS</button>
    <button onclick="logout()" style="margin-top: 20px; background:none; border:none; color:#444; cursor:pointer; font-size: 12px;" tabindex="0">DÉCONNEXION</button>
</div>

<header>
    <div class="logo" id="header-logo">SFPP</div>
    <div class="nav-links">
        <button class="nav-btn active" id="btn-all" onclick="changeView('all')" tabindex="0">Accueil</button>
        <button class="nav-btn" id="btn-movies" onclick="changeView('movies')" tabindex="0">Films</button>
        <button class="nav-btn" id="btn-series" onclick="changeView('series')" tabindex="0">Séries</button>
        <button class="nav-btn" id="btn-fav" onclick="changeView('fav')" tabindex="0">Ma Liste ❤️</button>
        <button class="nav-btn" onclick="location.reload()" tabindex="0">🔄</button>
    </div>
    <div class="header-actions">
        <button class="btn-icon" onclick="openSearch()" tabindex="0">🔍</button>
        <button class="btn-logout" onclick="switchProfile()" tabindex="0">PROFILS</button>
    </div>
    <div id="search-overlay">
        <input type="text" id="searchBar" onkeyup="filter()" placeholder="Rechercher..." tabindex="0">
        <button class="btn-icon" onclick="closeSearch()" style="margin-left:10px" tabindex="0">✕</button>
    </div>
</header>

<div id="details-overlay">
    <div class="details-content">
        <button class="btn-close-details" onclick="closeDetails()">✕</button>
        <div id="details-header-bg" class="details-header-bg"></div>
        
        <div class="details-body">
            <div id="details-title" class="details-title-row">Titre</div>
            <div class="details-meta-row">
                <span id="details-year" class="meta-year">2025</span>
                <span id="details-type">Film</span>
                <span id="details-stars" class="meta-rating">★★★★★</span>
            </div>

            <button id="details-play-btn" class="btn-lecture-big">
                ▶ LECTURE
            </button>

            <div class="section-label">Bande-annonce</div>
            <div id="details-trailer-box"></div>

            <p id="details-desc" style="color:#ccc; line-height:1.6; font-size: 15px; margin-bottom: 30px;"></p>

            <div class="section-label">Distribution</div>
            <div id="details-cast" class="cast-row"></div>
        </div>
    </div>
</div>

<div id="series-overlay">
    <button class="btn-close" onclick="closeSeries()" style="margin-bottom: 20px;" tabindex="0">← Retour</button>
    <div id="series-detail-content"></div>
</div>

<section id="player-section">
    <div class="video-container" id="video-container">
        <div id="player-blur-bg" class="vjs-blur-bg"></div>
        <video id="main-video" class="video-js vjs-theme-fantasy vjs-16-9 vjs-big-play-centered" controls preload="auto" width="100%"></video>
        <button id="next-episode-btn" onclick="playNextEpisode()" tabindex="0">ÉPISODE SUIVANT ⏭️</button>
    </div>
    <div class="movie-info">
        <div class="movie-title">
            <span id="display-title"></span>
            <button id="player-fav-btn" onclick="toggleFavCurrent()" tabindex="0">+ Ma Liste</button>
        </div>
        <div id="display-desc" style="color: #bbb; margin-bottom: 10px;"></div>
        <div id="display-actors" style="color: var(--gold); font-weight: bold; font-size: 14px; margin-bottom: 20px;"></div>
        <button class="btn-close" onclick="closeP()" tabindex="0">Fermer</button>
    </div>
</section>

<div id="main-content">
    <div id="expiration-banner"></div>
    <div id="history-sec" style="display:none">
        <div class="category-title">Reprendre la lecture</div>
        <div class="category-row">
            <div class="nav-arrow arrow-left" onclick="scrollSide(this, -300)">‹</div>
            <div class="carousel" id="history-container"></div>
            <div class="nav-arrow arrow-right" onclick="scrollSide(this, 300)">›</div>
        </div>
    </div>
    <div id="categories-container"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
<script src="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    const savedEmail = localStorage.getItem('sfpp_last_email');
    if(savedEmail) document.getElementById('user').value = savedEmail;

    window.checkLogin = function() {
        const email = document.getElementById('user').value.trim();
        const pass = document.getElementById('pass').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() }); 
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = async function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        document.getElementById('header-logo').innerHTML = `SFPP | ${icon}`;
        render();
        history.pushState({ overlay: 'home' }, "");
    };

    window.logout = function() { signOut(auth).then(() => { localStorage.clear(); location.reload(); }); };
</script>

<script>
let player, playlistData = [], currentProfile = null, isEditMode = false, currentView = 'all', currentPlayingTitle = "";

window.addEventListener('popstate', function (event) {
    if (document.getElementById('details-overlay').style.display === 'flex') {
        document.getElementById('details-overlay').style.display = 'none';
        document.getElementById('details-trailer-box').innerHTML = "";
        return;
    }
    if (document.getElementById('series-overlay').style.display === 'block') {
        document.getElementById('series-overlay').style.display = 'none';
        return;
    }
    if (document.getElementById('player-section').style.display === 'block') {
        saveP(); player.pause(); document.getElementById('player-section').style.display = 'none';
        render(); return;
    }
});

async function loadPlaylist() { try { const r = await fetch('films.json'); playlistData = await r.json(); render(); } catch(e){} }

function openDetails(idx) {
    history.pushState({ overlay: 'details' }, "");
    const m = playlistData[idx];
    
    document.getElementById('details-header-bg').style.backgroundImage = `url('${m.img}')`;
    document.getElementById('details-title').innerText = m.t;
    document.getElementById('details-desc').innerText = m.desc || "Aucun résumé.";
    document.getElementById('details-year').innerText = m.year || "2025";
    document.getElementById('details-type').innerText = m.cat === "SÉRIES" ? "Série" : "Film";
    
    // Casting
    const castDiv = document.getElementById('details-cast');
    if (m.actors_pics && m.actors_pics.length > 0) {
        castDiv.innerHTML = m.actors_pics.map(a => `
            <div class="actor-item">
                <img src="${a.img}" onerror="this.src='https://via.placeholder.com/70x70?text=?'">
                <div class="actor-name">${a.name}</div>
            </div>
        `).join('');
    } else castDiv.innerHTML = "<p style='color:#666'>Non renseigné</p>";

    // Trailer
    const trailerDiv = document.getElementById('details-trailer-box');
    if (m.trailer) {
        trailerDiv.innerHTML = `<div class="trailer-box"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}?rel=0" frameborder="0" allowfullscreen></iframe></div>`;
    } else trailerDiv.innerHTML = "";

    document.getElementById('details-play-btn').onclick = () => playMovie(idx);
    document.getElementById('details-overlay').style.display = 'flex';
}

function closeDetails() { history.back(); }

function initProfiles() {
    let p = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
        { id: 1, name: "Profil 1", icon: "🟦", color: "#1e90ff" },
        { id: 2, name: "Profil 2", icon: "🟩", color: "#2ecc71" },
        { id: 3, name: "Profil 3", icon: "🟧", color: "#e67e22" },
        { id: 4, name: "Profil 4", icon: "🟪", color: "#9b59b6" }
    ];
    document.getElementById('profile-list').innerHTML = p.map(p => `
        <div class="profile-item" onclick="handleProfileClick(${p.id}, '${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}</div>
            <div class="edit-icon">✏️</div>
            <div class="profile-name">${p.name}</div>
        </div>`).join('');
}

function handleProfileClick(id, name, icon) {
    if(isEditMode) {
        let n = prompt("Nouveau nom :", name);
        if(n) {
            let s = JSON.parse(localStorage.getItem('sfpp_profiles_data') || "[]");
            const i = s.findIndex(x => x.id === id);
            if(i !== -1) { s[i].name = n; localStorage.setItem('sfpp_profiles_data', JSON.stringify(s)); initProfiles(); }
        }
    } else selectProfile(name, icon);
}

function saveP() {
    if(!currentPlayingTitle) return;
    const cur = player.currentTime(), dur = player.duration();
    if(dur > 0) {
        let p = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        p[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(p));
    }
}

function scrollSide(btn, amt) { btn.parentElement.querySelector('.carousel').scrollBy({ left: amt, behavior: 'smooth' }); }

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histSec = document.getElementById('history-sec');
    const histCont = document.getElementById('history-container');
    cont.innerHTML = ""; histCont.innerHTML = "";
    const s = search.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = data.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = data.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = data.filter(m => favs.includes(m.t));

    if(currentProfile && s === "" && currentView === 'all') {
        let h = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
        if(h.length > 0) {
            histSec.style.display = "block";
            h.slice().reverse().forEach(t => {
                const m = playlistData.find(x => x.t === t);
                if(m) {
                    const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                    histCont.innerHTML += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
                }
            });
        } else histSec.style.display = "none";
    }

    const cats = [...new Set(data.map(m => m.cat))];
    let added = [];
    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="category-row"><div class="nav-arrow arrow-left" onclick="scrollSide(this, -400)">‹</div><div class="carousel">`;
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!added.includes(sName)) {
                    added.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}"><div class="card-name">${sName}</div></div>`;
                }
            } else {
                html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        html += `</div><div class="nav-arrow arrow-right" onclick="scrollSide(this, 400)">›</div></div>`;
        cont.innerHTML += html;
    });
}

function openSeries(name) {
    history.pushState({ overlay: 'series' }, "");
    const overlay = document.getElementById('series-overlay');
    const eps = playlistData.filter(m => m.t.startsWith(name));
    overlay.style.display = 'block';
    let html = `<div class="overlay-header"><img src="${eps[0].img}" class="overlay-img"><div><h2>${name}</h2></div></div>`;
    const seasons = {};
    eps.forEach(ep => {
        const sMatch = ep.t.match(/S(\d{2})/);
        const sNum = sMatch ? sMatch[1] : "01";
        if(!seasons[sNum]) seasons[sNum] = [];
        seasons[sNum].push(ep);
    });
    Object.keys(seasons).sort().forEach(s => {
        html += `<div class="season-title">SAISON ${s}</div>`;
        seasons[s].forEach(ep => {
            html += `<div class="episode-item" onclick="openDetails(${playlistData.indexOf(ep)});" tabindex="0">
                        <div style="flex:1"><b>${ep.t.split(' - ')[1] || ep.t}</b></div>
                        <div style="color:var(--accent)">VOIR</div>
                     </div>`;
        });
    });
    document.getElementById('series-detail-content').innerHTML = html;
}

function playMovie(idx) {
    history.replaceState({ overlay: 'player' }, "");
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    
    let key = 'sfpp_hist_' + currentProfile;
    let h = JSON.parse(localStorage.getItem(key) || "[]").filter(t => t !== m.t);
    h.push(m.t); if(h.length > 15) h.shift();
    localStorage.setItem(key, JSON.stringify(h));
    
    document.getElementById('details-overlay').style.display = 'none';
    document.getElementById('series-overlay').style.display = 'none';
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('player-blur-bg').style.backgroundImage = `url('${m.img}')`;
    
    player.src({ src: m.url, type: 'video/mp4' });
    const p = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(p[m.t]) player.currentTime(p[m.t].t);
    player.play();
}

function closeP() { history.back(); }
function closeSeries() { history.back(); }
function changeView(v) { currentView = v; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+v).classList.add('active'); render(); }
function filter() { render(document.getElementById('searchBar').value); }
function toggleEditMode() { isEditMode = !isEditMode; document.getElementById('profile-screen').classList.toggle('is-editing'); }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { 
        controls: true, fluid: true, fill: true,
        techOrder: ['chromecast', 'html5'], plugins: { chromecast: { addButtonToControlBar: true } }
    });
    
    player.on('timeupdate', () => { if(Math.floor(player.currentTime()) % 10 === 0) saveP(); });

    const Button = videojs.getComponent('Button');
    class Back extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-replay-10'; } handleClick() { player.currentTime(player.currentTime()-10); } }
    class Forward extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-forward-10'; } handleClick() { player.currentTime(player.currentTime()+10); } }
    videojs.registerComponent('Back', Back); videojs.registerComponent('Forward', Forward);
    player.ready(() => { 
        player.getChild('controlBar').addChild('Back', {}, 1); 
        player.getChild('controlBar').addChild('Forward', {}, 2); 
    });
});
</script>
</body>
