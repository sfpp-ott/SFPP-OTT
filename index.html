<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">

    <style>
        :root { --accent: #e50914; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding-bottom: 50px; }
        
        /* Header & Logo */
        header { position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9); display: flex; align-items: center; padding: 0 4%; z-index: 2000; justify-content: space-between; box-sizing: border-box; }
        .logo { color: var(--accent); font-weight: 900; font-size: 24px; }
        .nav-links { display: flex; gap: 15px; }
        .nav-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 14px; }
        .nav-btn.active { color: white; font-weight: bold; border-bottom: 2px solid var(--accent); }

        /* Player Section */
        #player-section { display: none; width: 100%; background: #000; padding-top: 60px; }
        .video-js { width: 100%; max-height: 80vh; }
        
        /* Personnalisation du bouton Chromecast pour qu'il soit visible */
        .vjs-chromecast-button .vjs-icon-placeholder:before { color: #ffcc00 !important; } 

        .movie-info { padding: 25px 5%; background: #0a0a0a; }
        .movie-title { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .movie-desc { color: #aaa; font-size: 15px; line-height: 1.5; }

        /* Grid */
        #main-content { padding-top: 80px; }
        .category-title { font-size: 18px; font-weight: bold; margin: 25px 4% 10px; text-transform: uppercase; }
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 4% 20px; scrollbar-width: none; }
        .card { flex: 0 0 150px; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 4px; }
        .card-name { margin-top: 8px; font-size: 12px; text-align: center; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Login & Profiles (simplifié pour le code) */
        #login-screen { position: fixed; inset: 0; background: #000; z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: #111; padding: 30px; border-radius: 8px; width: 280px; text-align: center; border: 1px solid #333; }
        .login-box input { width: 100%; padding: 12px; margin: 10px 0; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; }
        
        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .profile-avatar { width: 90px; height: 90px; background: #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 40px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <div class="logo" style="margin-bottom:20px">SFPP ELITE</div>
        <input type="text" id="user" placeholder="Utilisateur">
        <input type="password" id="pass" placeholder="Mot de passe">
        <button onclick="checkLogin()">CONNEXION</button>
    </div>
</div>

<div id="profile-screen">
    <h1>Qui regarde ?</h1>
    <div class="profile-grid" id="profile-list"></div>
</div>

<header>
    <div class="logo">SFPP ELITE</div>
    <div class="nav-links">
        <button class="nav-btn active" onclick="changeView('all')">Accueil</button>
        <button class="nav-btn" onclick="changeView('movies')">Films</button>
    </div>
    <button onclick="logout()" style="background:none; border:1px solid #444; color:white; padding:5px 10px; cursor:pointer;">Sortir</button>
</header>

<section id="player-section">
    <video id="main-video" class="video-js vjs-theme-city vjs-big-play-centered" controls preload="auto" width="100%"></video>
    
    <div class="movie-info">
        <div id="display-title" class="movie-title"></div>
        <div id="display-desc" class="movie-desc"></div>
        <button onclick="closeP()" style="margin-top:20px; padding:10px 20px; background:#333; color:white; border:none; border-radius:4px; cursor:pointer;">Fermer</button>
    </div>
</section>

<div id="main-content">
    <div id="categories-container"></div>
</div>
