<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SFPP ELITE - MA LISTE COMPLÈTE</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://i.ibb.co/mS6p9Xv/icon-sfpp.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SFPP ELITE">
    <meta name="theme-color" content="#050505">

    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/fantasy/index.css" rel="stylesheet">
    <link href="https://unpkg.com/@silvermine/videojs-chromecast@1.5.0/dist/silvermine-videojs-chromecast.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root { 
            --accent: #e50914; 
            --gold: #ffcc00; 
            --bg: #050505; 
            --card-bg: #111;
            --header-bg: rgba(5, 5, 5, 0.85);
        }

        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding-bottom: 50px; 
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Focus style purstream */
        [tabindex="0"]:focus {
            outline: 2px solid #fff !important;
            outline-offset: 4px;
            transform: scale(1.05);
            transition: transform 0.2s ease;
        }

        /* Login Screen PurStream Style */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #111 0%, #000 100%); z-index: 5000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: rgba(0,0,0,0.6); padding: 40px; border-radius: 12px; width: 340px; text-align: center; border: 1px solid #222; backdrop-filter: blur(10px); }
        .login-box input { width: 100%; padding: 15px; margin: 12px 0; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .login-box button { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; transition: opacity 0.3s; }
        .btn-request { background: none !important; border: none; color: #555 !important; font-size: 12px; margin-top: 20px; cursor: pointer; text-decoration: none; }

        /* Profils */
        #profile-screen { position: fixed; inset: 0; background: var(--bg); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .profile-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; width: 80%; max-width: 450px; }
        .profile-item { text-align: center; cursor: pointer; transition: 0.3s; }
        .profile-avatar { width: 110px; height: 110px; border-radius: 12px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 45px; position: relative; overflow: hidden; }
        .profile-item:hover { transform: scale(1.05); }
        .profile-name { font-size: 16px; color: #aaa; font-weight: 400; }
        
        .edit-icon { position: absolute; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; font-size: 24px; }
        .is-editing .edit-icon { display: flex; }
        .btn-manage { margin-top: 60px; background: none; border: 1px solid #444; color: #888; padding: 12px 35px; cursor: pointer; font-size: 14px; border-radius: 4px; }

        /* Header Style PurStream (Transparent au début) */
        header { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%); 
            display: flex; align-items: center; 
            padding: 0 4%; z-index: 2000; 
            justify-content: space-between; box-sizing: border-box;
            transition: background 0.4s ease;
        }
        header.scrolled { background: #050505; border-bottom: 1px solid #1a1a1a; }
        
        .logo { color: var(--accent); font-weight: 800; font-size: 24px; flex-shrink: 0; letter-spacing: -1px; }
        
        .nav-links { display: flex; gap: 20px; flex: 1; margin-left: 30px; overflow-x: auto; scrollbar-width: none; }
        .nav-links::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: none; border: none; color: #aaa; cursor: pointer; font-size: 14px; font-weight: 500; padding: 10px 0; transition: 0.3s; }
        .nav-btn:hover, .nav-btn.active { color: white; }
        .nav-btn.active { font-weight: 700; position: relative; }
        .nav-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--accent); }

        #search-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 70px;
            background: #050505; display: none; align-items: center; padding: 0 4%;
            box-sizing: border-box; z-index: 2001;
        }
        #searchBar { flex: 1; background: #111; border: 1px solid #222; color: white; padding: 12px 25px; border-radius: 6px; outline: none; font-size: 16px; }
        
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .btn-icon { background: none; border: none; color: white; font-size: 20px; cursor: pointer; opacity: 0.8; }

        /* Contenu Principal */
        #main-content { padding-top: 100px; }
        
        .category-row { position: relative; width: 100%; margin-bottom: 40px; }
        .category-title { font-size: 1.3rem; font-weight: 700; margin: 0 4% 15px; color: #fff; }
        
        .carousel { display: flex; overflow-x: auto; gap: 15px; padding: 0 4% 20px; scrollbar-width: none; scroll-behavior: smooth; }
        .carousel::-webkit-scrollbar { display: none; }

        .card { flex: 0 0 170px; cursor: pointer; position: relative; transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); }
        .card:hover { transform: scale(1.08); z-index: 10; }
        .card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; border-radius: 8px; background: var(--card-bg); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .card-name { margin-top: 10px; font-size: 13px; font-weight: 500; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .prog-bg { position: absolute; bottom: 32px; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 0 0 8px 8px; }
        .prog-fill { height: 100%; background: var(--accent); }

        /* Player PurStream Info */
        #player-section { display: none; width: 100%; background: #000; position: fixed; inset: 0; z-index: 4000; overflow-y: auto; }
        .video-container { position: relative; width: 100%; background: #000; }
        
        .vjs-blur-bg {
            position: absolute; inset: 0; z-index: 0;
            background-size: cover; background-position: center;
            filter: blur(50px) brightness(0.2); transform: scale(1.1);
        }
        
        .movie-info { padding: 40px 6%; background: #050505; }
        .movie-title { font-size: 32px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        
        #player-fav-btn { background: rgba(255,255,255,0.1); border: 1px solid #333; color: white; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        #player-fav-btn.is-fav { background: var(--accent); border-color: var(--accent); }

        /* Details Overlay */
        #details-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 3500; display: none; align-items: center; justify-content: center;
            padding: 20px; backdrop-filter: blur(8px);
        }
        .details-content {
            background: #0f0f0f; max-width: 1000px; width: 100%; border-radius: 16px;
            display: flex; position: relative; overflow: hidden; border: 1px solid #222;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .details-poster { width: 35%; object-fit: cover; }
        .details-info { width: 65%; padding: 50px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; max-height: 85vh; }
        .btn-play-main { background: #fff; color: #000; border: none; padding: 16px 40px; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 18px; }

        /* Season/Episodes UI */
        #series-overlay { position: fixed; inset: 0; background: #050505; z-index: 3000; display: none; overflow-y: auto; padding: 100px 6% 50px; }
        .episode-item { background: #111; padding: 25px; border-radius: 10px; margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; border: 1px solid #222; transition: 0.3s; }
        .episode-item:hover { background: #181818; border-color: #444; }

        .nav-arrow { position: absolute; top: 0; bottom: 30px; width: 60px; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10; cursor: pointer; color: white; font-size: 40px; opacity: 0; transition: 0.3s; }
        .category-row:hover .nav-arrow { opacity: 1; }
        .arrow-left { left: 0; } .arrow-right { right: 0; }

        @media (max-width: 768px) {
            .details-content { flex-direction: column; max-height: 95vh; }
            .details-poster { width: 100%; height: 250px; }
            .details-info { width: 100%; padding: 30px; }
            .card { flex: 0 0 140px; }
            .movie-title { font-size: 24px; }
        }
    </style>
</head>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDipnvk8nHn_mnj6HObA038DhS2U39kSgU",
      authDomain: "sfpp-elite.firebaseapp.com",
      databaseURL: "https://sfpp-elite-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "sfpp-elite"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    let deviceId = localStorage.getItem('sfpp_device_id') || Math.random().toString(36).substring(7);
    localStorage.setItem('sfpp_device_id', deviceId);

    const savedEmail = localStorage.getItem('sfpp_last_email');
    if(savedEmail) document.getElementById('user').value = savedEmail;

    async function verifyExpiration(user) {
        if (!user) return false;
        const snapshot = await get(ref(db, 'users_data/' + user.uid + '/expire'));
        const expireValue = snapshot.val();
        if (!expireValue) return false;
        
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        const todayStr = `${y}-${m}-${d}`;
        
        if (todayStr >= expireValue) {
            alert("Accès expiré le " + expireValue);
            await signOut(auth);
            const mail = localStorage.getItem('sfpp_last_email');
            localStorage.clear();
            localStorage.setItem('sfpp_last_email', mail);
            localStorage.setItem('sfpp_device_id', deviceId);
            location.reload();
            return true;
        }
        return false;
    }

    window.startSessionSync = function(uid) {
        onValue(ref(db, 'sessions/' + uid), (snapshot) => {
            const session = snapshot.val();
            if (session && session.deviceId !== deviceId) {
                alert("⚠️ Ce compte est utilisé sur un autre appareil.");
                localStorage.removeItem('sfpp_profile'); 
                signOut(auth).then(() => location.reload());
            }
        });
    };

    window.checkLogin = function() {
        const email = document.querySelector('#login-screen input[type="email"]').value.trim();
        const pass = document.querySelector('#login-screen input[type="password"]').value;
        signInWithEmailAndPassword(auth, email, pass).then(async (u) => {
            localStorage.setItem('sfpp_last_email', email);
            const exp = await verifyExpiration(u.user);
            if (!exp) { 
                set(ref(db, 'sessions/' + u.user.uid), { deviceId: deviceId, lastLogin: Date.now() }); 
            }
        }).catch(() => alert("Identifiants incorrects."));
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            if (await verifyExpiration(user)) return;
            window.startSessionSync(user.uid);
            document.getElementById('login-screen').style.display = 'none';
            loadPlaylist();
            initProfiles();
            
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            const expireValue = snap.val();
            if(expireValue) {
                const today = new Date();
                const expireDate = new Date(expireValue);
                const diffDays = Math.ceil((expireDate - today) / (1000 * 60 * 60 * 24));
                const banner = document.getElementById('expiration-banner');
                if(diffDays > 0 && diffDays <= 5) {
                    banner.style.display = 'block';
                    banner.innerHTML = `⚠️ Fin d'accès dans ${diffDays} jour(s).`;
                } else banner.style.display = 'none';
            }
            
            const saved = localStorage.getItem('sfpp_profile');
            if(saved) selectProfile(saved, localStorage.getItem('sfpp_profile_icon'));
            else document.getElementById('profile-screen').style.display = 'flex';
        } else {
            document.getElementById('login-screen').style.display = 'flex';
        }
    });

    window.selectProfile = async function(name, icon) {
        currentProfile = name;
        localStorage.setItem('sfpp_profile', name);
        localStorage.setItem('sfpp_profile_icon', icon);
        document.getElementById('profile-screen').style.display = 'none';
        const user = auth.currentUser;
        if(user) {
            const snap = await get(ref(db, 'users_data/' + user.uid + '/expire'));
            document.getElementById('header-logo').innerHTML = `SFPP | ${icon} <span style="font-size:10px; color:#666;">(${snap.val()})</span>`;
        }
        render();
    };

    window.logout = function() { 
        const mail = localStorage.getItem('sfpp_last_email');
        signOut(auth).then(() => { 
            localStorage.clear(); 
            localStorage.setItem('sfpp_last_email', mail);
            localStorage.setItem('sfpp_device_id', deviceId);
            location.reload(); 
        }); 
    };
</script>

<script>
let player, playlistData = [], currentProfile = null, isEditMode = false, currentView = 'all', currentPlayingTitle = "";

document.addEventListener('focusin', (e) => {
    if (e.target.hasAttribute('tabindex')) {
        e.target.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
    }
});

function openSearch() { document.getElementById('search-overlay').style.display = 'flex'; document.getElementById('searchBar').focus(); }
function closeSearch() { document.getElementById('search-overlay').style.display = 'none'; document.getElementById('searchBar').value = ''; filter(); }

async function loadPlaylist() { try { const response = await fetch('films.json'); playlistData = await response.json(); render(); } catch (e) {} }

function openDetails(idx) {
    const m = playlistData[idx];
    document.getElementById('details-img').src = m.img;
    document.getElementById('details-title').innerText = m.t;
    
    let castHtml = "";
    if (m.actors_pics && m.actors_pics.length > 0) {
        castHtml = `<div class="cast-row" style="display:flex; gap:12px; overflow-x:auto; padding:5px 0 15px; scrollbar-width:none;">` + 
            m.actors_pics.map(a => `
                <div class="actor-item" style="flex:0 0 75px; text-align:center;">
                    <img src="${a.img}" onerror="this.src='https://via.placeholder.com/60x60?text=?'" style="width:65px; height:65px; border-radius:50%; object-fit:cover; border:2px solid var(--accent);">
                    <div class="actor-name" style="font-size:11px; color:#888; margin-top:8px;">${a.name}</div>
                </div>
            `).join('') + `</div>`;
    } else {
        castHtml = (m.actors || m.cast) ? "Casting : " + (m.actors || m.cast) : "";
    }
    document.getElementById('details-meta').innerHTML = castHtml;

    let trailerHtml = "";
    if (m.trailer) {
        trailerHtml = `<div class="trailer-box">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${m.trailer}?rel=0" frameborder="0" allowfullscreen></iframe>
        </div>`;
    }
    document.getElementById('details-trailer-box').innerHTML = trailerHtml;
    document.getElementById('details-desc').innerText = m.desc || "Aucun résumé disponible.";
    
    const playBtn = document.getElementById('details-play-btn');
    playBtn.onclick = () => { closeDetails(); playMovie(idx); };
    
    document.getElementById('details-overlay').style.display = 'flex';
    playBtn.focus();
}

function closeDetails() {
    document.getElementById('details-overlay').style.display = 'none';
    document.getElementById('details-trailer-box').innerHTML = "";
}

function initProfiles() {
    let profiles = JSON.parse(localStorage.getItem('sfpp_profiles_data')) || [
        { id: 1, name: "Profil 1", icon: "🟦", color: "#1e90ff" },
        { id: 2, name: "Profil 2", icon: "🟩", color: "#2ecc71" },
        { id: 3, name: "Profil 3", icon: "🟧", color: "#e67e22" },
        { id: 4, name: "Profil 4", icon: "🟪", color: "#9b59b6" }
    ];
    const list = document.getElementById('profile-list');
    list.innerHTML = profiles.map(p => `
        <div class="profile-item" onclick="handleProfileClick(${p.id}, '${p.name}', '${p.icon}')" tabindex="0">
            <div class="profile-avatar" style="background:${p.color}">${p.icon}<div class="edit-icon">✏️</div></div>
            <div class="profile-name">${p.name}</div>
        </div>`).join('');
}

function handleProfileClick(id, name, icon) {
    if(isEditMode) {
        let n = prompt("Nouveau nom :", name);
        if(n) {
            let saved = JSON.parse(localStorage.getItem('sfpp_profiles_data') || "[]");
            const idx = saved.findIndex(p => p.id === id);
            if(idx !== -1) { saved[idx].name = n; localStorage.setItem('sfpp_profiles_data', JSON.stringify(saved)); initProfiles(); }
        }
    } else selectProfile(name, icon);
}

function toggleFavCurrent() {
    let key = 'sfpp_fav_' + currentProfile;
    let favs = JSON.parse(localStorage.getItem(key) || "[]");
    if(favs.includes(currentPlayingTitle)) favs = favs.filter(t => t !== currentPlayingTitle);
    else favs.push(currentPlayingTitle);
    localStorage.setItem(key, JSON.stringify(favs));
    updatePlayerFavUI();
    render(document.getElementById('searchBar').value);
}

function updatePlayerFavUI() {
    let favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const btn = document.getElementById('player-fav-btn');
    if(favs.includes(currentPlayingTitle)) { btn.innerText = "❤️ Dans Ma Liste"; btn.classList.add('is-fav'); }
    else { btn.innerText = "+ Ma Liste"; btn.classList.remove('is-fav'); }
}

function saveP() {
    if(!currentPlayingTitle || !currentProfile) return;
    const cur = player.currentTime();
    const dur = player.duration();
    if(dur > 0) {
        let prog = JSON.parse(localStorage.getItem('sfpp_p_'+currentProfile) || "{}");
        prog[currentPlayingTitle] = { t: cur, p: (cur/dur)*100 };
        localStorage.setItem('sfpp_p_'+currentProfile, JSON.stringify(prog));
    }
}

function scrollSide(btn, amt) { const car = btn.parentElement.querySelector('.carousel'); car.scrollBy({ left: amt, behavior: 'smooth' }); }

function render(search = "") {
    const cont = document.getElementById('categories-container');
    const histSec = document.getElementById('history-sec');
    const histCont = document.getElementById('history-container');
    cont.innerHTML = ""; histCont.innerHTML = "";
    const s = search.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('sfpp_fav_' + currentProfile) || "[]");
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    
    let data = playlistData;
    if(currentView === 'movies') data = playlistData.filter(m => m.cat !== "SÉRIES");
    else if(currentView === 'series') data = playlistData.filter(m => m.cat === "SÉRIES");
    else if(currentView === 'fav') data = playlistData.filter(m => favs.includes(m.t));

    if(currentProfile && s === "" && currentView === 'all') {
        let history = JSON.parse(localStorage.getItem('sfpp_hist_' + currentProfile) || "[]");
        if(history.length > 0) {
            histSec.style.display = "block";
            history.slice().reverse().forEach(title => {
                const m = playlistData.find(item => item.t === title);
                if(m) {
                    const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
                    histCont.innerHTML += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${pct}<div class="card-name">${m.t}</div></div>`;
                }
            });
        } else histSec.style.display = "none";
    } else histSec.style.display = "none";

    const cats = [...new Set(data.map(m => m.cat))];
    let addedSeries = [];

    cats.forEach(c => {
        const filtered = data.filter(m => m.cat === c && m.t.toLowerCase().includes(s));
        if (filtered.length === 0) return;
        let html = `<div class="category-title">${c}</div><div class="category-row"><div class="nav-arrow arrow-left" onclick="scrollSide(this, -400)">‹</div><div class="carousel">`;
        filtered.forEach(m => {
            const isS = /S\d{2}E\d{2}/i.test(m.t);
            const heart = favs.includes(m.t) ? `<div style="position:absolute; top:5px; right:5px;">❤️</div>` : "";
            const pct = (prog[m.t] && prog[m.t].p > 1) ? `<div class="prog-bg"><div class="prog-fill" style="width:${prog[m.t].p}%"></div></div>` : "";
            if(isS) {
                const sName = m.t.split(' - ')[0];
                if(!addedSeries.includes(sName)) {
                    addedSeries.push(sName);
                    html += `<div class="card" onclick="openSeries('${sName}')" tabindex="0"><img src="${m.img}">${heart}<div class="card-name">${sName}</div></div>`;
                }
            } else {
                html += `<div class="card" onclick="openDetails(${playlistData.indexOf(m)})" tabindex="0"><img src="${m.img}">${heart}${pct}<div class="card-name">${m.t}</div></div>`;
            }
        });
        html += `</div><div class="nav-arrow arrow-right" onclick="scrollSide(this, 400)">›</div></div>`;
        cont.innerHTML += html;
    });
}

function openSeries(name) {
    const overlay = document.getElementById('series-overlay');
    const content = document.getElementById('series-detail-content');
    const eps = playlistData.filter(m => m.t.startsWith(name));
    overlay.style.display = 'block';
    let html = `<div class="overlay-header" style="display:flex; gap:30px; margin-bottom:40px; align-items:center;"><img src="${eps[0].img}" style="width:150px; border-radius:12px; border:1px solid #333;"><div><h2 style="font-size:35px; margin:0;">${name}</h2></div></div>`;
    const seasons = {};
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    eps.forEach(ep => {
        const sMatch = ep.t.match(/S(\d{2})/);
        const sNum = sMatch ? sMatch[1] : "01";
        if(!seasons[sNum]) seasons[sNum] = [];
        seasons[sNum].push(ep);
    });
    Object.keys(seasons).sort().forEach(s => {
        html += `<div class="season-title" style="color:var(--accent); font-size:22px; font-weight:800; margin:30px 0 15px; border-left:4px solid var(--accent); padding-left:15px;">SAISON ${s}</div>`;
        seasons[s].forEach(ep => {
            const epName = ep.t.split(' - ')[1] || ep.t;
            const pct = (prog[ep.t] && prog[ep.t].p > 1) ? `<div style="height:3px; background:#222; width:120px; margin-top:10px;"><div style="height:100%; background:var(--accent); width:${prog[ep.t].p}%"></div></div>` : "";
            html += `<div class="episode-item" onclick="openDetails(${playlistData.indexOf(ep)}); closeSeries();" tabindex="0">
                        <div style="flex:1"><span style="font-size:18px; font-weight:600;">${epName}</span>${pct}</div>
                        <div style="color:var(--accent); font-weight:800;">REGARDER</div>
                     </div>`;
        });
    });
    content.innerHTML = html;
}

function playMovie(idx) {
    const m = playlistData[idx];
    currentPlayingTitle = m.t;
    document.getElementById('next-episode-btn').style.display = 'none';
    
    if(currentProfile) {
        let key = 'sfpp_hist_' + currentProfile;
        let hist = JSON.parse(localStorage.getItem(key) || "[]").filter(t => t !== m.t);
        hist.push(m.t); if(hist.length > 15) hist.shift();
        localStorage.setItem(key, JSON.stringify(hist));
    }
    
    document.getElementById('player-section').style.display = 'block';
    document.getElementById('display-title').innerText = m.t;
    document.getElementById('display-desc').innerText = m.desc || "";
    document.getElementById('display-actors').innerText = (m.actors || m.cast) ? "Casting : " + (m.actors || m.cast) : "";
    updatePlayerFavUI();
    
    document.getElementById('player-blur-bg').style.backgroundImage = `url('${m.img}')`;
    player.poster(m.img); 
    
    window.scrollTo({top:0, behavior:'smooth'});
    player.src({ src: m.url, type: 'video/mp4' });
    
    const prog = JSON.parse(localStorage.getItem('sfpp_p_' + currentProfile) || "{}");
    if(prog[m.t] && prog[m.t].t > 10) {
        player.currentTime(prog[m.t].t);
    }
    
    player.play();
}

function playNextEpisode() {
    const parts = currentPlayingTitle.match(/(.*[SE])(\d+)(.*)/i);
    if (!parts) return;
    const nextTitleSearch = (parts[1] + (parseInt(parts[2]) + 1).toString().padStart(2, '0')).toUpperCase();
    const nextIdx = playlistData.findIndex(m => m.t.toUpperCase().includes(nextTitleSearch));
    if (nextIdx !== -1) playMovie(nextIdx);
}

function closeP() { saveP(); player.pause(); document.getElementById('player-section').style.display = 'none'; render(); }
function closeSeries() { document.getElementById('series-overlay').style.display = 'none'; }
function changeView(v) { currentView = v; document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-'+v).classList.add('active'); render(); }
function filter() { render(document.getElementById('searchBar').value); }
function toggleEditMode() { isEditMode = !isEditMode; document.getElementById('profile-screen').classList.toggle('is-editing'); }
function switchProfile() { localStorage.removeItem('sfpp_profile'); location.reload(); }
function requestAccess() { window.location.href = "mailto:sfpp.ott@gmail.com"; }

document.addEventListener('DOMContentLoaded', () => {
    player = videojs('main-video', { 
        controls: true, 
        fluid: true,
        techOrder: ['chromecast', 'html5'], 
        plugins: { chromecast: { addButtonToControlBar: true } }
    });
    
    player.on('timeupdate', function() {
        const dur = player.duration(), cur = player.currentTime();
        if (/S\d{2}E\d{2}/i.test(currentPlayingTitle) && dur > 0 && (dur - cur) < 80) {
            if (player.isFullscreen()) player.exitFullscreen();
            document.getElementById('next-episode-btn').style.display = 'block';
        } else document.getElementById('next-episode-btn').style.display = 'none';
        if(Math.floor(cur) % 10 === 0) saveP();
    });

    let lastTap = 0;
    player.on('touchend', function(e) {
        let now = Date.now();
        if (now - lastTap < 300) {
            if (player.isFullscreen()) player.exitFullscreen();
            else player.requestFullscreen();
            e.preventDefault();
        }
        lastTap = now;
    });

    const Button = videojs.getComponent('Button');
    class Back extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-replay-10'; } handleClick() { player.currentTime(player.currentTime()-10); } }
    class Forward extends Button { buildCSSClass() { return 'vjs-skip-button vjs-icon-forward-10'; } handleClick() { player.currentTime(player.currentTime()+10); } }
    videojs.registerComponent('Back', Back); videojs.registerComponent('Forward', Forward);
